<!doctype html>
<html class="host" lang="de">
<head>
<meta charset="utf-8" />
<title>ChatDuell — Host</title>
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Anton&family=Inter:wght@500;700;900&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="../live.js"></script>
<script src="../auth.js"></script>
<script src="../turnier.js"></script>
<script src="../avatare.js"></script>
<script src="../host-fx.js"></script>
<script src="../symbole.js"></script>
<style>
  /* Handy-Skalierung: Bezugsgroesse wechselt hochkant auf die Hoehe */
  :root{ --u: 1vw; }
  @media (max-width:900px) and (orientation:portrait){
    :root{ --u: 0.62vh; }
    html.host, body.host{ height:auto; min-height:100%; overflow-y:auto; overflow-x:hidden; }
  }
  @media (max-width:900px) and (orientation:portrait) and (min-aspect-ratio:3/5){
    :root{ --u: 0.72vh; }
  }
  @media (max-height:520px) and (orientation:landscape){
    :root{ --u: 1.35vh; }
  }

  .avatar-pic{
  width:44px;height:44px;border-radius:50%;object-fit:cover;flex-shrink:0;
  border:2px solid rgba(255,255,255,.18);box-shadow:0 4px 12px -4px rgba(0,0,0,.6);
  animation:avatarFloat 4.6s ease-in-out infinite;
  transition:border-color .35s var(--ease),box-shadow .35s var(--ease),transform .35s var(--ease);
  }
  @keyframes avatarFloat{0%,100%{transform:translateY(0)}50%{transform:translateY(-2px)}}
  .player-chip.active .avatar-pic{
    border-color:var(--good);transform:scale(1.08);
    box-shadow:0 0 0 3px rgba(0,229,199,.22),0 0 20px -2px rgba(0,229,199,.85);
    animation:avatarFloat 4.6s ease-in-out infinite,avatarPulseTeal 1.6s ease-in-out infinite;
  }
  @keyframes avatarPulseTeal{0%,100%{filter:brightness(1)}50%{filter:brightness(1.22)}}
  @media (prefers-reduced-motion: reduce){.avatar-pic{animation:none}}
  :root{
    --bg:#0a0e1a; --panel:#12172a; --panel-border:#232b45;
    --ink:#eef1f8; --muted:#6b7488; --accent:#00e5c7; --warn:#ffd166; --bad:#ff3860; --good:#00e5c7;
    --teamA:#ff3860; --teamB:#3a7bff;
    --tile-bg:linear-gradient(160deg, #1e3a5f 0%, #122036 100%);
    --tile-border:1px solid rgba(255,255,255,.16);
    --ease:cubic-bezier(.22,.9,.32,1);
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;background:transparent;width:calc(100 * var(--u));height:100vh;overflow:hidden;font-family:'Inter',sans-serif;}
  .stage{
    position:relative;width:calc(100 * var(--u));height:100vh;
    background:radial-gradient(ellipse at 50% 0%, #131b33 0%, var(--bg) 65%);
    display:flex;flex-direction:column;align-items:center;padding:28px 32px;
    transition:filter .5s var(--ease);
  }
  .stage.blurred{filter:blur(22px) saturate(1.1);}

  .header{display:flex;flex-direction:column;align-items:center;margin-bottom:18px;position:relative;width:100%;max-width:1720px;}
  .round-box{
    position:absolute;right:0;top:-4px;
    background:var(--panel);border:1px solid var(--panel-border);border-radius:14px;
    padding:10px 34px;text-align:center;min-width:170px;
    box-shadow:0 6px 22px rgba(0,0,0,.4);
    animation:roundGlow 3.2s ease-in-out infinite;
  }
  @keyframes roundGlow{
    0%,100%{box-shadow:0 6px 22px rgba(0,0,0,.4);}
    50%{box-shadow:0 6px 22px rgba(0,0,0,.4),0 0 20px -4px rgba(181,140,255,.55);}
  }
  .round-box .lbl{
    font-family:'Anton',sans-serif;font-size:13px;letter-spacing:3px;
    color:#b58cff;margin-bottom:2px;
  }
  .round-box .num{font-family:'Anton',sans-serif;font-size:26px;color:#fff;line-height:1;}
  .title{
    font-family:'Anton',sans-serif;font-size:32px;letter-spacing:4px;color:var(--ink);
    text-shadow:0 0 22px rgba(0,229,199,.35);
  }
  .title-rule{width:64px;height:3px;border-radius:3px;margin-top:10px;
    background:linear-gradient(90deg, var(--teamA), var(--accent), var(--teamB));
    background-size:220% 100%;box-shadow:0 0 12px -1px rgba(199,107,255,.7);
    animation:ruleShimmer 3s linear infinite;
  }
  @keyframes ruleShimmer{0%{background-position:0% 0}100%{background-position:220% 0}}

  .board{display:flex;gap:26px;width:100%;max-width:1720px;flex:1;min-height:0;}

  .team-panel{
    flex:0 0 300px;border-radius:20px;padding:20px;display:flex;flex-direction:column;
    background:var(--panel);border:2px solid var(--panel-border);
    transition:border-color .4s var(--ease), box-shadow .4s var(--ease);
  }
  .team-panel.a{border-color:rgba(255,56,96,.35);}
  .team-panel.b{border-color:rgba(58,123,255,.35);}
  .team-panel.turn-a{border-color:var(--teamA);box-shadow:0 0 26px rgba(255,56,96,.25);}
  .team-panel.turn-b{border-color:var(--teamB);box-shadow:0 0 26px rgba(58,123,255,.25);}

  .team-name{
    font-family:'Anton',sans-serif;font-size:20px;text-align:center;padding:12px;border-radius:11px;color:#fff;
    letter-spacing:2px;box-shadow:0 4px 16px rgba(0,0,0,.35);
    letter-spacing:2px;
  }
  .team-panel.a .team-name{background:linear-gradient(160deg,#e8354f,#a01a2c);}
  .team-panel.b .team-name{background:linear-gradient(160deg,#3f7dff,#1c47b8);}

  .turn-badge{
    font-size:11px;font-weight:800;letter-spacing:1.5px;text-align:center;
    padding:6px 10px;border-radius:999px;margin:12px auto 0;text-transform:uppercase;
    width:fit-content;opacity:0;transform:translateY(-4px);
    transition:opacity .3s var(--ease), transform .3s var(--ease);
    pointer-events:none;
  }
  .turn-badge.visible{opacity:1;transform:translateY(0);}
  .turn-badge.control{background:linear-gradient(160deg,#22c55e,#15803d);color:#fff;border:1px solid rgba(255,255,255,.3);box-shadow:0 3px 14px rgba(34,197,94,.4);
    box-shadow:0 0 14px rgba(0,229,199,.2);}
  .turn-badge.opponent{background:rgba(255,255,255,.04);color:var(--muted);border:1px solid var(--panel-border);}
  .turn-badge.faceoff{background:rgba(255,209,102,.12);color:var(--warn);border:1px solid rgba(255,209,102,.45);}

  .strikes-row{
    display:flex;align-items:center;justify-content:center;gap:5px;margin-top:10px;
    font-size:9px;font-weight:800;letter-spacing:1.5px;color:var(--muted);text-transform:uppercase;
    opacity:0;height:0;overflow:hidden;transition:opacity .3s var(--ease);
  }
  .strikes-row.visible{opacity:1;height:auto;margin-bottom:4px;}
  .strikes-row .hearts{display:flex;gap:3px;font-size:15px;}
  .strikes-row .heart{transition:transform .35s var(--ease), filter .35s var(--ease);}
  .strikes-row .heart.lost{filter:grayscale(1) brightness(.45);transform:scale(.85);}
  .strikes-row .heart.pop{animation:heartPop .5s var(--ease);}
  @keyframes heartPop{
    0%{transform:scale(1);}
    30%{transform:scale(1.4) rotate(-8deg);filter:brightness(1.6);}
    100%{transform:scale(.85);}
  }

  .team-score{
    text-align:center;font-family:'Anton',sans-serif;font-size:44px;color:#fff;margin:10px 0 6px;
    font-variant-numeric:tabular-nums;transition:transform .3s var(--ease);
  }
  .team-score.bump{animation:scoreBump .5s var(--ease);}
  @keyframes scoreBump{
    0%{transform:scale(1);color:#fff;}
    35%{transform:scale(1.22);color:var(--good);}
    100%{transform:scale(1);color:#fff;}
  }

  .section-label{
    font-size:11px;letter-spacing:2px;color:var(--muted);text-transform:uppercase;
    text-align:center;margin:8px 0 10px;font-weight:700;
  }

  .players{display:flex;flex-direction:column;gap:9px;}
  .player-chip{
    background:var(--tile-bg);border:var(--tile-border);border-radius:999px;padding:8px 18px 8px 8px;
    font-weight:700;text-align:center;font-size:14px;position:relative;
    display:flex;align-items:center;justify-content:center;gap:10px;color:#fff;
    box-shadow:inset 0 1px 0 rgba(255,255,255,.08), 0 4px 10px rgba(0,0,0,.3);
    transition:border-color .35s var(--ease), box-shadow .35s var(--ease);
  }
  .player-chip.active{
    border-color:var(--good);
    animation:chipGlow 1.8s ease-in-out infinite;
  }
  @keyframes chipGlow{
    0%,100%{box-shadow:0 0 14px rgba(0,229,199,.35);}
    50%{box-shadow:0 0 22px rgba(0,229,199,.65);}
  }
  .mic-badge{
    width:22px;height:22px;border-radius:50%;flex-shrink:0;
    background:radial-gradient(circle at 35% 30%, #6bffe0, #00e5c7 65%, #00a88a);
    display:flex;align-items:center;justify-content:center;
    animation:micPulse 1.8s ease-in-out infinite;
  }
  @keyframes micPulse{
    0%,100%{box-shadow:0 0 8px rgba(0,229,199,.85), 0 0 2px rgba(0,229,199,1) inset;}
    50%{box-shadow:0 0 16px rgba(0,229,199,1), 0 0 4px rgba(0,229,199,1) inset;}
  }
  .mic-badge svg{width:12px;height:12px;display:block;}

  .center-panel{flex:1;display:flex;flex-direction:column;gap:18px;min-width:0;min-height:0;}

  .question-box{
    border-radius:18px;background:var(--tile-bg);border:var(--tile-border);
    padding:20px 26px;text-align:center;
    box-shadow:inset 0 1px 0 rgba(255,255,255,.08), 0 6px 18px rgba(0,0,0,.35);
  }
  .question-label{font-size:11px;letter-spacing:3px;color:var(--muted);text-transform:uppercase;font-weight:700;margin-bottom:8px;}
  .question-text{font-family:'Anton',sans-serif;font-size:28px;color:#fff;line-height:1.25;}
  .pot-pill{
    display:inline-block;margin-top:12px;padding:6px 18px;border-radius:999px;
    background:rgba(255,209,102,.12);border:1px solid rgba(255,209,102,.4);
    color:var(--warn);font-size:13px;font-weight:700;letter-spacing:.5px;
    opacity:0;transform:translateY(4px);transition:opacity .3s var(--ease), transform .3s var(--ease);
  }
  .pot-pill.show{opacity:1;transform:translateY(0);}

  .onair-pill{
    display:inline-flex;align-items:center;gap:7px;margin-top:10px;margin-left:8px;padding:6px 16px;
    border-radius:999px;background:rgba(0,229,199,.1);border:1px solid rgba(0,229,199,.35);
    color:var(--good);font-size:13px;font-weight:700;letter-spacing:.3px;
    opacity:0;transform:translateY(4px);transition:opacity .3s var(--ease), transform .3s var(--ease);
  }
  .onair-pill.show{opacity:1;transform:translateY(0);}
  .onair-dot{width:8px;height:8px;border-radius:50%;background:var(--good);animation:micPulse 1.2s ease-in-out infinite;}

  .answers-grid{flex:1;display:grid;grid-template-columns:1fr 1fr;gap:16px;align-content:stretch;padding:14px 14px 0;perspective:1200px;}
  .answers-head{
    background:linear-gradient(90deg,#7c3aed,#a855f7);
    border-radius:12px 12px 0 0;padding:11px;text-align:center;
    font-family:'Anton',sans-serif;font-size:17px;letter-spacing:3px;color:#fff;
    box-shadow:0 4px 18px rgba(124,58,237,.35);
  }
  .answers-wrap{
    border:1px solid rgba(168,85,247,.32);border-radius:12px;
    padding:0 0 14px;background:rgba(124,58,237,.05);
    display:flex;flex-direction:column;flex:1;min-height:0;
  }
  .answer-slot{
    display:flex;flex-direction:column;align-items:center;justify-content:center;
    background:#0d1424;border:1px solid var(--panel-border);border-radius:12px;
    padding:16px;min-height:86px;transform-style:preserve-3d;
    transition:all .4s var(--ease);
  }
  .answer-slot.revealed{border-color:var(--good);background:#0b2a22;box-shadow:0 0 18px rgba(0,229,199,.18);}

  .answer-slot.revealed.team-a{
    border-color:var(--teamA);
    background:linear-gradient(160deg,#c62b45,#8e1a2e);
    box-shadow:0 0 22px rgba(255,56,96,.4);
  }
  .answer-slot.revealed.team-b{
    border-color:var(--teamB);
    background:linear-gradient(160deg,#2f63d8,#1b3f96);
    box-shadow:0 0 22px rgba(58,123,255,.4);
  }
  .answer-slot.revealed.team-a .txt,
  .answer-slot.revealed.team-b .txt{color:#fff;}
  .answer-slot.revealed.team-a .check,
  .answer-slot.revealed.team-b .check{
    color:#fff;background:rgba(255,255,255,.22);
    width:24px;height:24px;border-radius:50%;
    display:flex;align-items:center;justify-content:center;
    font-size:14px;margin:0 auto 6px;
  }
  .answer-slot.revealed.team-a .pts,
  .answer-slot.revealed.team-b .pts{
    color:#fff;background:rgba(0,0,0,.3);
    padding:2px 10px;border-radius:999px;
  }
  .answer-slot.reveal-pop{animation:revealFlip .6s cubic-bezier(.3,.85,.32,1);}
  @keyframes revealFlip{
    0%{transform:rotateX(-95deg);opacity:.15;}
    55%{transform:rotateX(14deg);opacity:1;}
    100%{transform:rotateX(0deg);opacity:1;}
  }
  .answer-slot .check{font-size:20px;color:var(--good);margin-bottom:4px;}
  .answer-slot .txt{font-family:'Anton',sans-serif;font-size:21px;text-align:center;color:#fff;letter-spacing:.3px;}
  .answer-slot .pts{color:var(--warn);margin-top:6px;font-size:14px;font-weight:700;}
  .answer-slot .rank{
    font-family:'Anton',sans-serif;font-size:16px;color:#fff;
    width:30px;height:30px;border-radius:50%;
    background:linear-gradient(160deg,#8b5cf6,#6d28d9);
    display:flex;align-items:center;justify-content:center;
    box-shadow:0 3px 12px rgba(109,40,217,.5);
  }
  .answer-slot .qm{
    font-family:'Anton',sans-serif;font-size:20px;color:var(--muted);
    letter-spacing:3px;margin-top:8px;
  }

  .result-banner{
    text-align:center;font-family:'Anton',sans-serif;font-size:24px;color:var(--warn);padding:12px;
    border-radius:14px;background:rgba(255,209,102,.08);border:1px solid rgba(255,209,102,.3);
    opacity:0;transform:translateY(6px);transition:opacity .35s var(--ease), transform .35s var(--ease);
    min-height:1px;
  }
  .result-banner.show{opacity:1;transform:translateY(0);}

  /* ===== FINAL ROUND Ansicht ===== */
  .final-head{
    width:100%;max-width:1720px;border-radius:16px;
    border:1px solid rgba(168,85,247,.45);background:rgba(124,58,237,.07);
    padding:14px 26px 18px;text-align:center;margin-bottom:16px;
    box-shadow:0 0 34px -10px rgba(168,85,247,.6);
    display:none;
  }
  .final-head.show{display:block;}
  .final-head .ttl{
    font-family:'Anton',sans-serif;font-size:34px;letter-spacing:4px;color:var(--warn);
    text-shadow:0 0 26px rgba(255,209,102,.55);
  }
  .final-head .total{
    font-family:'Anton',sans-serif;font-size:19px;color:var(--bad);margin-top:2px;
  }
  .final-bar{
    margin:12px auto 0;width:min(560px,80%);height:7px;border-radius:6px;
    background:#1b2138;overflow:hidden;border:1px solid var(--panel-border);
  }
  .final-bar .fill{
    height:100%;width:0%;border-radius:6px;
    background:linear-gradient(90deg,#7c3aed,#a855f7);
    box-shadow:0 0 14px rgba(168,85,247,.8);
    transition:width .5s var(--ease);
  }

  .final-grid{
    display:none;flex-direction:column;gap:12px;flex:1;min-height:0;
    border:1px solid rgba(168,85,247,.32);border-radius:14px;
    background:rgba(124,58,237,.05);padding:16px;overflow-y:auto;
  }
  .final-grid.show{display:flex;}
  .final-row{display:grid;grid-template-columns:180px 1fr 180px;gap:14px;align-items:stretch;}
  .final-cell{
    border-radius:11px;border:1px solid var(--panel-border);background:#0d1424;
    display:flex;flex-direction:column;align-items:center;justify-content:center;
    padding:12px;min-height:74px;
  }
  .final-cell .guess{
    font-family:'Anton',sans-serif;font-size:19px;color:var(--muted);letter-spacing:2px;
  }
  .final-cell .pts{font-size:13px;font-weight:700;color:var(--muted);margin-top:4px;}
  .final-cell.a{border-color:rgba(255,56,96,.4);}
  .final-cell.b{border-color:rgba(58,123,255,.4);background:#0e1730;}
  .final-cell.a.filled{background:linear-gradient(160deg,#c62b45,#8e1a2e);border-color:var(--teamA);}
  .final-cell.b.filled{background:linear-gradient(160deg,#2f63d8,#1b3f96);border-color:var(--teamB);}
  .final-cell.filled .guess,.final-cell.filled .pts{color:#fff;}
  .final-answer{
    border-radius:11px;border:1px solid rgba(168,85,247,.4);background:#0d1424;
    display:flex;align-items:center;justify-content:center;position:relative;padding:12px 46px;
  }
  .final-answer .txt{
    font-family:'Anton',sans-serif;font-size:20px;letter-spacing:3px;color:var(--muted);
  }
  .final-answer.revealed{background:#0b2a22;border-color:var(--good);}
  .final-answer.revealed .txt{color:#fff;letter-spacing:.5px;}
  .final-answer .hidden-tag{
    position:absolute;right:12px;top:8px;
    font-size:9px;font-weight:800;letter-spacing:2px;color:var(--muted);text-transform:uppercase;
  }
  .final-answer.revealed .hidden-tag{display:none;}

  @media (max-width:900px){
    .final-head .ttl{font-size:22px;letter-spacing:2px;}
    .final-row{grid-template-columns:76px 1fr 76px;gap:7px;}
    .final-cell{min-height:54px;padding:7px;}
    .final-cell .guess{font-size:13px;}
    .final-answer{padding:10px 14px;}
    .final-answer .txt{font-size:14px;letter-spacing:1px;}
  }

  .flash-overlay{
    position:fixed;inset:0;display:flex;align-items:center;justify-content:center;
    background:rgba(5,7,13,.4);opacity:0;pointer-events:none;transition:opacity .35s var(--ease), background .35s var(--ease);z-index:50;
    overflow:hidden;
  }
  .flash-overlay::before{
    content:'';position:absolute;left:50%;top:50%;width:10px;height:10px;margin:-5px 0 0 -5px;
    border-radius:50%;box-shadow:0 0 0 0 rgba(0,229,199,0);
  }
  .flash-overlay.show::before{animation:flashRing 1.1s cubic-bezier(.15,.7,.3,1) both;}
  @keyframes flashRing{
    0%{box-shadow:0 0 0 0 rgba(0,229,199,.5);}
    100%{box-shadow:0 0 0 900px rgba(0,229,199,0);}
  }
  .flash-overlay.steal.show::before{animation-name:flashRingSteal;}
  @keyframes flashRingSteal{
    0%{box-shadow:0 0 0 0 rgba(255,56,96,.5);}
    100%{box-shadow:0 0 0 900px rgba(255,56,96,0);}
  }
  .flash-overlay.show{opacity:1;}
  .flash-name{
    font-family:'Anton',sans-serif;font-size:88px;color:var(--good);
    text-shadow:0 0 40px rgba(0,229,199,.7);text-align:center;padding:0 40px;
    transform:scale(.85);opacity:0;transition:transform .4s var(--ease), opacity .4s var(--ease), color .3s var(--ease), text-shadow .3s var(--ease);
  }
  .flash-overlay.show .flash-name{transform:scale(1);opacity:1;}
  .flash-sub{
    position:absolute;bottom:130px;font-size:21px;color:var(--muted);text-align:center;width:100%;
    opacity:0;transition:opacity .4s var(--ease) .1s;
  }
  .flash-overlay.show .flash-sub{opacity:1;}

  .flash-overlay.steal{background:rgba(24,4,9,.55);}
  .flash-overlay.steal .flash-name{color:var(--bad);text-shadow:0 0 44px rgba(255,56,96,.75);}
</style>
<link rel="stylesheet" href="../responsive.css" />
<link rel="stylesheet" href="../hintergrund-host.css" />
<style>:root{ --akzent-rgb: 0,229,199; --akzent2-rgb: 120,90,240; }</style>

<body class="host">
<div class="stage" id="stage">
  <div class="header">
    <div class="title">CHATDUELL</div>
    <div class="title-rule"></div>
    <div class="round-box"><div class="lbl">ROUND</div><div class="num" id="roundNum">–</div></div>
  </div>

  <div class="final-head" id="finalHead">
    <div class="ttl">FINAL ROUND</div>
    <div class="total" id="finalTotal">0</div>
    <div class="final-bar"><div class="fill" id="finalFill"></div></div>
  </div>

  <div class="board">
    <div class="team-panel a" id="teamPanelA">
      <div class="team-name">TEAM A</div>
      <div class="turn-badge" id="badgeA"></div>
      <div class="team-score" id="scoreA">0</div>
      <div class="strikes-row" id="livesA"><span>Strikes:</span><span class="hearts" id="heartsA"></span></div>
      <div class="section-label">Spieler</div>
      <div class="players" id="playersA"></div>
    </div>

    <div class="center-panel">
      <div class="question-box">
        <div class="question-label">Frage</div>
        <div class="question-text" id="questionText">Warte auf die nächste Frage…</div>
        <div class="pot-pill" id="potPill"></div>
        <div class="onair-pill" id="onairPill"><span class="onair-dot"></span><span id="onairText"></span></div>
      </div>
      <div class="answers-wrap" id="answersWrap">
        <div class="answers-head">ANSWERS</div>
        <div class="answers-grid" id="answersGrid"></div>
      </div>
      <div class="final-grid" id="finalGrid"></div>
      <div class="result-banner" id="resultBanner"></div>
    </div>

    <div class="team-panel b" id="teamPanelB">
      <div class="team-name">TEAM B</div>
      <div class="turn-badge" id="badgeB"></div>
      <div class="team-score" id="scoreB">0</div>
      <div class="strikes-row" id="livesB"><span>Strikes:</span><span class="hearts" id="heartsB"></span></div>
      <div class="section-label">Spieler</div>
      <div class="players" id="playersB"></div>
    </div>
  </div>
</div>

<div class="flash-overlay" id="flashOverlay">
  <div class="flash-name" id="flashName"></div>
  <div class="flash-sub" id="flashSub">hat zuerst gebuzzert!</div>
</div>

<script>
const SUPABASE_URL = "https://dazabcxqplkvcyeiesgd.supabase.co";
const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRhemFiY3hxcGxrdmN5ZWllc2dkIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE4NTQ0NzksImV4cCI6MjA5NzQzMDQ3OX0.N3Dca8Quii4M8nFYLHjzBslby_tBUCyH1-WnPfYW01Y";

const sb = window.KA_SB || supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

let state = null;
let lastFlashAt = null;
let lastStealFlashAt = null;
let lastScoreA = 0;
let lastScoreB = 0;
let previousRevealedKey = '';
let previousRevealedSet = new Set();
let lastLivesA = null;
let lastLivesB = null;

function triggerFlash(text, subtitle, variant){
  const stage = document.getElementById('stage');
  const overlay = document.getElementById('flashOverlay');
  document.getElementById('flashName').textContent = text;
  document.getElementById('flashSub').textContent = subtitle;
  overlay.classList.toggle('steal', variant === 'steal');
  stage.classList.add('blurred');
  overlay.classList.add('show');
  setTimeout(()=>{
    stage.classList.remove('blurred');
    overlay.classList.remove('show');
  }, 3000);
}

function renderHearts(elId, lives, prevLives, active){
  const el = document.getElementById(elId);
  let html = '';
  for(let i=0;i<3;i++){
    const lost = i >= lives;
    const justLost = active && prevLives!==null && i === lives;
    html += `<span class="heart ${lost?'lost':''} ${justLost?'pop':''}">❤️</span>`;
  }
  el.innerHTML = html;
}

function render(){
  if(!state) return;
  const {
    teamA={score:0}, teamB={score:0}, players={},
    answers=[], phase='idle', pot=0, lastResult=null,
    activePlayer=null, buzzFlashName=null, buzzFlashAt=null, stealFlashAt=null,
    controllingTeam=null, controlLives=3,
    stealTeam=null, potOwner=null, round=0
  } = state;
  const currentFrage = state.currentFrage;

  if(buzzFlashAt && buzzFlashAt!==lastFlashAt){
    lastFlashAt = buzzFlashAt;
    triggerFlash(buzzFlashName, 'hat zuerst gebuzzert!', 'buzz');
  }
  if(stealFlashAt && stealFlashAt!==lastStealFlashAt){
    lastStealFlashAt = stealFlashAt;
    triggerFlash('STEAL ATTEMPT', 'letzte Chance für das andere Team!', 'steal');
  }

  const scoreAEl = document.getElementById('scoreA');
  const scoreBEl = document.getElementById('scoreB');
  scoreAEl.textContent = teamA.score;
  scoreBEl.textContent = teamB.score;
  if(teamA.score!==lastScoreA){
    scoreAEl.classList.remove('bump'); void scoreAEl.offsetWidth; scoreAEl.classList.add('bump');
    lastScoreA = teamA.score;
  }
  if(teamB.score!==lastScoreB){
    scoreBEl.classList.remove('bump'); void scoreBEl.offsetWidth; scoreBEl.classList.add('bump');
    lastScoreB = teamB.score;
  }

  // Im Steal leuchtet das stehlende Team, sonst das kontrollierende
  const leuchtA = (phase==='playing' && controllingTeam==='A') || (phase==='steal' && stealTeam==='A');
  const leuchtB = (phase==='playing' && controllingTeam==='B') || (phase==='steal' && stealTeam==='B');
  document.getElementById('teamPanelA').classList.toggle('turn-a', leuchtA);
  document.getElementById('teamPanelB').classList.toggle('turn-b', leuchtB);

  ['A','B'].forEach(team=>{
    const badge = document.getElementById('badge'+team);
    badge.classList.remove('control','opponent','faceoff','visible');
    if(phase==='steal'){
      if(stealTeam===team){
        badge.textContent = 'STEAL — eine Chance';
        badge.classList.add('control','visible');
      } else {
        badge.textContent = 'Pot in Gefahr';
        badge.classList.add('opponent','visible');
      }
    } else if(phase==='playing' || phase==='manual'){
      if(controllingTeam===team){
        badge.textContent = 'In Control';
        badge.classList.add('control','visible');
      } else {
        badge.textContent = 'Opponent Turn';
        badge.classList.add('opponent','visible');
      }
    } else if(phase==='faceoff'){
      badge.textContent = 'Face-Off';
      badge.classList.add('faceoff','visible');
    } else {
      badge.textContent = '';
    }
  });

  const livesActive = (phase==='playing' || phase==='manual');
  document.getElementById('livesA').classList.toggle('visible', livesActive);
  document.getElementById('livesB').classList.toggle('visible', livesActive);
  if(livesActive){
    const livesForA = controllingTeam==='A' ? controlLives : 3;
    const livesForB = controllingTeam==='B' ? controlLives : 3;
    renderHearts('heartsA', livesForA, lastLivesA, controllingTeam==='A');
    renderHearts('heartsB', livesForB, lastLivesB, controllingTeam==='B');
    lastLivesA = livesForA;
    lastLivesB = livesForB;
  } else {
    lastLivesA = null;
    lastLivesB = null;
  }

  ['A','B'].forEach(team=>{
    const el = document.getElementById('players'+team);
    const names = Object.entries(players).filter(([n,p])=>p.team===team).map(([n])=>n);
    const wholeTeamMic = phase==='playing' && controllingTeam===team && controlLives<=1;
    el.innerHTML = names.map(name=>{
      const isActive = wholeTeamMic || name===activePlayer;
      const avatarUrl = avatarFor(name);
return `<div class="player-chip ${isActive?'active ka-live-green':''}" style="position:relative;">
  ${avatarUrl ? `<img class="avatar-pic" src="${avatarUrl}">` : ''}
  ${isActive ? `<span class="ka-badge-tr">${KA.mic()}</span>` : ''}${name}
</div>`;
    }).join('');
  });

  const questionText = document.getElementById('questionText');
  const potPill = document.getElementById('potPill');
  const onairPill = document.getElementById('onairPill');
  const onairText = document.getElementById('onairText');
  const answersGrid = document.getElementById('answersGrid');
  const roundNumEl = document.getElementById('roundNum');
  if(roundNumEl){
    const r = (state.round != null && state.round > 0) ? state.round : null;
    roundNumEl.textContent = r ? String(r) : '–';
  }
  const resultBanner = document.getElementById('resultBanner');

  if(phase==='steal'){
    onairText.textContent = `Team ${stealTeam} stiehlt — eine Chance`;
    onairPill.classList.add('show');
  } else if((phase==='playing' || phase==='faceoff') && activePlayer){
    onairText.textContent = `${activePlayer} ist dran`;
    onairPill.classList.add('show');
  } else {
    onairPill.classList.remove('show');
  }

  if(answers.length===0){
    questionText.textContent = 'Warte auf die nächste Frage…';
    potPill.classList.remove('show');
    answersGrid.innerHTML = '';
    previousRevealedSet = new Set();
    previousRevealedKey = '';
  } else {
    questionText.textContent = currentFrage || '';
    if(pot > 0){
      potPill.textContent = `POT: ${pot} PUNKTE`;
      potPill.classList.add('show');
    } else {
      potPill.classList.remove('show');
    }

    if(currentFrage !== previousRevealedKey){
      previousRevealedKey = currentFrage;
      previousRevealedSet = new Set();
    }

    const newRevealedSet = new Set();
    answersGrid.innerHTML = answers.map((a,i)=>{
      if(a.revealed) newRevealedSet.add(i);
      const justRevealed = a.revealed && !previousRevealedSet.has(i);
      const cls = ['answer-slot'];
      if(a.revealed) cls.push('revealed');
      if(a.revealed && a.team === 'A') cls.push('team-a');
      if(a.revealed && a.team === 'B') cls.push('team-b');
      if(justRevealed) cls.push('reveal-pop');
      return `
      <div class="${cls.join(' ')}">
        ${a.revealed
          ? `<div class="check">✓</div><div class="txt">${a.text}</div><div class="pts">${a.punkte} Pkt.</div>`
          : `<div class="rank">${i+1}</div><div class="qm">???</div>`}
      </div>
    `;
    }).join('');
    previousRevealedSet = newRevealedSet;
  }

  if(phase==='resolved' && lastResult){
    resultBanner.textContent = lastResult;
    resultBanner.classList.add('show');
  } else {
    resultBanner.classList.remove('show');
  }

  renderFinalRound();
}

/* Final Round: aktiv, sobald state.finalActive gesetzt ist.
   Erwartet state.finalRows = [{answer, revealed, punkte, guessA, guessB, ptsA, ptsB}, ...] */
function renderFinalRound(){
  const finalHead   = document.getElementById('finalHead');
  const finalGrid   = document.getElementById('finalGrid');
  const answersWrap = document.getElementById('answersWrap');
  if(!finalHead || !finalGrid || !answersWrap) return;

  const aktiv = !!(state && state.finalActive);
  finalHead.classList.toggle('show', aktiv);
  finalGrid.classList.toggle('show', aktiv);
  answersWrap.style.display = aktiv ? 'none' : '';
  if(!aktiv) return;

  const rows = Array.isArray(state.finalRows) && state.finalRows.length
    ? state.finalRows
    : Array.from({length:6},()=>({}));

  let summe = 0;
  finalGrid.innerHTML = rows.map(r=>{
    const ptsA = Number(r.ptsA)||0, ptsB = Number(r.ptsB)||0;
    summe += ptsA + ptsB;
    const cell = (seite,guess,pts)=>{
      const gefuellt = guess ? 'filled' : '';
      return `<div class="final-cell ${seite} ${gefuellt}">
                <div class="guess">${guess || '???'}</div>
                <div class="pts">${pts || 0}</div>
              </div>`;
    };
    return `<div class="final-row">
      ${cell('a', r.guessA, ptsA)}
      <div class="final-answer ${r.revealed?'revealed':''}">
        <span class="hidden-tag">Hidden</span>
        <span class="txt">${r.revealed ? (r.answer||'') : '\u2013\u2013\u2013\u2013\u2013\u2013\u2013\u2013'}</span>
      </div>
      ${cell('b', r.guessB, ptsB)}
    </div>`;
  }).join('');

  document.getElementById('finalTotal').textContent = summe;
  const aufgedeckt = rows.filter(r=>r.revealed).length;
  document.getElementById('finalFill').style.width =
    (rows.length ? (aufgedeckt / rows.length) * 100 : 0) + '%';
}

async function loadState(){
  const { data } = await sb.from('cd_state').select('state').eq('id',1).single();
  state = data?.state || {};
  render();
}
loadState();
// Realtime mit Selbstheilung: bricht die Verbindung ab (Handy sperrt,
// WLAN wechselt), wird neu verbunden und der verpasste Stand geholt.
// Solange Realtime steht, laeuft nur ein sehr langsames Sicherheitsnetz
// statt des frueheren Dauer-Pollings im Sekundentakt.
if(window.KA_LIVE){
  KA_LIVE.start({
    client: sb,
    tabelle: 'cd_state',
    laden: async function(){ await loadState(); }
  });
} else {
  setInterval(loadState, 2000);
}
</script>
<script src="../zurueck.js"></script>
<script src="../cam.js"></script>

<script>
// Turnier: Rolle merken und auf Formatwechsel horchen.
// Schaltet der Spielleiter weiter, springt dieses Geraet mit.
if(window.TURNIER){
  TURNIER.setzeRolle('host');
  TURNIER.starte(typeof sb !== "undefined" ? sb : null);
}
</script>
