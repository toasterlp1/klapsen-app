<!doctype html>
<html lang="de">
<head>
<meta charset="utf-8" />
<title>ChatDuell — Spielleiter</title>
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Anton&family=Inter:wght@500;700;900&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="../auth.js"></script>
<script src="./questions.js"></script>
<style>
  :root{
    --bg:#0a0e1a; --panel:#12172a; --panel-border:#232b45;
    --ink:#eef1f8; --muted:#6b7488; --accent:#00e5c7; --warn:#ffd166; --bad:#ff3860; --good:#00e5c7;
    --teamA:#ff3860; --teamB:#3a7bff;
  }
  *{box-sizing:border-box;}
  body{margin:0;background:var(--bg);color:var(--ink);font-family:'Inter',sans-serif;padding:28px;min-height:100vh;}
  h1{font-family:'Anton',sans-serif;letter-spacing:2px;margin:0 0 24px;font-size:26px;}
  .grid{display:grid;grid-template-columns:1fr 1fr;gap:18px;max-width:1200px;margin:0 auto;}
  .card{background:var(--panel);border:1px solid var(--panel-border);border-radius:14px;padding:20px;}
  .card.full{grid-column:1 / -1;}
  .card h2{font-size:13px;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);margin:0 0 14px;font-weight:700;}
  button{
    font-family:'Inter',sans-serif;font-weight:700;border:none;border-radius:10px;
    padding:11px 16px;cursor:pointer;font-size:13px;transition:transform .1s, opacity .15s;
  }
  button:active{transform:scale(.96);}
  button:disabled{opacity:.3;cursor:not-allowed;}
  .btn-primary{background:var(--accent);color:#04120f;}
  .btn-bad{background:var(--bad);color:#fff;}
  .btn-ghost{background:#1b2138;color:var(--ink);border:1px solid var(--panel-border);}
  .row{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:10px;align-items:center;}
  input[type=text]{
    background:#0d1220;border:1px solid var(--panel-border);color:var(--ink);
    padding:9px 12px;border-radius:8px;font-size:13px;flex:1;
  }
  .status-line{font-size:13px;color:var(--muted);margin-bottom:14px;line-height:1.6;}
  .status-line b{color:var(--ink);}
  .players-pool{display:flex;flex-direction:column;gap:6px;}
  .player-row{
    display:flex;align-items:center;gap:6px;background:#0d1220;
    border:1px solid var(--panel-border);border-radius:8px;padding:7px 10px;
  }
  .player-row.active{border-color:var(--good);box-shadow:0 0 0 1px var(--good) inset;}
  .player-row .name{flex:1;font-weight:700;font-size:13px;}
  .mic-btn{padding:4px 8px;font-size:11px;background:#1b2138;color:var(--muted);}
  .mic-btn.on{background:var(--good);color:#04120f;}
  .mini{padding:5px 9px;font-size:11px;}
  .team-score-row{display:flex;gap:16px;margin-bottom:14px;}
  .team-score{
    flex:1;padding:14px;border-radius:12px;text-align:center;background:#0d1220;border:2px solid var(--panel-border);
  }
  .team-score.a{border-color:var(--teamA);}
  .team-score.b{border-color:var(--teamB);}
  .team-score .lbl{font-size:12px;color:var(--muted);letter-spacing:1px;}
  .team-score .val{font-family:'Anton',sans-serif;font-size:28px;margin-top:2px;}
  .answers-board{display:flex;flex-direction:column;gap:6px;}
  .answer-row{
    display:flex;align-items:center;gap:10px;background:#0d1220;border:1px solid var(--panel-border);
    border-radius:8px;padding:9px 14px;cursor:pointer;transition:border-color .2s;
  }
  .answer-row.revealed{border-color:var(--good);background:#08281f;cursor:default;}
  .answer-row .text{flex:1;font-weight:700;font-size:13px;}
  .answer-row .pts{font-family:'Anton',sans-serif;color:var(--warn);font-size:14px;}
  .pot-display{
    font-size:13px;color:var(--warn);margin-bottom:14px;font-weight:700;
  }
  .faceoff-box{
    display:flex;gap:12px;margin-bottom:14px;
  }
  .faceoff-person{
    flex:1;padding:12px;border-radius:10px;background:#0d1220;border:2px solid var(--panel-border);text-align:center;
  }
  .faceoff-person.turn{border-color:var(--good);box-shadow:0 0 14px rgba(0,229,199,.35);}
  .faceoff-person .role{font-size:11px;color:var(--muted);letter-spacing:1px;}
  .faceoff-person .name{font-family:'Anton',sans-serif;font-size:18px;margin-top:4px;}
  .lives-display{font-size:14px;margin-bottom:12px;}

@media (max-width:820px){
  body{padding:14px;}
  .grid{grid-template-columns:1fr;gap:14px;}
  .row{flex-wrap:wrap;}
  .team-score-row,.score-row,.jn-row,.stat-mini{flex-wrap:wrap;}
  button,select,input{min-height:40px;}
}
</style>
<link rel="stylesheet" href="../responsive.css" />
</head>
<body>
<h1>CHATDUELL — SPIELLEITER</h1>
<div class="grid">

  <div class="card full">
    <h2>Teams &amp; Punkte</h2>
    <div class="team-score-row">
      <div class="team-score a">
        <div class="lbl">TEAM A</div>
        <div class="val" id="scoreA">0</div>
        <div class="row" style="justify-content:center;margin-top:8px;">
          <button class="btn-ghost mini" id="btnScoreMinusA">−10</button>
          <button class="btn-ghost mini" id="btnScorePlusA">+10</button>
        </div>
      </div>
      <div class="team-score b">
        <div class="lbl">TEAM B</div>
        <div class="val" id="scoreB">0</div>
        <div class="row" style="justify-content:center;margin-top:8px;">
          <button class="btn-ghost mini" id="btnScoreMinusB">−10</button>
          <button class="btn-ghost mini" id="btnScorePlusB">+10</button>
        </div>
      </div>
    </div>
    <button class="btn-bad" id="btnResetScores">Punkte &amp; Runde komplett zurücksetzen</button>
  </div>

  <div class="card">
    <h2>Spieler — noch nicht zugeteilt</h2>
    <div class="row">
      <input type="text" id="newPlayerName" placeholder="Name eingeben…" />
      <button class="btn-primary mini" id="btnAddPlayer">Hinzufügen</button>
    </div>
    <div class="players-pool" id="unassignedPlayers"></div>
  </div>

  <div class="card">
    <h2>Teams — Klick auf 🎤 setzt "wer ist dran"</h2>
    <div style="margin-bottom:12px;">
      <div style="color:var(--teamA);font-weight:700;margin-bottom:6px;font-size:13px;">Team A</div>
      <div class="players-pool" id="playersA"></div>
    </div>
    <div>
      <div style="color:var(--teamB);font-weight:700;margin-bottom:6px;font-size:13px;">Team B</div>
      <div class="players-pool" id="playersB"></div>
    </div>
  </div>

  <div class="card full">
    <h2>Runde</h2>
    <div class="status-line" id="statusLine">Keine Frage aktiv.</div>
    <div class="pot-display" id="potDisplay"></div>

    <div class="row">
      <button class="btn-primary" id="btnNewQuestion">Nächste Frage</button>
      <button class="btn-ghost" id="btnResetPool">Fragen-Pool zurücksetzen</button>
    </div>

    <div id="faceoffSection" style="display:none;">
      <div class="faceoff-box">
        <div class="faceoff-person" id="faceoffP1">
          <div class="role">TEAM A/B — zuerst gebuzzert</div>
          <div class="name" id="faceoffP1Name">—</div>
        </div>
        <div class="faceoff-person" id="faceoffP2">
          <div class="role">Gegen-Team</div>
          <div class="name" id="faceoffP2Name">wartet auf Buzz…</div>
        </div>
      </div>
      <div class="row">
        <button class="btn-primary" id="btnFaceoffTop" disabled>Top-Antwort genannt → Kontrolle</button>
        <button class="btn-bad" id="btnFaceoffMiss" disabled>Nicht die Top-Antwort — nächste Person</button>
      </div>
    </div>

    <div id="playingSection" style="display:none;">
      <div class="lives-display" id="livesDisplay"></div>
      <div class="row">
        <button class="btn-bad" id="btnStrike">Falscher Versuch — 1 Leben weg</button>
      </div>
    </div>

    <div id="manualSection" style="display:none;">
      <div class="row">
        <button class="btn-ghost" id="btnManualResolve">Runde manuell beenden</button>
      </div>
    </div>

    <h2 style="margin-top:20px;">Antworten — nur für dich sichtbar</h2>
    <div class="answers-board" id="answersBoard"></div>
  </div>

</div>

<script>
const SUPABASE_URL = "https://dazabcxqplkvcyeiesgd.supabase.co";
const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRhemFiY3hxcGxrdmN5ZWllc2dkIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE4NTQ0NzksImV4cCI6MjA5NzQzMDQ3OX0.N3Dca8Quii4M8nFYLHjzBslby_tBUCyH1-WnPfYW01Y";

const sb = window.KA_SB || supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

const defaultState = {
  teamA: { score:0 },
  teamB: { score:0 },
  players: {},
  questionIndex: null,
  usedIndices: [],
  currentFrage: null,
  answers: [],
  pot: 0,
  phase: 'idle',
  buzzQueue: [],
  person1: null,
  person2: null,
  faceoffTurn: 'first',
  controllingTeam: null,
  controlLives: 3,
  controlPasses: 0,
  activePlayer: null,
  buzzFlashName: null,
  buzzFlashAt: null,
  stealFlashAt: null,
  lastResult: null,
  poolExhausted: false
};
let state = JSON.parse(JSON.stringify(defaultState));

async function loadState(){
  const { data } = await sb.from('cd_state').select('state').eq('id',1).single();
  state = Object.assign(JSON.parse(JSON.stringify(defaultState)), data?.state||{});
  render();
}
async function saveState(){
  await sb.from('cd_state').update({ state }).eq('id',1);
}
loadState();
setInterval(loadState, 2000);

sb.channel('cd_state_channel_sl')
  .on('postgres_changes', { event:'*', schema:'public', table:'cd_state' }, payload=>{
    state = payload.new.state || state;
    render();
  }).subscribe();

function teamRoster(team){
  return Object.entries(state.players).filter(([n,p])=>p.team===team).map(([n])=>n);
}

function advanceActivePlayer(team){
  const roster = teamRoster(team);
  if(roster.length===0){ state.activePlayer = null; return; }
  const idx = roster.indexOf(state.activePlayer);
  state.activePlayer = roster[(idx+1) % roster.length];
}

function render(){
  document.getElementById('scoreA').textContent = state.teamA.score;
  document.getElementById('scoreB').textContent = state.teamB.score;

  const unassignedEl = document.getElementById('unassignedPlayers');
  const unassigned = Object.entries(state.players).filter(([n,p])=>!p.team).map(([n])=>n);
  unassignedEl.innerHTML = unassigned.length ? unassigned.map(name=>`
    <div class="player-row">
      <span class="name">${name}</span>
      <button class="btn-ghost mini" data-assign="${name}|A">→ A</button>
      <button class="btn-ghost mini" data-assign="${name}|B">→ B</button>
    </div>
  `).join('') : '<span style="color:var(--muted);font-size:13px;">— niemand beigetreten —</span>';
  unassignedEl.querySelectorAll('[data-assign]').forEach(b=>{
    b.onclick = async ()=>{
      const [name, team] = b.dataset.assign.split('|');
      state.players[name].team = team;
      await saveState();
    };
  });

  ['A','B'].forEach(team=>{
    const el = document.getElementById('players'+team);
    const names = Object.entries(state.players).filter(([n,p])=>p.team===team).map(([n])=>n);
    el.innerHTML = names.length ? names.map(name=>`
      <div class="player-row ${name===state.activePlayer?'active':''}">
        <button class="mic-btn ${name===state.activePlayer?'on':''}" data-mic="${name}">🎤</button>
        <span class="name">${name}</span>
        <button class="btn-ghost mini" data-unassign="${name}">✕</button>
      </div>
    `).join('') : '<span style="color:var(--muted);font-size:13px;">— leer —</span>';
    el.querySelectorAll('[data-unassign]').forEach(b=>{
      b.onclick = async ()=>{
        delete state.players[b.dataset.unassign];
        await saveState();
      };
    });
    el.querySelectorAll('[data-mic]').forEach(b=>{
      b.onclick = async ()=>{
        state.activePlayer = state.activePlayer===b.dataset.mic ? null : b.dataset.mic;
        await saveState();
      };
    });
  });

  const statusLine = document.getElementById('statusLine');
  const potDisplay = document.getElementById('potDisplay');
  const faceoffSection = document.getElementById('faceoffSection');
  const playingSection = document.getElementById('playingSection');
  const manualSection = document.getElementById('manualSection');
  const answersBoard = document.getElementById('answersBoard');

  potDisplay.textContent = state.currentFrage ? `Frage: ${state.currentFrage} — Pot: ${state.pot} Punkte` : '';

  faceoffSection.style.display = state.phase==='faceoff' ? 'block' : 'none';
  playingSection.style.display = state.phase==='playing' ? 'block' : 'none';
  manualSection.style.display = state.phase==='manual' ? 'block' : 'none';

  if(!state.currentFrage){
    statusLine.textContent = state.poolExhausted
      ? 'Alle Fragen wurden bereits gestellt. Klick "Fragen-Pool zurücksetzen".'
      : 'Keine Frage aktiv.';
  } else if(state.phase==='buzz'){
    statusLine.textContent = 'Warte, bis jemand zuerst buzzert.';
  } else if(state.phase==='faceoff'){
    statusLine.textContent = 'Face-Off läuft — wer nennt zuerst die Top-Antwort?';
  } else if(state.phase==='playing'){
    statusLine.innerHTML = `Team ${state.controllingTeam} ist am Zug.`;
  } else if(state.phase==='manual'){
    statusLine.textContent = 'Beide Teams haben ihre Versuche verbraucht — löse die Runde manuell auf.';
  } else if(state.phase==='resolved'){
    statusLine.textContent = state.lastResult || 'Runde beendet.';
  }

  if(state.phase==='faceoff'){
    const p1Team = state.players[state.person1]?.team || '?';
    document.getElementById('faceoffP1Name').textContent = state.person1 || '—';
    document.querySelector('#faceoffP1 .role').textContent = 'Team ' + p1Team + ' — zuerst gebuzzert';
    document.getElementById('faceoffP2Name').textContent = state.person2 || 'wartet auf Buzz…';
    document.getElementById('faceoffP1').classList.toggle('turn', state.faceoffTurn==='first');
    document.getElementById('faceoffP2').classList.toggle('turn', state.faceoffTurn==='second');

    const currentPerson = state.faceoffTurn==='first' ? state.person1 : state.person2;
    document.getElementById('btnFaceoffTop').disabled = !currentPerson;
    document.getElementById('btnFaceoffMiss').disabled = !currentPerson;
  }

  if(state.phase==='playing'){
    document.getElementById('livesDisplay').innerHTML =
      `Team ${state.controllingTeam} — Leben: ` + '❤️'.repeat(state.controlLives) + '🖤'.repeat(3-state.controlLives) +
      ` — Versuch ${state.controlPasses}/3`;
  }

  answersBoard.innerHTML = state.answers.map((a,i)=>`
    <div class="answer-row ${a.revealed?'revealed':''}" data-reveal="${i}">
      <span class="text">${a.revealed ? '✓ ' : ''}${a.text}</span>
      <span class="pts">${a.punkte} Pkt.</span>
    </div>
  `).join('');
  answersBoard.querySelectorAll('[data-reveal]').forEach(row=>{
    row.onclick = ()=>revealAnswer(parseInt(row.dataset.reveal,10));
  });
}

function addPlayer(){
  const input = document.getElementById('newPlayerName');
  const name = input.value.trim();
  if(!name || state.players[name]) return;
  state.players[name] = { team: null };
  input.value = '';
  saveState();
}
document.getElementById('btnAddPlayer').onclick = addPlayer;
document.getElementById('newPlayerName').addEventListener('keydown', e=>{ if(e.key==='Enter') addPlayer(); });

document.getElementById('btnScoreMinusA').onclick = ()=>{ state.teamA.score -= 10; saveState(); };
document.getElementById('btnScorePlusA').onclick = ()=>{ state.teamA.score += 10; saveState(); };
document.getElementById('btnScoreMinusB').onclick = ()=>{ state.teamB.score -= 10; saveState(); };
document.getElementById('btnScorePlusB').onclick = ()=>{ state.teamB.score += 10; saveState(); };

document.getElementById('btnResetScores').onclick = async ()=>{
  if(!confirm('Punkte, Runde und Fragen-Pool komplett zurücksetzen?')) return;
  state.teamA.score = 0;
  state.teamB.score = 0;
  Object.assign(state, {
    questionIndex:null, usedIndices:[], currentFrage:null, answers:[], pot:0, phase:'idle',
    buzzQueue:[], person1:null, person2:null, faceoffTurn:'first', controllingTeam:null,
    controlLives:3, controlPasses:0, activePlayer:null, buzzFlashName:null, buzzFlashAt:null,
    lastResult:null, poolExhausted:false
  });
  await saveState();
};

document.getElementById('btnNewQuestion').onclick = async ()=>{
  const total = QUESTIONS.length;
  let available = [...Array(total).keys()].filter(i=>!state.usedIndices.includes(i));
  if(available.length===0){
    state.currentFrage = null;
    state.poolExhausted = true;
    await saveState();
    return;
  }
  const idx = available[Math.floor(Math.random()*available.length)];
  state.questionIndex = idx;
  state.usedIndices.push(idx);
  state.answers = QUESTIONS[idx].antworten.map(a=>({ text:a.text, punkte:a.punkte, revealed:false, team:null }));
  state.currentFrage = QUESTIONS[idx].frage;
  state.round = (state.round || 0) + 1;
  state.pot = 0;
  state.phase = 'buzz';
  state.buzzQueue = [];
  state.person1 = null;
  state.person2 = null;
  state.faceoffTurn = 'first';
  state.controllingTeam = null;
  state.controlLives = 3;
  state.controlPasses = 0;
  state.activePlayer = null;
  state.buzzFlashName = null;
  state.buzzFlashAt = null;
  state.stealFlashAt = null;
  state.poolExhausted = false;
  state.lastResult = null;
  await saveState();
};

document.getElementById('btnResetPool').onclick = async ()=>{
  state.usedIndices = [];
  state.poolExhausted = false;
  await saveState();
};

document.getElementById('btnFaceoffTop').onclick = async ()=>{
  const person = state.faceoffTurn==='first' ? state.person1 : state.person2;
  if(!person) return;
  const team = state.players[person]?.team;
  state.controllingTeam = team;
  state.controlLives = 3;
  state.controlPasses = 1;
  state.activePlayer = teamRoster(team)[0] || person;
  state.phase = state.answers.every(a=>a.revealed) ? 'resolved' : 'playing';
  if(state.phase==='resolved'){
    state['team'+team].score += state.pot;
    state.lastResult = `Team ${team} löst alle Antworten und bekommt ${state.pot} Punkte!`;
  }
  await saveState();
};

document.getElementById('btnFaceoffMiss').onclick = async ()=>{
  state.faceoffTurn = state.faceoffTurn==='first' ? 'second' : 'first';
  state.activePlayer = state.faceoffTurn==='first' ? state.person1 : state.person2;
  await saveState();
};

async function revealAnswer(i){
  const a = state.answers[i];
  if(!a || a.revealed) return;
  if(state.phase!=='playing' && state.phase!=='faceoff') return;

  a.revealed = true;

  let holer = state.controllingTeam;
  if(state.phase === 'faceoff' && state.activePlayer && state.players[state.activePlayer]){
    holer = state.players[state.activePlayer].team;
  }
  a.team = holer || null;
  state.pot += a.punkte;

  if(state.phase==='playing' && state.answers.every(x=>x.revealed)){
    state['team'+state.controllingTeam].score += state.pot;
    state.lastResult = `Team ${state.controllingTeam} löst alle Antworten und bekommt ${state.pot} Punkte!`;
    state.phase = 'resolved';
  }
  await saveState();
}

document.getElementById('btnStrike').onclick = async ()=>{
  if(state.phase!=='playing') return;
  state.controlLives -= 1;
  if(state.controlLives <= 0){
    if(state.controlPasses < 3){
      const newTeam = state.controllingTeam==='A' ? 'B' : 'A';
      const newPasses = state.controlPasses + 1;
      state.controllingTeam = newTeam;
      state.controlLives = newPasses>=3 ? 1 : 3;
      state.controlPasses = newPasses;
      state.activePlayer = teamRoster(newTeam)[0] || null;
      state.stealFlashAt = Date.now();
    } else {
      state.phase = 'manual';
    }
  } else {
    advanceActivePlayer(state.controllingTeam);
  }
  await saveState();
};

document.getElementById('btnManualResolve').onclick = async ()=>{
  state.lastResult = 'Runde manuell beendet — niemand bekommt den Pot.';
  state.phase = 'resolved';
  await saveState();
};
</script>
<script src="../zurueck.js"></script>
<script src="../hintergrund.js"></script>
<script src="../sound-toggle.js"></script>
<script src="../bestenliste.js"></script>
<script src="../spiel-beenden.js"></script>
<script>
  SpielBeenden.init({
    format: 'chatduell',
    sammle: async function () {
      const { data } = await sb.from('cd_state').select('state').eq('id', 1).single();
      const s = (data && data.state) || {};
      const players = s.players || {};
      const punkteFuer = {
        A: (s.teamA && s.teamA.score) || 0,
        B: (s.teamB && s.teamB.score) || 0
      };
      return Object.entries(players).map(function (e) {
        const team = e[1] && e[1].team;
        return { spieler: e[0], punkte: punkteFuer[team] || 0 };
      });
    }
  });
</script>
</body>
</html>
