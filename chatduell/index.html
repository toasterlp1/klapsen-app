<!doctype html>
<html lang="de">
<head>
<meta charset="utf-8" />
<title>ChatDuell</title>
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Anton&family=Inter:wght@500;700;800;900&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0a0e1a; --bg2:#0d1120; --panel:#12172a; --panel2:#171d36; --line:#232b45;
  --ink:#eef1f8; --muted:#7a84a0; --accent:#c76bff; --good:#00e5c7; --teamA:#ff3860; --teamB:#3a7bff;
  --ease:cubic-bezier(.22,.9,.32,1); --ease-out:cubic-bezier(.16,1,.3,1);
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{
  background:radial-gradient(ellipse at top,#171f3c 0%,var(--bg) 62%);
  color:var(--ink);font-family:'Inter',sans-serif;overflow-x:hidden;
  min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:40px;padding:30px;
}
.bg-fx{position:fixed;inset:0;z-index:-1;overflow:hidden;pointer-events:none}
.bg-fx span{position:absolute;border-radius:50%;filter:blur(85px);will-change:transform}
.bg-fx .b1{width:760px;height:760px;top:-240px;left:-200px;background:radial-gradient(circle,rgba(199,107,255,.5),transparent 68%);animation:driftA 22s var(--ease) infinite alternate}
.bg-fx .b2{width:700px;height:700px;bottom:-240px;right:-180px;background:radial-gradient(circle,rgba(0,229,199,.4),transparent 68%);animation:driftB 26s var(--ease) infinite alternate}
@keyframes driftA{0%{transform:translate(0,0) scale(1)}50%{transform:translate(160px,120px) scale(1.16)}100%{transform:translate(30px,220px) scale(.92)}}
@keyframes driftB{0%{transform:translate(0,0) scale(1)}50%{transform:translate(-140px,-100px) scale(1.14)}100%{transform:translate(-220px,20px) scale(.95)}}
@media (prefers-reduced-motion: reduce){*,*::before,*::after{animation-duration:.01ms !important;animation-iteration-count:1 !important;transition-duration:.01ms !important}}

@keyframes riseIn{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
.logo{
  font-family:'Anton',sans-serif;font-size:clamp(44px,8.5vw,100px);font-weight:400;letter-spacing:-.5px;
  display:flex;flex-direction:column;align-items:center;line-height:.95;text-align:center;
  animation:riseIn .6s var(--ease-out) both;
}
.logo .row{display:flex;align-items:center;gap:6px}
.logo .chat{color:#fff}
.logo .duell{background:linear-gradient(120deg,var(--accent),var(--good));-webkit-background-clip:text;background-clip:text;color:transparent}
.logo small{display:block;font-family:'Inter',sans-serif;font-size:.15em;letter-spacing:6px;font-weight:800;color:var(--muted);margin-top:10px;text-transform:uppercase}

.role-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:22px;max-width:920px;width:100%}
.role-card{
  background:linear-gradient(160deg,var(--panel2),var(--panel));
  border:1px solid var(--line);border-radius:18px;padding:34px 26px;text-align:center;
  transition:transform .4s var(--ease-out),border-color .4s var(--ease),box-shadow .4s var(--ease);
  display:flex;flex-direction:column;align-items:center;gap:14px;
  animation:riseIn .6s var(--ease-out) both;text-decoration:none;color:inherit;
}
.role-card:nth-child(1){animation-delay:.08s}
.role-card:nth-child(2){animation-delay:.16s}
.role-card:nth-child(3){animation-delay:.24s}
.role-card:hover{transform:translateY(-6px)}
.role-card:active{transform:translateY(-3px) scale(.98);transition-duration:.12s}
.role-card .ic{width:54px;height:54px;display:flex;align-items:center;justify-content:center}
.role-card .ic svg{width:100%;height:100%}
.role-card h3{font-family:'Anton',sans-serif;font-size:24px;font-weight:400;letter-spacing:1px}
.role-card p{color:var(--muted);font-size:14px;line-height:1.5}
.role-card.host:hover{border-color:var(--accent);box-shadow:0 18px 50px -20px rgba(199,107,255,.5)}
.role-card.host .ic{color:var(--accent);filter:drop-shadow(0 0 18px rgba(199,107,255,.6))}
.role-card.master:hover{border-color:var(--good);box-shadow:0 18px 50px -20px rgba(0,229,199,.5)}
.role-card.master .ic{color:var(--good);filter:drop-shadow(0 0 18px rgba(0,229,199,.6))}
.role-card.buzz:hover{border-color:var(--teamA);box-shadow:0 18px 50px -20px rgba(255,56,96,.5)}
.role-card.buzz .ic{color:var(--teamA);filter:drop-shadow(0 0 18px rgba(255,56,96,.6))}
@media(max-width:760px){.role-grid{grid-template-columns:1fr}}
</style>
<link rel="stylesheet" href="../responsive.css" />
</head>
<body>

<div class="bg-fx" aria-hidden="true"><span class="b1"></span><span class="b2"></span></div>

<div class="logo">
  <span class="row"><span class="chat">CHAT</span><span class="duell">DUELL</span></span>
</div>

<div class="role-grid">
  <a class="role-card host" href="./host.html">
    <h3>HOST</h3>
  </a>
  <a class="role-card master" href="./spielleiter.html">
    <h3>SPIELLEITER</h3>
  </a>
  <a class="role-card buzz" href="./buzzer.html">
    <h3>BUZZER</h3>
  </a>
</div>

<script src="../zurueck.js"></script>
<script src="../hintergrund.js"></script>
</body>
</html>
