<!doctype html>
<html lang="de">
<head>
<meta charset="utf-8" />
<title>Ausredenkönig</title>
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Anton&family=Inter:wght@700&display=swap" rel="stylesheet">
<style>
  :root{ --bg:#07100c; --panel:#0d2318; --panel-border:#1c4030; --ink:#eefaf2; --accent:#3ddc84; }
  *{box-sizing:border-box;}
  html,body{height:100%;margin:0;}
  body{
    background:var(--bg);color:var(--ink);font-family:'Inter',sans-serif;
    display:flex;flex-direction:column;align-items:center;justify-content:center;gap:22px;
  }
  h1{font-family:'Anton',sans-serif;letter-spacing:3px;font-size:32px;margin-bottom:6px;}
  a{
    display:block;width:260px;text-align:center;padding:16px;border-radius:12px;
    background:var(--panel);border:1px solid var(--panel-border);color:var(--ink);
    text-decoration:none;font-weight:700;transition:border-color .2s;
  }
  a:hover{border-color:var(--accent);}
</style>
<link rel="stylesheet" href="../responsive.css" />
</head>
