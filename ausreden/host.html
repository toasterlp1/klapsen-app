<!doctype html>
<html class="host" lang="de">
<head>
<meta charset="utf-8" />
<title>Ausredenkönig — Host</title>
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Anton&family=Chakra+Petch:wght@500;600;700&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="../auth.js"></script>
<script src="../avatare.js"></script>
<style>
  :root{
    --bg-0:#07100c;
    --bg-1:#0a1f16;
    --panel:#0d2318;
    --panel-2:#123020;
    --border:rgba(61,220,132,.22);
    --gruen:#3ddc84;
    --gruen-soft:rgba(61,220,132,.14);
    --gold:#ffc23d;
    --gold-soft:rgba(255,194,61,.14);
    --warm:#ff9f45;
    --ink:#eefaf2;
    --muted:#87b39c;
    --font-display:'Anton',sans-serif;
    --font-ui:'Chakra Petch',sans-serif;
    --font-body:'Inter',sans-serif;
    --ease:cubic-bezier(.22,.9,.32,1);
  }

  /* Handy-Skalierung: Bezugsgroesse wechselt hochkant auf die Hoehe */
  :root{ --u: 1vw; }
  @media (max-width:900px) and (orientation:portrait){
    :root{ --u: 0.62vh; }
    html.host, body.host{ height:auto; min-height:100%; overflow-y:auto; overflow-x:hidden; }
  }
  @media (max-width:900px) and (orientation:portrait) and (min-aspect-ratio:3/5){
    :root{ --u: 0.72vh; }
  }
  @media (max-height:520px) and (orientation:landscape){
    :root{ --u: 1.35vh; }
  }

  *{box-sizing:border-box;margin:0;padding:0;}
  html,body{
    width:100%;height:100%;overflow:hidden;color:var(--ink);
    font-family:var(--font-body);
    background:
      radial-gradient(ellipse at 50% -8%, rgba(61,220,132,.26), transparent 55%),
      radial-gradient(ellipse at 12% 108%, rgba(255,194,61,.10), transparent 46%),
      radial-gradient(ellipse at 88% 108%, rgba(255,159,69,.09), transparent 46%),
      linear-gradient(180deg, var(--bg-0), var(--bg-1));
  }

  .stage{
    position:relative;width:100%;height:100%;
    display:flex;flex-direction:column;align-items:center;
    padding:3.4vh 4vw 3.6vh;
  }

  .orbs{position:fixed;inset:0;z-index:0;overflow:hidden;pointer-events:none;}
  .orbs span{position:absolute;border-radius:50%;filter:blur(90px);will-change:transform;opacity:.5;}
  .orbs .o1{width:calc(40 * var(--u));height:calc(40 * var(--u));top:calc(-8 * var(--u));left:calc(-6 * var(--u));
    background:radial-gradient(circle,rgba(61,220,132,.55),transparent 68%);
    animation:driftA 24s var(--ease) infinite alternate;}
  .orbs .o2{width:calc(34 * var(--u));height:calc(34 * var(--u));bottom:calc(-10 * var(--u));right:calc(-4 * var(--u));
    background:radial-gradient(circle,rgba(255,194,61,.36),transparent 68%);
    animation:driftB 28s var(--ease) infinite alternate;}
  .orbs .o3{width:calc(32 * var(--u));height:calc(32 * var(--u));bottom:calc(-12 * var(--u));left:calc(32 * var(--u));
    background:radial-gradient(circle,rgba(255,159,69,.3),transparent 70%);
    animation:driftC 32s var(--ease) infinite alternate;}
  @keyframes driftA{0%{transform:translate(0,0) scale(1);}50%{transform:translate(14vw,10vw) scale(1.16);}100%{transform:translate(3vw,18vw) scale(.92);}}
  @keyframes driftB{0%{transform:translate(0,0) scale(1);}50%{transform:translate(-12vw,-9vw) scale(1.14);}100%{transform:translate(-18vw,2vw) scale(.95);}}
  @keyframes driftC{0%{transform:translate(0,0) scale(1);}50%{transform:translate(0,-6vw) scale(1.22);}100%{transform:translate(0,5vw) scale(.9);}}

  .ambient{position:fixed;inset:0;z-index:1;pointer-events:none;overflow:hidden;}
  .mask-float{position:absolute;bottom:-8vh;color:var(--gruen);opacity:0;filter:drop-shadow(0 0 10px rgba(61,220,132,.5));animation:rise linear infinite;}
  @keyframes rise{
    0%{transform:translateY(0) rotate(0deg);opacity:0;}
    12%{opacity:.24;}
    88%{opacity:.16;}
    100%{transform:translateY(-118vh) rotate(240deg);opacity:0;}
  }

  @keyframes riseIn{from{opacity:0;transform:translateY(20px);}to{opacity:1;transform:translateY(0);}}
  @keyframes popIn{0%{opacity:0;transform:scale(.82) translateY(14px);}60%{transform:scale(1.04) translateY(0);}100%{opacity:1;transform:scale(1);}}

  .head{position:relative;z-index:2;display:flex;flex-direction:column;align-items:center;margin-bottom:2.2vh;animation:riseIn .6s var(--ease) both;}
  .logo{
    font-family:var(--font-display);font-size:calc(3.1 * var(--u));letter-spacing:calc(.28 * var(--u));
    text-transform:uppercase;line-height:1;
    background:linear-gradient(92deg,var(--gruen),var(--gold));
    -webkit-background-clip:text;background-clip:text;color:transparent;
  }
  .logo em{font-style:normal;color:var(--gold);-webkit-text-fill-color:var(--gold);}
  .tag{
    font-family:var(--font-ui);font-weight:600;font-size:calc(.92 * var(--u));
    letter-spacing:calc(.3 * var(--u));text-transform:uppercase;color:var(--muted);margin-top:.5vh;
  }

  .frage{
    position:relative;z-index:2;text-align:center;
    font-family:var(--font-display);font-size:calc(2.5 * var(--u));line-height:1.3;
    max-width:82vw;margin-bottom:2.6vh;animation:riseIn .6s var(--ease) .1s both;
  }

  /* ---- Wartephase: Ringe drehen, Gruen bei fertig ---- */
  .lobby{position:relative;z-index:2;flex:1;display:flex;flex-wrap:wrap;align-content:center;justify-content:center;gap:calc(2.6 * var(--u)) calc(2.2 * var(--u));}
  .spieler{display:flex;flex-direction:column;align-items:center;gap:1vh;opacity:.4;transition:opacity .45s var(--ease);animation:popIn .5s var(--ease) both;}
  .lobby .spieler:nth-child(1){animation-delay:.14s;}
  .lobby .spieler:nth-child(2){animation-delay:.20s;}
  .lobby .spieler:nth-child(3){animation-delay:.26s;}
  .lobby .spieler:nth-child(4){animation-delay:.32s;}
  .lobby .spieler:nth-child(5){animation-delay:.38s;}
  .lobby .spieler:nth-child(6){animation-delay:.44s;}
  .lobby .spieler:nth-child(7){animation-delay:.50s;}
  .lobby .spieler:nth-child(8){animation-delay:.56s;}
  .spieler.fertig{opacity:1;}

  .spieler .ring{
    position:relative;width:calc(6.4 * var(--u));height:calc(6.4 * var(--u));border-radius:50%;padding:calc(.35 * var(--u));
    background:var(--panel-2);border:calc(.28 * var(--u)) solid var(--border);transition:all .45s var(--ease);
  }
  .spieler:not(.fertig) .ring{animation:denk 2.6s ease-in-out infinite;}
  @keyframes denk{
    0%,100%{box-shadow:0 0 0 0 rgba(61,220,132,0);border-color:var(--border);}
    50%{box-shadow:0 0 22px -6px rgba(61,220,132,.6);border-color:rgba(61,220,132,.5);}
  }
  .spieler .ring::before{
    content:'';position:absolute;inset:calc(-.28 * var(--u));border-radius:50%;z-index:0;
    background:conic-gradient(from 0deg, transparent 0 70%, rgba(61,220,132,.9) 85%, transparent 100%);
    opacity:0;transition:opacity .4s var(--ease);animation:spin 3.4s linear infinite;
  }
  .spieler:not(.fertig) .ring::before{opacity:.7;}
  @keyframes spin{to{transform:rotate(360deg);}}

  .spieler.fertig .ring{
    border-color:var(--gruen);
    box-shadow:0 0 34px -8px var(--gruen);
    animation:fertigPop .45s var(--ease);
  }
  @keyframes fertigPop{0%{transform:scale(1);}45%{transform:scale(1.12);}100%{transform:scale(1);}}
  .spieler .ring img{width:100%;height:100%;border-radius:50%;object-fit:cover;position:relative;z-index:1;}
  .spieler .haken{
    position:absolute;right:calc(-.3 * var(--u));bottom:calc(-.3 * var(--u));width:calc(2 * var(--u));height:calc(2 * var(--u));border-radius:50%;
    background:var(--gruen);color:#04140b;display:flex;align-items:center;justify-content:center;
    border:calc(.22 * var(--u)) solid var(--bg-1);
    opacity:0;transform:scale(.4);transition:all .4s var(--ease);z-index:2;
  }
  .spieler.fertig .haken{opacity:1;transform:scale(1);}
  .spieler .haken svg{width:60%;height:60%;}
  .spieler .n{font-family:var(--font-ui);font-weight:600;font-size:calc(1.05 * var(--u));letter-spacing:1px;text-transform:uppercase;}

  /* ---- Ausreden-Karten ---- */
  .grid{
    position:relative;z-index:2;flex:1;width:100%;max-width:92vw;
    display:grid;grid-template-columns:repeat(auto-fit,minmax(calc(26 * var(--u)),1fr));
    gap:calc(1.2 * var(--u));align-content:center;
  }
  .karte{
    position:relative;background:var(--panel);border:calc(.16 * var(--u)) solid var(--border);
    border-radius:calc(1.1 * var(--u));padding:calc(1.3 * var(--u)) calc(1.5 * var(--u));
    display:flex;align-items:center;gap:calc(1 * var(--u));
    transition:transform .45s var(--ease), border-color .45s var(--ease), box-shadow .45s var(--ease);
    animation:popIn .5s var(--ease) both;
  }
  .karte .nr{
    flex-shrink:0;width:calc(2.6 * var(--u));height:calc(2.6 * var(--u));border-radius:50%;
    background:var(--gruen-soft);border:calc(.14 * var(--u)) solid var(--border);
    display:flex;align-items:center;justify-content:center;
    font-family:var(--font-display);font-size:calc(1.2 * var(--u));color:var(--gruen);
  }
  .karte .body{flex:1;min-width:0;}
  .karte .txt{font-size:calc(1.25 * var(--u));line-height:1.35;font-weight:500;}
  .karte .autor{
    font-family:var(--font-ui);font-size:calc(.85 * var(--u));letter-spacing:1px;text-transform:uppercase;
    color:var(--muted);margin-top:.5vh;max-height:0;opacity:0;overflow:hidden;transition:all .45s var(--ease);
  }
  .karte.zeigen .autor{max-height:calc(3 * var(--u));opacity:1;}
  .karte .stimmen{display:flex;gap:calc(.35 * var(--u));flex-shrink:0;}
  .karte .stimmen img{
    width:calc(2.5 * var(--u));height:calc(2.5 * var(--u));border-radius:50%;object-fit:cover;
    border:calc(.14 * var(--u)) solid var(--gold);animation:popIn .4s var(--ease) both;
  }
  .karte.sieger{
    border-color:var(--gold);
    background:linear-gradient(160deg,rgba(255,194,61,.16),var(--panel));
    box-shadow:0 0 60px -14px var(--gold);
    transform:scale(1.03);
  }
  .karte.sieger .nr{background:var(--gold-soft);border-color:var(--gold);color:var(--gold);}
  .karte.sieger .autor{color:var(--gold);font-weight:800;}

  /* ---- Fuss ---- */
  .fuss{
    position:relative;z-index:2;width:100%;max-width:80vw;margin-top:2.4vh;
    display:flex;align-items:center;justify-content:center;gap:calc(1.4 * var(--u));
  }
  .phase-pill{
    display:inline-flex;align-items:center;gap:calc(.7 * var(--u));
    font-family:var(--font-ui);font-weight:700;font-size:calc(1.05 * var(--u));letter-spacing:1.5px;text-transform:uppercase;
    padding:.9vh calc(1.4 * var(--u));border-radius:999px;
    background:var(--gruen-soft);border:calc(.12 * var(--u)) solid var(--border);color:var(--gruen);
  }
  .phase-pill.gold{background:var(--gold-soft);border-color:var(--gold);color:var(--gold);}
  .phase-pill .dot{width:calc(.6 * var(--u));height:calc(.6 * var(--u));border-radius:50%;background:currentColor;animation:blink 1.4s ease-in-out infinite;}
  @keyframes blink{0%,100%{opacity:1;}50%{opacity:.3;}}
  .zaehler{font-family:var(--font-ui);font-size:calc(1.05 * var(--u));color:var(--muted);letter-spacing:1px;}

  /* ---- Scoreboard ---- */
  .scoreboard{
    position:relative;z-index:2;display:flex;flex-wrap:wrap;justify-content:center;
    gap:calc(.8 * var(--u));margin-top:1.8vh;
  }
  .score{
    display:flex;align-items:center;gap:calc(.5 * var(--u));
    background:var(--panel);border:calc(.12 * var(--u)) solid var(--border);
    border-radius:999px;padding:.6vh calc(1 * var(--u));
    font-family:var(--font-ui);font-size:calc(.95 * var(--u));
    transition:all .4s var(--ease);
  }
  .score img{width:calc(1.9 * var(--u));height:calc(1.9 * var(--u));border-radius:50%;object-fit:cover;}
  .score .p{color:var(--gruen);font-weight:700;}
  .score .plus{color:var(--gold);font-weight:800;animation:popIn .4s var(--ease) both;}

  .warten{
    position:relative;z-index:2;flex:1;display:flex;flex-direction:column;
    align-items:center;justify-content:center;gap:1.4vh;
  }
  .warten .small{
    font-family:var(--font-ui);font-size:calc(1.1 * var(--u));letter-spacing:calc(.3 * var(--u));
    text-transform:uppercase;color:var(--muted);
  }
  .warten .big{font-family:var(--font-display);font-size:calc(3.4 * var(--u));}
</style>
<link rel="stylesheet" href="../responsive.css" />
</head>
<body class="host">

<div class="orbs"><span class="o1"></span><span class="o2"></span><span class="o3"></span></div>
<div class="stage" id="stage">
  <div class="warten"><div class="small">Ausredenkönig</div><div class="big">Warte auf Runde…</div></div>
</div>

<script src="../avatare.js"></script>
<script>
const sb = window.KA_SB;
const stage = document.getElementById('stage');

const HAKEN = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg>';

let aktRundeId = null, aktPhase = null, reihenfolge = null, letzteRunde = null;

const esc = s => String(s == null ? '' : s)
  .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
const mische = a => a.map(v => [Math.random(), v]).sort((x,y) => x[0]-y[0]).map(p => p[1]);
const crew = () => (typeof AVATARE !== 'undefined') ? Object.keys(AVATARE) : [];
const bild = n => (typeof AVATARE !== 'undefined' && AVATARE[n]) ? AVATARE[n] : '';

function baueAmbient(){
  const amb = document.getElementById('ambient');
  if(!amb) return;
  for(let i = 0; i < 9; i++){
    const m = document.createElement('div');
    m.className = 'mask-float';
    const size = 2 + Math.random() * 3;
    m.style.width = size + 'vw';
    m.style.height = size + 'vw';
    m.style.left = (Math.random() * 96) + 'vw';
    m.style.animationDuration = (16 + Math.random() * 14) + 's';
    m.style.animationDelay = (-Math.random() * 18) + 's';
    m.innerHTML = '<svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 2l2.6 6.6L21 9.3l-4.9 4.3 1.5 6.6L12 16.8 6.4 20.2l1.5-6.6L3 9.3l6.4-.7z"/></svg>';
    amb.appendChild(m);
  }
}

async function zeichne(){
  if(!sb) return;

  const r = await sb.from('ausreden_runden')
    .select('*').order('erstellt', { ascending:false }).limit(1).maybeSingle();
  const runde = r.data;

  if(!runde){
    if(aktRundeId !== 'idle'){
      stage.innerHTML =
        '<div class="ambient" id="ambient"></div>' +
        '<div class="warten"><div class="small">Ausredenkönig</div><div class="big">Warte auf Runde…</div></div>';
      baueAmbient();
      aktRundeId = 'idle'; aktPhase = null;
    }
    return;
  }
  if(runde.id !== letzteRunde){ reihenfolge = null; letzteRunde = runde.id; }

  const ar = await sb.from('ausreden_texte').select('spieler,text').eq('runde_id', runde.id);
  const st = await sb.from('ausreden_stimmen').select('spieler,gewaehlt').eq('runde_id', runde.id);
  const ausreden = ar.data || [];
  const stimmen = st.data || [];

  const ges = {};
  const bl = await sb.from('ergebnisse').select('spieler,punkte').eq('format', 'ausreden');
  (bl.data || []).forEach(row => { ges[row.spieler] = (ges[row.spieler] || 0) + row.punkte; });

  // Punkte dieser Runde: je Stimme ein Punkt fuer den Autor
  const rundePunkte = {};
  stimmen.forEach(s => {
    const ziel = ausreden.find(a => a.text.toLowerCase() === String(s.gewaehlt).toLowerCase());
    if(ziel && ziel.spieler !== s.spieler)
      rundePunkte[ziel.spieler] = (rundePunkte[ziel.spieler] || 0) + 1;
  });

  const zeigeRunde = (runde.phase === 'aufloesung');
  const neuBauen = (runde.id !== aktRundeId) || (runde.phase !== aktPhase);

  if(neuBauen){
    baueGeruest(runde, ausreden, stimmen, rundePunkte);
    aktRundeId = runde.id; aktPhase = runde.phase;
  }

  patchLobby(ausreden);
  patchStimmen(ausreden, stimmen, runde);
  patchZaehler(runde, ausreden, stimmen);
  patchScoreboard(ges, rundePunkte, zeigeRunde);
}

function baueGeruest(runde, ausreden, stimmen, rundePunkte){
  const kopf =
    '<div class="ambient" id="ambient"></div>' +
    '<div class="head"><div class="logo">AUSREDEN<em>KÖNIG</em></div>' +
    '<div class="tag">Wer redet sich am besten raus</div></div>' +
    '<div class="frage">' + esc(runde.situation) + '</div>';

  // Phase 1: alle tippen gleichzeitig
  if(runde.phase === 'schreiben'){
    stage.innerHTML = kopf +
      '<div class="lobby" id="lobby">' +
        crew().map(n =>
          '<div class="spieler" data-name="' + esc(n) + '">' +
            '<div class="ring"><img src="' + bild(n) + '" alt="">' +
            '<div class="haken">' + HAKEN + '</div></div>' +
            '<div class="n">' + esc(n) + '</div>' +
          '</div>'
        ).join('') +
      '</div>' +
      '<div class="fuss">' +
        '<span class="phase-pill"><span class="dot"></span>Erfindet eure Ausreden</span>' +
        '<span class="zaehler" id="zaehler"></span>' +
      '</div>' +
      '<div id="scoreboard-slot"></div>';
    baueAmbient();
    return;
  }

  if(!reihenfolge){
    reihenfolge = mische(ausreden.map(a => ({ text:a.text, autor:a.spieler })));
  }

  // Sieger bestimmen fuer die Aufloesung
  let maxStimmen = 0;
  const zaehlung = {};
  stimmen.forEach(s => {
    const k = String(s.gewaehlt).toLowerCase();
    zaehlung[k] = (zaehlung[k] || 0) + 1;
    if(zaehlung[k] > maxStimmen) maxStimmen = zaehlung[k];
  });
  const auf = (runde.phase === 'aufloesung');

  const karten = reihenfolge.map((o, i) => {
    const treffer = zaehlung[o.text.toLowerCase()] || 0;
    const istSieger = auf && maxStimmen > 0 && treffer === maxStimmen;
    const klasse = 'karte' + (auf ? ' zeigen' : '') + (istSieger ? ' sieger' : '');
    return '<div class="' + klasse + '" data-text="' + esc(o.text.toLowerCase()) + '">' +
        '<div class="nr">' + (i+1) + '</div>' +
        '<div class="body">' +
          '<div class="txt">' + esc(o.text) + '</div>' +
          '<div class="autor">' + esc(o.autor) + '</div>' +
        '</div>' +
        '<div class="stimmen"></div>' +
      '</div>';
  }).join('');

  if(runde.phase === 'abstimmen'){
    stage.innerHTML = kopf +
      '<div class="grid" id="grid">' + karten + '</div>' +
      '<div class="fuss">' +
        '<span class="phase-pill"><span class="dot"></span>Welche Ausrede ist die beste?</span>' +
        '<span class="zaehler" id="zaehler"></span>' +
      '</div>' +
      '<div id="scoreboard-slot"></div>';
    baueAmbient();
    return;
  }

  stage.innerHTML = kopf +
    '<div class="grid" id="grid">' + karten + '</div>' +
    '<div class="fuss">' +
      '<span class="phase-pill gold"><span class="dot"></span>Auflösung</span>' +
      '<span class="zaehler" id="zaehler"></span>' +
    '</div>' +
    '<div id="scoreboard-slot"></div>';
  baueAmbient();
}

function patchLobby(ausreden){
  const lobby = document.getElementById('lobby');
  if(!lobby) return;
  const fertig = {};
  ausreden.forEach(a => fertig[a.spieler] = true);
  lobby.querySelectorAll('.spieler').forEach(el => {
    const n = el.getAttribute('data-name');
    el.classList.toggle('fertig', !!fertig[n]);
  });
}

function patchStimmen(ausreden, stimmen, runde){
  const grid = document.getElementById('grid');
  if(!grid) return;
  const zeigen = (runde.phase === 'aufloesung');

  grid.querySelectorAll('.karte').forEach(k => {
    const txt = k.getAttribute('data-text');
    const box = k.querySelector('.stimmen');
    if(!box) return;
    const wer = stimmen.filter(s => String(s.gewaehlt).toLowerCase() === txt);
    const soll = zeigen ? wer.map(s => s.spieler).join(',') : String(wer.length);
    if(box.getAttribute('data-stand') === soll) return;
    box.setAttribute('data-stand', soll);
    box.innerHTML = zeigen
      ? wer.map(s => '<img src="' + bild(s.spieler) + '" alt="" title="' + esc(s.spieler) + '">').join('')
      : '';
  });
}

function patchZaehler(runde, ausreden, stimmen){
  const z = document.getElementById('zaehler');
  if(!z) return;
  const gesamt = crew().length;
  if(runde.phase === 'schreiben') z.textContent = ausreden.length + ' / ' + gesamt;
  else if(runde.phase === 'abstimmen') z.textContent = stimmen.length + ' / ' + gesamt;
  else z.textContent = '';
}

function patchScoreboard(ges, rundePunkte, zeigeRunde){
  const slot = document.getElementById('scoreboard-slot');
  if(!slot) return;
  const namen = crew().slice().sort((a,b) => (ges[b]||0) - (ges[a]||0));
  const html = '<div class="scoreboard">' + namen.map(n => {
    const p = ges[n] || 0;
    const plus = zeigeRunde && rundePunkte[n] ? '<span class="plus">+' + rundePunkte[n] + '</span>' : '';
    return '<div class="score"><img src="' + bild(n) + '" alt="">' +
           '<span>' + esc(n) + '</span><span class="p">' + p + '</span>' + plus + '</div>';
  }).join('') + '</div>';
  if(slot.getAttribute('data-stand') === html) return;
  slot.setAttribute('data-stand', html);
  slot.innerHTML = html;
}

if(sb){
  zeichne();
  sb.channel('ausreden-host')
    .on('postgres_changes', { event:'*', schema:'public', table:'ausreden_runden' }, zeichne)
    .on('postgres_changes', { event:'*', schema:'public', table:'ausreden_texte' }, zeichne)
    .on('postgres_changes', { event:'*', schema:'public', table:'ausreden_stimmen' }, zeichne)
    .on('postgres_changes', { event:'*', schema:'public', table:'ergebnisse' }, zeichne)
    .subscribe();
  setInterval(zeichne, 2000);
}
