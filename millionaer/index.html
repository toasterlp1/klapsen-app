<!doctype html>
<html lang="de">
<head>
<meta charset="utf-8" />
<title>Klapsen App — Wer wird Millionär</title>
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Anton&family=Inter:wght@500;700;800;900&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="../auth.js"></script>
<style>
  :root{
    --bg:#0d0820; --panel:#1b1035; --panel2:#221645; --border:#3a2a5e;
    --ink:#f3f0ff; --muted:#9186b8;
    --gold:#f5c542; --spy:#6c5ce7; --risk:#c44dff;
    --ease:cubic-bezier(.22,.9,.32,1); --ease-out:cubic-bezier(.16,1,.3,1);
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  html,body{height:100%;}
  body{
    background:
      radial-gradient(ellipse 80% 60% at 50% 0%, #2d1b52 0%, transparent 60%),
      radial-gradient(ellipse 60% 50% at 50% 100%, #1e1040 0%, transparent 55%),
      var(--bg);
    color:var(--ink);font-family:'Inter',sans-serif;overflow:hidden;
    min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:44px;padding:30px;
  }

  .sparks{position:fixed;inset:0;z-index:0;overflow:hidden;pointer-events:none;}
  .spark{position:absolute;bottom:-20px;border-radius:50%;background:var(--gold);box-shadow:0 0 10px var(--gold);animation:rise linear infinite;}
  @keyframes rise{0%{transform:translateY(0) translateX(0) scale(1);opacity:0;}12%{opacity:.9;}88%{opacity:.5;}100%{transform:translateY(-108vh) translateX(var(--dx,30px)) scale(.6);opacity:0;}}
  body::before{
    content:'';position:fixed;inset:0;pointer-events:none;z-index:0;
    background-image:radial-gradient(rgba(255,255,255,.05) 1px, transparent 1px);
    background-size:24px 24px;
  }

  .wrap{position:relative;z-index:2;display:flex;flex-direction:column;align-items:center;gap:44px;}
  .logo{
    font-family:'Anton',sans-serif;font-size:clamp(30px,6.4vw,52px);letter-spacing:3px;line-height:1;
    text-align:center;color:#fff;text-shadow:0 0 26px rgba(168,85,247,.85), 0 4px 0 #5b2b8f;
    animation:riseIn .6s var(--ease-out) both;
  }
  .logo span{color:var(--gold);}
  .sub{font-size:12px;letter-spacing:5px;text-transform:uppercase;color:var(--muted);font-weight:700;margin-top:10px;text-align:center;animation:riseIn .6s var(--ease-out) .1s both;}
  .goldbar{width:min(300px,80vw);height:5px;border-radius:4px;margin-top:14px;
    background:linear-gradient(90deg,transparent,var(--gold),transparent);
    box-shadow:0 0 18px rgba(245,197,66,.5);position:relative;overflow:hidden;
    animation:riseIn .6s var(--ease-out) .15s both;}
  .goldbar::after{content:'';position:absolute;top:0;left:-40%;width:40%;height:100%;
    background:linear-gradient(90deg,transparent,rgba(255,255,255,.85),transparent);animation:sweep 2.6s var(--ease) infinite;}
  @keyframes sweep{0%{left:-40%;}100%{left:110%;}}

  .roles{display:flex;gap:20px;flex-wrap:wrap;justify-content:center;}
  .role{
    position:relative;width:230px;padding:30px 24px;border-radius:18px;text-decoration:none;color:var(--ink);
    background:linear-gradient(160deg,var(--panel2),var(--panel));border:1px solid var(--border);
    display:flex;flex-direction:column;align-items:center;gap:12px;overflow:hidden;
    transition:transform .4s var(--ease-out),border-color .35s var(--ease),box-shadow .35s var(--ease);
    animation:riseIn .6s var(--ease-out) both;
  }
  .role:nth-child(1){animation-delay:.20s;}
  .role:nth-child(2){animation-delay:.28s;}
  .role:nth-child(3){animation-delay:.36s;}
  .role::before{content:'';position:absolute;top:0;left:0;width:100%;height:3px;background:var(--rc);opacity:.9;}
  .role .ic{width:52px;height:52px;color:var(--rc);filter:drop-shadow(0 0 12px var(--rc));}
  .role .ic svg{width:100%;height:100%;}
  .role h3{font-family:'Anton',sans-serif;font-size:22px;letter-spacing:1px;text-transform:uppercase;}
  .role p{color:var(--muted);font-size:13px;text-align:center;line-height:1.5;}
  .role:hover{transform:translateY(-6px);border-color:var(--rc);box-shadow:0 18px 50px -20px var(--rc);}
  .role:active{transform:translateY(-3px) scale(.98);}
  .role.host{--rc:var(--gold);}
  .role.master{--rc:var(--spy);}
  .role.buzz{--rc:var(--risk);}

  @keyframes riseIn{from{opacity:0;transform:translateY(18px);}to{opacity:1;transform:translateY(0);}}
  @media (prefers-reduced-motion: reduce){*,*::before,*::after{animation-duration:.01ms !important;animation-iteration-count:1 !important;}}
  @media(max-width:720px){.roles{gap:14px;}.role{width:min(80vw,260px);}}
</style>
<link rel="stylesheet" href="../responsive.css" />
</head>
<body>
<div class="sparks" id="sparks" aria-hidden="true"></div>

<div class="wrap">
  <div style="display:flex;flex-direction:column;align-items:center;">
    <div class="logo">WER WIRD <span>MILLIONÄR</span></div>
    <div class="goldbar"></div>
  </div>

  <div class="roles">
    <a class="role host" href="./host.html">
      <h3>Host</h3>
    </a>
    <a class="role master" href="./spielleiter.html">
      <h3>Spielleiter</h3>
    </a>
    <a class="role buzz" href="./buzzer.html">
      <h3>Buzzer</h3>
    </a>
  </div>
</div>

<script>
  var e = document.getElementById('sparks');
  for(var i=0;i<20;i++){
    var s = document.createElement('div');
    s.className = 'spark';
    var sz = 3 + Math.random()*4;
    s.style.width = sz+'px'; s.style.height = sz+'px';
    s.style.left = (Math.random()*100)+'vw';
    s.style.setProperty('--dx',(Math.random()*60-30)+'px');
    s.style.animationDuration = (7+Math.random()*8)+'s';
    s.style.animationDelay = (-Math.random()*15)+'s';
    e.appendChild(s);
  }
</script>
<script src="../zurueck.js"></script>
<script src="../hintergrund.js"></script>
</body>
</html>
