<!doctype html>
<html lang="de">
<head>
<meta charset="utf-8" />
<title>Imposter</title>
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@500;700;800;900&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#0b0e14; --panel:#151a24; --panel2:#1b2230; --border:#2a3244;
    --ink:#f3f1e8; --muted:#7c8494; --accent:#ff5b3a; --gold:#d9a441; --mint:#35d0a4;
    --ease:cubic-bezier(.22,.9,.32,1); --ease-out:cubic-bezier(.16,1,.3,1);
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  html,body{height:100%;}
  body{
    background:
      radial-gradient(ellipse 1000px 600px at 50% 0%, rgba(255,91,58,.10), transparent 62%),
      radial-gradient(ellipse 800px 500px at 50% 100%, rgba(217,164,65,.06), transparent 60%),
      var(--bg);
    color:var(--ink);font-family:'Inter',sans-serif;overflow:hidden;
    min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:44px;padding:30px;
  }

  .shadows{position:fixed;inset:0;z-index:0;overflow:hidden;pointer-events:none;}
  .shadow{
    position:absolute;bottom:-60px;width:26px;height:44px;border-radius:13px 13px 4px 4px;
    background:rgba(226,73,90,.12);filter:blur(1px);animation:drift linear infinite;
  }
  @keyframes drift{
    0%{transform:translateY(0) translateX(0);opacity:0;}
    10%{opacity:1;}90%{opacity:.6;}
    100%{transform:translateY(-110vh) translateX(var(--dx,20px));opacity:0;}
  }
  body::before{
    content:'';position:fixed;inset:0;pointer-events:none;z-index:0;
    background-image:
      linear-gradient(rgba(255,255,255,.02) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,.02) 1px, transparent 1px);
    background-size:56px 56px;
  }

  .wrap{position:relative;z-index:2;display:flex;flex-direction:column;align-items:center;gap:44px;}
  .logo{
    font-family:'Bebas Neue',sans-serif;font-size:clamp(46px,9vw,84px);letter-spacing:10px;line-height:1;
    text-align:center;
    background:linear-gradient(180deg,#fffdf6 0%, var(--ink) 55%, var(--accent) 150%);
    -webkit-background-clip:text;background-clip:text;color:transparent;
    animation:riseIn .6s var(--ease-out) both;
  }
  .sub{font-size:12px;letter-spacing:5px;text-transform:uppercase;color:var(--muted);font-weight:700;margin-top:10px;text-align:center;animation:riseIn .6s var(--ease-out) .1s both;}
  .rule{width:min(300px,80vw);height:3px;border-radius:3px;margin-top:14px;
    background:var(--accent);opacity:.75;box-shadow:0 0 18px rgba(255,91,58,.5);
    animation:riseIn .6s var(--ease-out) .15s both;}

  .roles{display:flex;gap:20px;flex-wrap:wrap;justify-content:center;}
  .role{
    position:relative;width:230px;padding:30px 24px;border-radius:18px;text-decoration:none;color:var(--ink);
    background:linear-gradient(160deg,var(--panel2),var(--panel));border:1px solid var(--border);
    display:flex;flex-direction:column;align-items:center;gap:12px;overflow:hidden;
    transition:transform .4s var(--ease-out),border-color .35s var(--ease),box-shadow .35s var(--ease);
    animation:riseIn .6s var(--ease-out) both;
  }
  .role:nth-child(1){animation-delay:.20s;}
  .role:nth-child(2){animation-delay:.28s;}
  .role::before{content:'';position:absolute;top:0;left:0;width:100%;height:3px;background:var(--rc);opacity:.9;}
  .role .ic{width:52px;height:52px;color:var(--rc);filter:drop-shadow(0 0 12px var(--rc));}
  .role .ic svg{width:100%;height:100%;}
  .role h3{font-family:'Bebas Neue',sans-serif;font-size:24px;letter-spacing:2px;text-transform:uppercase;}
  .role p{color:var(--muted);font-size:13px;text-align:center;line-height:1.5;}
  .role:hover{transform:translateY(-6px);border-color:var(--rc);box-shadow:0 18px 50px -20px var(--rc);}
  .role:active{transform:translateY(-3px) scale(.98);}
  .role.host{--rc:var(--accent);}
  .role.master{--rc:var(--gold);}

  @keyframes riseIn{from{opacity:0;transform:translateY(18px);}to{opacity:1;transform:translateY(0);}}
  @media (prefers-reduced-motion: reduce){*,*::before,*::after{animation-duration:.01ms !important;animation-iteration-count:1 !important;}}
  @media(max-width:720px){.roles{gap:14px;}.role{width:min(80vw,260px);}}
</style>
<link rel="stylesheet" href="../responsive.css" />
</head>
<body>
<div class="shadows" id="shadows" aria-hidden="true"></div>

<div class="wrap">
  <div style="display:flex;flex-direction:column;align-items:center;">
    <div class="logo">IMPOSTER</div>
    <div class="rule"></div>
  </div>

  <div class="roles">
    <a class="role host" href="./host.html">
      <h3>Host</h3>
    </a>
    <a class="role master" href="./spielleiter.html">
      <h3>Spielleiter</h3>
    </a>
  </div>
</div>

<script>
  var e = document.getElementById('shadows');
  for(var i=0;i<12;i++){
    var s = document.createElement('div');
    s.className = 'shadow';
    s.style.left = (Math.random()*100)+'vw';
    s.style.setProperty('--dx',(Math.random()*50-25)+'px');
    s.style.animationDuration = (10+Math.random()*10)+'s';
    s.style.animationDelay = (-Math.random()*18)+'s';
    e.appendChild(s);
  }
</script>
<script src="../zurueck.js"></script>
<script src="../hintergrund.js"></script>
</body>
</html>
