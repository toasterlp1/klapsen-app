<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Move Hängers</title>
  <link rel="stylesheet" href="css/style.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Anton&family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
</head>
<body data-bg="aurora">

<canvas id="particles"></canvas>
<div id="bg-overlay"></div>

<nav id="navbar">
  <div class="nav-logo">
    <span class="logo-bracket">[</span>MOVE<span class="logo-accent">HÄNGERS</span><span class="logo-bracket">]</span>
  </div>
  <div class="nav-user" id="nav-user-area">
    <span id="nav-username-display"></span>
    <button id="change-user-btn" class="btn-ghost">Switch User</button>
  </div>
  <button class="nav-settings-btn" id="open-settings">Settings</button>
</nav>

<div id="login-screen" class="fullscreen-overlay">
  <div class="login-box">
    <div class="login-glitch" data-text="MOVE HÄNGERS">MOVE HÄNGERS</div>
    <input type="text" id="login-input" maxlength="20" placeholder="Username" />
    <input type="password" id="password-input" placeholder="Passwort" />
    <button id="login-btn" class="btn-primary">LOG IN</button>
  </div>
</div>

<main id="app" class="hidden">

  <section class="hero">
    <div class="hero-content">
      <h1 class="hero-title">
        <span class="hero-greet" id="hero-greet">READY</span>
        <span class="hero-name" id="hero-name">PLAYER</span>
      </h1>
      <p class="hero-sub" id="hero-sub">Was geht heute?</p>
    </div>
    <div class="hero-stats">
      <div class="stat-pill">
        <span class="stat-num" id="count-events">0</span>
        <span class="stat-label">Sessions</span>
      </div>
      <div class="stat-pill">
        <span class="stat-num" id="count-polls">0</span>
        <span class="stat-label">Umfragen</span>
      </div>
      <div class="stat-pill">
        <span class="stat-num" id="count-online">1</span>
        <span class="stat-label">Online</span>
      </div>
    </div>
  </section>

  <section class="quick-actions">
    <button class="qa-btn" id="qa-event">Session planen</button>
    <button class="qa-btn" id="qa-poll">Umfrage starten</button>
    <button class="qa-btn" id="qa-game">Spiel vorschlagen</button>
    <button class="qa-btn" id="qa-discord">Alle pingen</button>
  </section>

  <div class="content-grid">

    <div class="col">
      <div class="col-header">
        <h2>Sessions</h2>
        <span class="col-badge" id="badge-events">0</span>
      </div>
      <div class="card-list" id="events-list"></div>
    </div>

    <div class="col">
      <div class="col-header">
        <h2>Umfragen</h2>
        <span class="col-badge" id="badge-polls">0</span>
      </div>
      <div class="card-list" id="polls-list"></div>
    </div>

    <div class="col">
      <div class="col-header">
        <h2>Game Pool</h2>
        <span class="col-badge" id="badge-games">0</span>
      </div>
      <div class="card-list" id="games-list"></div>
    </div>

  </div>
</main>

<div class="modal-overlay hidden" id="modal-event">
  <div class="modal">
    <div class="modal-header">
      <h3>Session planen</h3>
      <button class="modal-close" data-modal="modal-event"></button>
    </div>
    <div class="modal-body">
      <label>Titel</label>
      <input type="text" id="event-title" placeholder="z.B. Freitag Ranked Grind..." />
      <label>Datum &amp; Zeit</label>
      <input type="datetime-local" id="event-datetime" />
      <label>Spiel</label>
      <input type="text" id="event-game" placeholder="z.B. Valorant, Minecraft..." />
      <label>Beschreibung (optional)</label>
      <textarea id="event-desc" placeholder="Was ist der Plan?" rows="3"></textarea>
      <label>Max. Spieler</label>
      <input type="number" id="event-maxplayers" min="2" max="20" value="5" />
      <div class="modal-actions">
        <button class="btn-cancel" data-modal="modal-event">Abbrechen</button>
        <button class="btn-primary" id="save-event">Session erstellen</button>
      </div>
    </div>
  </div>
</div>

<div class="modal-overlay hidden" id="modal-poll">
  <div class="modal">
    <div class="modal-header">
      <h3>Umfrage erstellen</h3>
      <button class="modal-close" data-modal="modal-poll"></button>
    </div>
    <div class="modal-body">
      <label>Frage</label>
      <input type="text" id="poll-question" placeholder="z.B. Was zocken wir heute Abend?" />
      <label>Optionen (min. 2)</label>
      <div id="poll-options-container">
        <input type="text" class="poll-option-input" placeholder="Option 1..." />
        <input type="text" class="poll-option-input" placeholder="Option 2..." />
      </div>
      <button class="btn-ghost" id="add-poll-option">+ Option hinzufügen</button>
      <div class="modal-actions">
        <button class="btn-cancel" data-modal="modal-poll">Abbrechen</button>
        <button class="btn-primary" id="save-poll">Umfrage starten</button>
      </div>
    </div>
  </div>
</div>

<div class="modal-overlay hidden" id="modal-game">
  <div class="modal">
    <div class="modal-header">
      <h3>Spiel vorschlagen</h3>
      <button class="modal-close" data-modal="modal-game"></button>
    </div>
    <div class="modal-body">
      <label>Spielname</label>
      <input type="text" id="game-name" placeholder="z.B. Elden Ring, Warzone..." />
      <label>Genre</label>
      <select id="game-genre">
        <option value="Shooter">Shooter</option>
        <option value="Horror">Horror</option>
        <option value="Browser">Browser</option>
        <option value="Survival">Survival</option>
        <option value="Strategy">Strategie</option>
        <option value="Sonstiges">Sonstiges</option>
      </select>
      <label>Spieleranzahl</label>
      <input type="text" id="game-players" placeholder="z.B. 2-5 Spieler" />
      <label>Kommentar (optional)</label>
      <textarea id="game-comment" placeholder="Warum sollten wir das spielen?" rows="2"></textarea>
      <div class="modal-actions">
        <button class="btn-cancel" data-modal="modal-game">Abbrechen</button>
        <button class="btn-primary" id="save-game">Vorschlagen</button>
      </div>
    </div>
  </div>
</div>

<div class="modal-overlay hidden" id="modal-settings">
  <div class="modal modal-wide">
    <div class="modal-header">
      <h3>Settings</h3>
      <button class="modal-close" data-modal="modal-settings"></button>
    </div>
    <div class="modal-body">
      <h4>Hintergrund</h4>
      <div class="bg-presets">
        <button class="bg-preset" data-bg="rainy">Rainy</button>
        <button class="bg-preset" data-bg="aurora">Aurora</button>
        <button class="bg-preset" data-bg="starfield">Starfield</button>
        <button class="bg-preset" data-bg="grid">Grid</button>
      </div>

      <h4>Akzentfarbe</h4>
      <div class="color-row">
        <label>Primär</label>
        <input type="color" id="color-primary" value="#6366f1" />
        <label>Sekundär</label>
        <input type="color" id="color-secondary" value="#f472b6" />
      </div>

      <h4>Effekte</h4>
      <div class="effects-grid">
        <label class="toggle-label">
          <input type="checkbox" id="fx-particles" checked /> Partikel
        </label>
        <label class="toggle-label">
          <input type="checkbox" id="fx-glow" checked /> Glow-Effekte
        </label>
      </div>

      <div class="modal-actions">
        <button class="btn-primary" id="save-settings">Speichern</button>
      </div>
    </div>
  </div>
</div>

<div id="toast-container"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/storage.js"></script>
<script src="js/particles.js"></script>
<script src="js/backgrounds.js"></script>
<script src="js/app.js"></script>
<script src="../zurueck.js"></script>
</body>
</html>
