<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Quiz Duell</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Anton&family=Inter:wght@500;700;800;900&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="../auth.js"></script>
<script src="../avatare.js"></script>
<script src="../symbole.js"></script>
<style>
.avatar-pic{
  width:36px;height:36px;border-radius:50%;object-fit:cover;flex-shrink:0;
  }
:root{
  --bg:#0a0e1a;
  --bg2:#0d1426;
  --panel:#111a30;
  --panel2:#16213f;
  --blue:#1e63d0;
  --blue-bright:#3b82f6;
  --blue-cell:#13294e;
  --blue-cell2:#1a3766;
  --red:#c41230;
  --red-bright:#e11d48;
  --gold:#f5c542;
  --green:#22c55e;
  --text:#eaf0ff;
  --muted:#8fa2c9;
  --line:#22324f;
  --ease:cubic-bezier(.22,.9,.24,1);
  --ease-out:cubic-bezier(.16,1,.3,1);
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{
  background:radial-gradient(ellipse at top,#13203c 0%,var(--bg) 60%);
  color:var(--text);
  font-family:'Inter','Segoe UI',system-ui,-apple-system,sans-serif;
  overflow-x:hidden;
  isolation:isolate;
}
.bg-fx{position:fixed;inset:0;z-index:-1;overflow:hidden;pointer-events:none}
.bg-fx span{position:absolute;border-radius:50%;filter:blur(85px);will-change:transform}
.bg-fx .b1{
  width:820px;height:820px;top:-260px;left:-220px;
  background:radial-gradient(circle,rgba(59,130,246,.55),transparent 68%);
  animation:driftA 22s var(--ease) infinite alternate;
}
.bg-fx .b2{
  width:760px;height:760px;bottom:-260px;right:-200px;
  background:radial-gradient(circle,rgba(225,29,72,.48),transparent 68%);
  animation:driftB 26s var(--ease) infinite alternate;
}
.bg-fx .b3{
  width:560px;height:560px;top:30%;left:50%;
  background:radial-gradient(circle,rgba(245,197,66,.32),transparent 70%);
  animation:driftC 30s var(--ease) infinite alternate;
}
@keyframes driftA{
  0%{transform:translate(0,0) scale(1)}
  50%{transform:translate(180px,140px) scale(1.18)}
  100%{transform:translate(40px,260px) scale(.92)}
}
@keyframes driftB{
  0%{transform:translate(0,0) scale(1)}
  50%{transform:translate(-160px,-120px) scale(1.15)}
  100%{transform:translate(-260px,30px) scale(.95)}
}
@keyframes driftC{
  0%{transform:translate(-50%,0) scale(1)}
  50%{transform:translate(-50%,-80px) scale(1.25)}
  100%{transform:translate(-50%,60px) scale(.9)}
}
.particles{position:fixed;inset:0;z-index:-1;overflow:hidden;pointer-events:none}
.particles .p{position:absolute;bottom:-20px;border-radius:50%;animation:floatUp linear infinite}
@keyframes floatUp{
  0%{transform:translate(0,0);opacity:0}
  8%{opacity:var(--op,.8)}
  92%{opacity:var(--op,.8)}
  100%{transform:translate(var(--dx,40px),-115vh);opacity:0}
}
.hidden{display:none !important}
button{font-family:inherit;cursor:pointer;border:none;color:inherit}
input,select{font-family:inherit}
@media (prefers-reduced-motion: reduce){
  *,*::before,*::after{animation-duration:.01ms !important;animation-iteration-count:1 !important;transition-duration:.01ms !important;scroll-behavior:auto !important}
}

#roleScreen{
  min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:40px;padding:30px;
}
.logo{
  font-family:'Anton',sans-serif;font-size:clamp(48px,9vw,110px);font-weight:400;font-style:italic;letter-spacing:-1px;
  display:flex;align-items:center;gap:6px;line-height:.9;
  animation:riseIn .6s var(--ease-out) both;
}
.logo .q{color:#fff}
.logo .bolt{color:var(--gold);font-size:1.1em;transform:translateY(-4px);text-shadow:0 0 30px rgba(245,197,66,.6)}
.logo .d{color:#fff}
.logo small{display:block;font-size:.16em;letter-spacing:8px;font-style:normal;font-weight:700;color:var(--blue-bright);margin-top:6px}
.role-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:22px;max-width:920px;width:100%}
.role-card{
  background:linear-gradient(160deg,var(--panel2),var(--panel));
  border:1px solid var(--line);border-radius:18px;padding:34px 26px;text-align:center;
  transition:transform .4s var(--ease-out),border-color .4s var(--ease),box-shadow .4s var(--ease);
  display:flex;flex-direction:column;align-items:center;gap:14px;
  animation:riseIn .6s var(--ease-out) both;
}
.role-card:nth-child(1){animation-delay:.08s}
.role-card:nth-child(2){animation-delay:.16s}
.role-card:nth-child(3){animation-delay:.24s}
.role-card:hover{transform:translateY(-6px);border-color:var(--blue-bright);box-shadow:0 18px 50px -20px rgba(59,130,246,.5)}
.role-card:active{transform:translateY(-3px) scale(.98);transition-duration:.12s}
.role-card .ic{width:54px;height:54px;display:flex;align-items:center;justify-content:center}
.role-card .ic svg{width:100%;height:100%}
.role-card h3{font-family:'Anton',sans-serif;font-size:24px;font-weight:400;letter-spacing:1px}
.role-card p{color:var(--muted);font-size:14px;line-height:1.5}
.role-card.host:hover{border-color:var(--blue-bright)}
.role-card.host .ic{color:var(--blue-bright);filter:drop-shadow(0 0 18px rgba(59,130,246,.6))}
.role-card.master:hover{border-color:var(--gold);box-shadow:0 18px 50px -20px rgba(245,197,66,.5)}
.role-card.master .ic{color:var(--gold);filter:drop-shadow(0 0 18px rgba(245,197,66,.6))}
.role-card.buzz:hover{border-color:var(--red-bright);box-shadow:0 18px 50px -20px rgba(225,29,72,.5)}
.role-card.buzz .ic{color:var(--red-bright);filter:drop-shadow(0 0 18px rgba(225,29,72,.6))}
@media(max-width:760px){.role-grid{grid-template-columns:1fr}}
@keyframes riseIn{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}

.topbar{
  display:flex;align-items:center;justify-content:space-between;
  padding:14px 26px;border-bottom:1px solid var(--line);background:rgba(8,12,24,.7);
  position:sticky;top:0;z-index:50;backdrop-filter:blur(8px);
}
.topbar .brand{
  display:flex;align-items:center;gap:0;
  font-family:'Anton',sans-serif;font-size:34px;letter-spacing:2px;
  font-style:italic;color:#fff;
  text-shadow:0 3px 0 #0a1428, 0 0 24px rgba(59,130,246,.45);
  position:relative;
}
.brand .bolt{
  width:26px;height:40px;margin:0 -2px;
  color:#e11d48;filter:drop-shadow(0 0 10px rgba(225,29,72,.8));
}
.brand .bolt svg{width:100%;height:100%;display:block;}
.topbar .brand .bolt{color:var(--gold)}
.topbar .right{display:flex;align-items:center;gap:14px}
.pill{padding:7px 16px;border-radius:30px;font-size:13px;font-weight:700;background:var(--panel2);border:1px solid var(--line);transition:color .3s var(--ease)}
.pill.live{color:var(--green)}
.pill.live::before{content:"";display:inline-block;width:8px;height:8px;border-radius:50%;background:var(--green);margin-right:7px;vertical-align:middle;box-shadow:0 0 8px var(--green);animation:liveDot 2.2s var(--ease) infinite}
.pill.dead{color:var(--red-bright)}
.pill.dead::before{content:"";display:inline-block;width:8px;height:8px;border-radius:50%;background:var(--red-bright);margin-right:7px;vertical-align:middle}
.btn{padding:9px 18px;border-radius:10px;font-weight:700;font-size:14px;background:var(--panel2);border:1px solid var(--line);transition:background .25s var(--ease-out),transform .15s var(--ease-out),border-color .25s var(--ease-out)}
.btn:hover{background:var(--blue-cell2)}
.btn:active{transform:scale(.96)}
.btn.ghost{background:transparent}
@keyframes liveDot{0%,100%{opacity:1}50%{opacity:.45}}

.scores{display:flex;gap:12px;flex-wrap:wrap;justify-content:center;padding:16px 20px}
.score-card{
  position:relative;min-width:150px;background:linear-gradient(160deg,var(--panel2),var(--panel));
  border:1px solid var(--line);border-radius:14px;padding:14px 18px;text-align:center;
  transition:border-color .35s var(--ease),box-shadow .35s var(--ease),transform .35s var(--ease-out);
}
.score-card.turn{border-color:var(--gold);box-shadow:0 0 0 1px var(--gold),0 0 28px -6px rgba(245,197,66,.55)}
.score-card.buzzed{border-color:var(--red-bright);box-shadow:0 0 0 1px var(--red-bright),0 0 28px -4px rgba(225,29,72,.6);animation:pulse .8s infinite}
@keyframes pulse{0%,100%{box-shadow:0 0 0 1px var(--red-bright),0 0 28px -4px rgba(225,29,72,.6)}50%{box-shadow:0 0 0 1px var(--red-bright),0 0 40px 0 rgba(225,29,72,.9)}}
.score-card .nm{font-weight:800;font-size:16px;letter-spacing:.3px}
.score-card .sc{font-family:'Anton',sans-serif;font-size:32px;font-weight:400;margin-top:4px;font-variant-numeric:tabular-nums;display:inline-block}
.score-card .sc.neg{color:var(--red-bright)}
.bump-up{animation:bumpUp .55s var(--ease-out)}
.bump-down{animation:bumpDown .55s var(--ease-out)}
@keyframes bumpUp{0%{transform:scale(1)}30%{transform:scale(1.22);color:var(--green)}100%{transform:scale(1)}}
@keyframes bumpDown{0%{transform:scale(1)}30%{transform:scale(1.15);color:var(--red-bright)}100%{transform:scale(1)}}
.score-card .tag{position:absolute;top:-10px;left:50%;transform:translateX(-50%);font-size:10px;font-weight:800;letter-spacing:1px;padding:3px 10px;border-radius:20px;white-space:nowrap}
.score-card.turn .tag{background:var(--gold);color:#1a1300;display:block}
.score-card.buzzed .tag{background:var(--red-bright);color:#fff;display:block}
.score-card .tag{display:none}
.score-badges{display:flex;gap:5px;justify-content:center;align-items:center;margin-top:8px;min-height:16px}
.cardbadge{width:11px;height:15px;border-radius:2px;display:inline-block;animation:cardbadgePulse 2.2s ease-in-out infinite}
.cardbadge.yellow{background:var(--gold);box-shadow:0 0 6px rgba(245,197,66,.6)}
.cardbadge.red{background:var(--red-bright);box-shadow:0 0 8px rgba(225,29,72,.7)}
@keyframes cardbadgePulse{0%,100%{filter:brightness(1)}50%{filter:brightness(1.3)}}
.jokerbadge{font-size:14px;line-height:1;filter:saturate(1.2);transition:opacity .3s var(--ease),filter .3s var(--ease)}
.jokerbadge.used{opacity:.25;filter:grayscale(1)}

.score-card .avatar-pic{
  width:60px;height:60px;border-radius:50%;object-fit:cover;flex-shrink:0;
  border:3px solid var(--line);margin-bottom:8px;
  box-shadow:0 8px 20px -8px rgba(0,0,0,.65);
  animation:avatarFloat 4.6s ease-in-out infinite;
  transition:border-color .35s var(--ease),box-shadow .35s var(--ease),transform .35s var(--ease-out);
}
@keyframes avatarFloat{0%,100%{transform:translateY(0)}50%{transform:translateY(-3px)}}
.score-card.turn .avatar-pic,.score-card.ka-live-green .avatar-pic{
  border-color:var(--gold);transform:scale(1.08);
  box-shadow:0 0 0 3px rgba(245,197,66,.22),0 0 26px -2px rgba(245,197,66,.8);
  animation:avatarFloat 4.6s ease-in-out infinite,avatarPulseGold 1.7s ease-in-out infinite;
}
.score-card.buzzed .avatar-pic{
  border-color:var(--red-bright);transform:scale(1.1);
  box-shadow:0 0 0 3px rgba(225,29,72,.28),0 0 30px -2px rgba(225,29,72,.9);
  animation:avatarFloat 4.6s ease-in-out infinite,avatarPulseRed 1s ease-in-out infinite;
}
@keyframes avatarPulseGold{0%,100%{filter:brightness(1)}50%{filter:brightness(1.18)}}
@keyframes avatarPulseRed{0%,100%{filter:brightness(1)}50%{filter:brightness(1.28)}}
@media (prefers-reduced-motion: reduce){.score-card .avatar-pic{animation:none}}

.jokerbadge{
  width:20px;height:20px;border-radius:6px;display:inline-flex;align-items:center;justify-content:center;
  background:linear-gradient(160deg,var(--blue-bright),var(--blue));border:1px solid rgba(255,255,255,.35);
  box-shadow:0 0 12px -1px rgba(59,130,246,.75);filter:none;
  animation:jokerGlow 2.4s ease-in-out infinite;
}
.jokerbadge svg{width:12px;height:12px;display:block;color:#fff}
.jokerbadge.used{opacity:.35;filter:grayscale(1);box-shadow:none;animation:none;background:var(--panel)}
@keyframes jokerGlow{0%,100%{box-shadow:0 0 10px -2px rgba(59,130,246,.6)}50%{box-shadow:0 0 18px 0 rgba(59,130,246,.95)}}

.board-wrap{padding:18px 26px 40px;max-width:1500px;margin:0 auto}
.board-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.board-head h2{font-size:18px;letter-spacing:2px;color:var(--muted);font-weight:700}
.board-tabs{display:flex;gap:8px}
.board-tab{padding:8px 20px;border-radius:10px;font-weight:800;font-size:14px;background:var(--panel);border:1px solid var(--line);color:var(--muted)}
.board-tab.active{background:var(--blue);color:#fff;border-color:var(--blue-bright)}
.grid{display:grid;grid-template-columns:repeat(6,1fr);gap:10px}
.cat-head{
  position:relative;overflow:hidden;
  background:linear-gradient(165deg,#e11d48 0%,#a20d2c 100%);
  border-radius:14px;padding:18px 8px;text-align:center;font-weight:900;
  font-size:15px;letter-spacing:1.2px;min-height:66px;
  display:flex;align-items:center;justify-content:center;
  text-transform:uppercase;color:#fff;
  border:1px solid rgba(255,255,255,.14);
  box-shadow:0 8px 22px -8px rgba(196,18,48,.85), inset 0 1px 0 rgba(255,255,255,.18);
  text-shadow:0 2px 6px rgba(0,0,0,.4);
}
.cat-head.enter::after{
  content:'';position:absolute;top:0;left:-60%;width:35%;height:100%;
  background:linear-gradient(100deg,transparent,rgba(255,255,255,.55) 50%,transparent 90%);
  transform:skewX(-18deg);animation:catSweep .8s ease-out .35s both;
}
@keyframes catSweep{from{left:-60%}to{left:130%}}
.cell{
  background:linear-gradient(165deg,#2b5db8 0%,#16336b 100%);
  border:1px solid rgba(120,170,255,.30);border-radius:14px;padding:24px 8px;text-align:center;
  font-family:'Anton',sans-serif;font-size:34px;font-weight:400;font-style:italic;color:#fff;
  transition:transform .22s var(--ease-out),background .22s var(--ease-out),box-shadow .22s var(--ease-out),border-color .22s var(--ease-out),opacity .4s var(--ease);
  letter-spacing:1.5px;
  text-shadow:0 3px 8px rgba(0,0,0,.55);
  box-shadow:0 8px 20px -10px rgba(30,99,208,.8), inset 0 1px 0 rgba(255,255,255,.16);
}
.cell:not(.done):hover{transform:scale(1.045);background:linear-gradient(165deg,#3a72d8,#1d4185);box-shadow:0 0 30px -4px rgba(59,130,246,.75);border-color:#6ea8ff}
.cell:not(.done):active{transform:scale(.97);transition-duration:.1s}
.cell.done{position:relative;background:#131b2e;color:rgba(143,162,201,.25);border-color:rgba(34,50,79,.6);cursor:default;box-shadow:none;opacity:1}
.cell.done::after{
  content:'✓';position:absolute;inset:0;display:flex;align-items:center;justify-content:center;
  font-family:'Anton',sans-serif;font-style:normal;font-size:26px;color:rgba(120,140,180,.22);
}
.cell.disabled{cursor:default;opacity:.55}
.cell.enter,.cat-head.enter{animation:gridIn .42s var(--ease-out) both}
@keyframes gridIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
@media(max-width:900px){.cell{font-size:20px;padding:16px 4px}.cat-head{font-size:11px;padding:10px 4px}}

.overlay{
  position:fixed;inset:0;z-index:100;display:flex;align-items:center;justify-content:center;padding:24px;
  background:rgba(4,7,15,.82);backdrop-filter:blur(6px);
  animation:overlayFade .25s var(--ease) both;
}
.overlay.closing{animation:overlayFadeOut .18s var(--ease) both}
.overlay.closing .qcard{animation:popOut .18s var(--ease) both}
@keyframes overlayFade{from{opacity:0}to{opacity:1}}
@keyframes overlayFadeOut{from{opacity:1}to{opacity:0}}
@keyframes popOut{from{transform:scale(1);opacity:1}to{transform:scale(.93);opacity:0}}
.qcard{
  position:relative;
  width:min(760px,94vw);background:linear-gradient(165deg,var(--panel2),var(--panel));
  border:1px solid var(--blue-bright);border-radius:22px;overflow:hidden;
  box-shadow:0 30px 90px -30px rgba(59,130,246,.7),0 0 0 1px rgba(59,130,246,.25);
  animation:pop .3s var(--ease-out);
}
.qcard::before{
  content:'';position:absolute;top:0;left:-60%;width:40%;height:100%;
  background:linear-gradient(100deg,transparent,rgba(255,255,255,.16) 45%,transparent 90%);
  transform:skewX(-18deg);animation:qcardSweep .9s ease-out .1s both;pointer-events:none;
}
@keyframes qcardSweep{from{left:-60%}to{left:130%}}
@keyframes pop{from{transform:scale(.92);opacity:0}to{transform:scale(1);opacity:1}}
.qcard .qtitle{text-align:center;padding:16px;font-size:16px;font-weight:800;letter-spacing:3px;color:var(--blue-bright);border-bottom:1px solid var(--line);text-transform:uppercase}
.qcard .qtitle .qpoints{
  display:inline-block;margin-left:10px;padding:3px 14px;border-radius:999px;
  background:linear-gradient(160deg,var(--gold),#d4a017);color:#1a1300;font-weight:900;letter-spacing:1px;
  box-shadow:0 0 16px -2px rgba(245,197,66,.85);animation:qpointsPulse 1.8s ease-in-out infinite;
}
@keyframes qpointsPulse{0%,100%{box-shadow:0 0 12px -2px rgba(245,197,66,.6)}50%{box-shadow:0 0 20px 0 rgba(245,197,66,1)}}
.qcard .qbody{padding:40px 36px;text-align:center}
.qcard .qtext{font-family:'Anton',sans-serif;font-size:clamp(24px,3.4vw,40px);font-weight:400;line-height:1.2;margin-bottom:26px}
.qcard .qimg{max-width:100%;max-height:340px;border-radius:14px;margin:0 auto;display:block;box-shadow:0 16px 40px -16px rgba(0,0,0,.7);background:#fff}
.qcard .qimg.flag{border:3px solid #fff}
.qcard .qfooter{padding:18px;text-align:center;border-top:1px solid var(--line)}
.turnbar{display:inline-flex;align-items:center;gap:10px;background:var(--blue);padding:12px 26px;border-radius:40px;font-family:'Anton',sans-serif;font-weight:400;font-size:19px;letter-spacing:.5px}
.turnbar .av{width:30px;height:30px;border-radius:50%;background:var(--blue-bright);display:flex;align-items:center;justify-content:center;font-size:15px}
.resultbar{padding:16px 30px;border-radius:14px;font-weight:800;font-size:20px;animation:pop .2s}
.resultbar.wrong{background:rgba(225,29,72,.16);border:1px solid var(--red-bright);color:#ff8da3}
.resultbar.correct{background:rgba(34,197,94,.16);border:1px solid var(--green);color:#86efac}
.resultbar.reveal{background:rgba(245,197,66,.14);border:1px solid var(--gold);color:var(--gold)}
.resultbar.joker{background:rgba(59,130,246,.16);border:1px solid var(--blue-bright);color:#bcd4ff}
.answer-reveal{position:relative;margin-top:18px;font-family:'Anton',sans-serif;font-size:clamp(22px,3vw,34px);font-weight:400;color:var(--green);animation:pop .3s}
.answer-reveal::before{
  content:'';position:absolute;left:50%;top:50%;width:260px;height:260px;
  margin:-130px 0 0 -130px;border-radius:50%;z-index:-1;
  background:radial-gradient(circle,rgba(34,197,94,.35),transparent 70%);
  animation:ansBurst .7s var(--ease-out) both;
}
@keyframes ansBurst{from{transform:scale(.3);opacity:0}to{transform:scale(1);opacity:1}}
.answer-reveal .lbl{display:block;font-size:13px;letter-spacing:3px;color:var(--muted);font-weight:700;margin-bottom:4px}

.buzz-screen{min-height:100vh;display:flex;flex-direction:column}
.buzz-main{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:30px;padding:30px;text-align:center;animation:riseIn .5s var(--ease-out) both}
.buzz-status{font-size:20px;font-weight:800;letter-spacing:.5px;color:var(--muted);min-height:28px}
.buzz-status.open{color:var(--green)}
.buzz-status.locked{color:var(--red-bright)}
.buzz-status.mine{color:var(--gold)}
.big-buzz{
  position:relative;
  width:min(320px,72vw);height:min(320px,72vw);border-radius:50%;
  background:radial-gradient(circle at 38% 32%,#ff556f,var(--red) 60%,#7d0a1f);
  border:6px solid #ff8095;color:#fff;font-family:'Anton',sans-serif;font-size:44px;font-weight:400;letter-spacing:2px;
  box-shadow:0 22px 60px -18px rgba(196,18,48,.8),inset 0 -10px 30px rgba(0,0,0,.35);
  transition:.08s;text-shadow:0 3px 8px rgba(0,0,0,.4);user-select:none;
}
.big-buzz::before{
  content:'';position:absolute;inset:-14px;border-radius:50%;z-index:-1;
  background:conic-gradient(from 0deg,transparent 0 72%,rgba(255,255,255,.65) 86%,transparent 100%);
  opacity:0;transition:opacity .3s var(--ease-out);animation:buzzSpin 2.6s linear infinite;
}
.big-buzz.armed::before{opacity:.9}
@keyframes buzzSpin{to{transform:rotate(360deg)}}

function shuffle(a){a=[...a];for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]]}return a}

const USED_KEY = "quizduell_used_questions_v1";
function loadUsed(){try{return JSON.parse(localStorage.getItem(USED_KEY))||{}}catch{return{}}}
function saveUsed(u){localStorage.setItem(USED_KEY,JSON.stringify(u))}

function pickQuestion(catName, level, roundUsed){
  const cat = CATEGORIES.find(c=>c.name===catName);
  if(!cat) return null;
  const pool = cat.levels[level] || [];
  if(pool.length===0) return null;
  const used = loadUsed();
  const ukey = `${catName}|${level}`;
  const usedList = used[ukey] || [];
  const inRound = (q)=> roundUsed && roundUsed.has(`${ukey}|${q.antwort}`);
  let avail = pool.filter(q=>!usedList.includes(q.antwort) && !inRound(q));
  if(avail.length===0){
    avail = pool.filter(q=>!inRound(q));
    used[ukey] = [];
  }
  if(avail.length===0){ avail = pool; }
  const chosen = avail[Math.floor(Math.random()*avail.length)];
  used[ukey] = [...(used[ukey]||[]), chosen.antwort];
  saveUsed(used);
  if(roundUsed) roundUsed.add(`${ukey}|${chosen.antwort}`);
  return chosen;
}

function buildBoardFromCats(cats, roundUsed){
  return cats.map(cat=>{
    const questions = {};
    for(let lvl=1;lvl<=5;lvl++){
      questions[lvl] = pickQuestion(cat.name, lvl, roundUsed);
    }
    return { name:cat.name, icon:cat.icon, questions };
  });
}

function generateBothBoards(){
  const roundUsed = new Set();
  const shuffled = shuffle(CATEGORIES);
  const need = Math.min(12, shuffled.length);
  const chosenCats = shuffled.slice(0, need);
  const cats1 = chosenCats.slice(0, 6);
  let cats2 = chosenCats.slice(6, 12);
  if(cats2.length<6){
    const rest = shuffled.filter(c=>!cats1.includes(c) && !cats2.includes(c));
    cats2 = cats2.concat(rest.slice(0, 6-cats2.length));
  }
  const b1 = buildBoardFromCats(cats1.slice(0,6), roundUsed);
  const b2 = buildBoardFromCats(cats2.slice(0,6), roundUsed);
  return {b1, b2};
}

    owner_player_id:null, current_value:0, buzz_value:0, is_owner_phase:true,
    buzzer_open:false, buzzed_player_id:null, already_buzzed:[],
    answer_revealed:false, result_text:null, result_kind:null,
    played_questions:[],
    board_layout:{b1, b2},
    updated_at:new Date().toISOString()
  }).eq('id',1);
  await sb.from('quiz_players').update({joker_used:false}).neq('id','00000000-0000-0000-0000-000000000000');
}

function chooseRole(role){
  ROLE = role;
  $("roleScreen").classList.add("hidden");
  if(role==='host'){
    document.documentElement.classList.add('host');
    document.body.classList.add('host');
    $("hostView").classList.remove("hidden"); initHost();
  }
  if(role==='master'){ $("masterView").classList.remove("hidden"); initMaster(); }
  if(role==='buzzer'){ $("buzzerView").classList.remove("hidden"); initBuzzer(); }
}

function subscribeAll(onUpdate){
  sb.channel('quiz-state-ch')
    .on('postgres_changes',{event:'*',schema:'public',table:'quiz_state'},payload=>{
      state = payload.new;
      if(state.board_layout){boardLayout={1:state.board_layout.b1,2:state.board_layout.b2}}
      onUpdate();
    })
    .subscribe(s=>setLive(s==='SUBSCRIBED'));

  sb.channel('quiz-players-ch')
    .on('postgres_changes',{event:'*',schema:'public',table:'quiz_players'},async()=>{
      await refreshPlayers(); onUpdate();
    })
    .subscribe();

  setInterval(async () => {
    const { data } = await sb.from('quiz_state').select('*').eq('id',1).single();
    if(!data) return;
    state = data;
    if(state.board_layout){ boardLayout = {1:state.board_layout.b1, 2:state.board_layout.b2}; }
    await refreshPlayers();
    onUpdate();
  }, 1500);
}

function setLive(ok){
  const ids = ["hostLive","masterLive","buzzLive","buzzLive2"];
  ids.forEach(id=>{const el=$(id);if(!el)return;el.className="pill "+(ok?"live":"dead");el.textContent=ok?"Live":"Getrennt"});
}

async function refreshPlayers(){
  const {data}=await sb.from('quiz_players').select('*').order('joined_at');
  players=data||[];
}
async function refreshState(){
  const {data}=await sb.from('quiz_state').select('*').eq('id',1).single();
  state=data;
  if(state&&state.board_layout){boardLayout={1:state.board_layout.b1,2:state.board_layout.b2}}
}

function playerById(id){return players.find(p=>p.id===id)}
function playerCards(p){return (p&&typeof p.cards==='number')?p.cards:0}
function jokerAvailable(p){return p && !p.joker_used}

async function initHost(){
  await refreshState(); await refreshPlayers();
  subscribeAll(renderHost);
  renderHost();
  setTimeout(async()=>{
    await refreshState();
    if(!boardLayout[1]){ await generateAndStoreRound(); renderHost(); }
  },2000);
}

function renderHost(){
  if(!state) return;

  if(window.HOSTFX && ROLE === 'host'){

    const b = state.buzzed_player_id;
    if(b && b !== fxLetzterBuzz){
      const p = players.find(x => x.id === b);
      if(p) HOSTFX.buzz(p.name, avatarFor(p.name));
    }
    fxLetzterBuzz = b || null;

    const j = state.joker_from_id;
    if(j && j !== fxLetzterJoker){
      const p = players.find(x => x.id === j);
      if(p) HOSTFX.joker(p.name, 'JOKER', '#ffd166', avatarFor(p.name));
    }
    fxLetzterJoker = j || null;

    const resultKey = (state.result_kind === 'correct' || state.result_kind === 'wrong')
      ? state.result_kind + '@' + (state.updated_at || '')
      : null;
    if(resultKey && resultKey !== fxLetzterResult){

      let answeringId;
      if(state.result_kind === 'wrong'){
        const ab = state.already_buzzed || [];
        answeringId = ab.length ? ab[ab.length - 1] : (state.buzzed_player_id || state.owner_player_id);
      } else {
        answeringId = state.buzzed_player_id || state.owner_player_id;
      }
      const p = players.find(x => x.id === answeringId);
      if(state.result_kind === 'correct') HOSTFX.correct(p ? p.name : '');
      else HOSTFX.wrong(p ? p.name : '');
    }
    fxLetzterResult = resultKey;

    players.forEach(p=>{
      const prevC = fxKartenStand[p.id];
      const nowC = playerCards(p);
      if(prevC !== undefined && nowC > prevC){
        if(nowC >= 2) HOSTFX.lifeLost(p.name, avatarFor(p.name));
        else toast(`🟨 Gelbe Karte: ${p.name}`);
      }
      fxKartenStand[p.id] = nowC;
    });
  }

  renderScores($("hostScores"));

  const tb = $("turnBar");
  if(tb){
    const dranId = (state.phase === 'board') ? state.turn_player_id : state.owner_player_id;
    const dran = players.find(p => p.id === dranId);
    if(dran){
      $("turnBarName").textContent = dran.name + "'S TURN";
      const av = avatarFor(dran.name);
      const img = $("turnBarAvatar");
      if(av){ img.src = av; img.style.display = ''; } else { img.style.display = 'none'; }
      tb.classList.add('show');
    } else {
      tb.classList.remove('show');
    }
  }
  $("hostBoardLabel").textContent = `BOARD ${state.active_board}`;
  renderGrid($("hostGrid"), state.active_board, true);
  const hb=$("hostBuzzIndicator");
  hb.className = "host-buzz"+(state.buzzer_open?" armed":"");
  renderOverlay('host');
}

function cardBadgesHtml(p){
  const c=playerCards(p);
  if(c<=0) return '';
  let html='';
  if(c>=2){ html='<span class="cardbadge red" title="Rote Karte"></span>'; }
  else { html='<span class="cardbadge yellow" title="Gelbe Karte"></span>'; }
  return html;
}

function renderScores(container){
  if(!container) return;
  container.innerHTML='';
  players.forEach(p=>{
    const card=document.createElement('div');
    let cls='score-card';
    if(state&&state.owner_player_id===p.id&&state.phase!=='board') cls+=' turn';
    if(state&&state.buzzed_player_id===p.id) cls+=' buzzed';
    card.className=cls;
    const tag = (state&&state.buzzed_player_id===p.id)?'GEBUZZERT':((state&&state.owner_player_id===p.id&&state.phase!=='board')?'IST DRAN':'');
    const jokerCls = jokerAvailable(p)?'':' used';
    const prev = prevScores[p.id];
    let bumpCls = '';
    if(prev!==undefined && prev!==p.score){ bumpCls = p.score>prev ? ' bump-up' : ' bump-down'; }
    prevScores[p.id] = p.score;
    const avatarUrl = avatarFor(p.name);

    const amZug = state && (
      (state.phase === 'board')
        ? state.turn_player_id === p.id
        : state.owner_player_id === p.id
    );
    const hatGebuzzert = state && state.buzzed_player_id === p.id;

    if(amZug || hatGebuzzert) card.classList.add('ka-live-green');

    const badge = hatGebuzzert
      ? `<span class="ka-badge-tr">${KA.mic()}</span>`
      : (amZug ? `<span class="ka-badge-tr">${KA.star()}</span>` : '');

    card.style.position = 'relative';
    card.innerHTML=`${badge}<span class="tag">${tag}</span>
      ${avatarUrl ? `<img class="avatar-pic" src="${avatarUrl}" style="margin-bottom:6px;">` : ''}
      <div class="nm">${escapeHtml(p.name)}</div>
      <div class="sc ${p.score<0?'neg':''}${bumpCls}">${p.score}</div>
      <div class="score-badges">
        ${cardBadgesHtml(p)}
        <span class="jokerbadge${jokerCls}" title="${jokerAvailable(p)?'Joker verfügbar':'Joker benutzt'}"><svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M12 3c-3.5 4-7 6.2-7 10a5 5 0 0 0 8.6 3.5c-.2 1.4-.9 2.6-2.1 3.5h5c-1.2-.9-1.9-2.1-2.1-3.5A5 5 0 0 0 19 13c0-3.8-3.5-6-7-10Z" fill="currentColor"/></svg></span>
      </div>`;
    container.appendChild(card);
  });
}

function renderGrid(container, boardNum, clickable){
  if(!container) return;
  const layout = boardLayout[boardNum];
  const pts = pointsForBoard(boardNum);
  if(!layout){container.innerHTML='<div style="grid-column:1/-1;text-align:center;color:var(--muted);padding:40px">Board wird generiert… (Spielleiter: „Neue Runde")</div>';return}
  const gridKey = layout.map(c=>c.name).join('|');
  const shouldAnimate = lastGridKey[boardNum] !== gridKey;
  lastGridKey[boardNum] = gridKey;
  container.innerHTML='';
  layout.forEach((cat,ci)=>{
    const h=document.createElement('div');h.className='cat-head'+(shouldAnimate?' enter':'');h.textContent=cat.name;
    if(shouldAnimate) h.style.animationDelay=(ci*18)+'ms';
    container.appendChild(h);
  });
  for(let i=0;i<5;i++){
    layout.forEach((cat,ci)=>{
      const lvl=i+1; const points=pts[i];
      const cell=document.createElement('button');
      const key=qKey(boardNum,cat.name,points);
      const done=(state.played_questions||[]).includes(key);
      cell.className='cell'+(done?' done':'')+(shouldAnimate?' enter':'');
      if(shouldAnimate) cell.style.animationDelay=(90+(i*layout.length+ci)*14)+'ms';
      cell.textContent=done?'':points;
      if(!done && clickable && state.phase==='board'){
        cell.onclick=()=>openQuestion(boardNum,cat.name,lvl,points,cat.questions[lvl]);
      } else if(state.phase!=='board'){
        cell.classList.add('disabled');
      }
      container.appendChild(cell);
    });
  }
}

function nextPlayerId(afterId){
  if(players.length===0) return null;
  if(!afterId) return players[0].id;
  const idx = players.findIndex(p=>p.id===afterId);
  if(idx===-1) return players[0].id;
  return players[(idx+1)%players.length].id;
}

async function openQuestion(boardNum,catName,lvl,points,q){
  if(!q){toast("Keine Frage hinterlegt");return}
  const owner = nextPlayerId(state.turn_player_id);
  const buzzVal = Math.floor(points/2);
  await sb.from('quiz_state').update({
    phase:'question',
    current_question:{board:boardNum,category:catName,points,frage:q.frage,bild:q.bild||null,antwort:q.antwort},
    owner_player_id:owner,
    turn_player_id:owner,
    current_value:points,
    buzz_value:buzzVal,
    is_owner_phase:true,
    buzzer_open:false,
    buzzed_player_id:null,
    already_buzzed:[],
    answer_revealed:false,
    result_text:null,result_kind:'turn',
    joker_from_id:null,
    updated_at:new Date().toISOString()
  }).eq('id',1);
}

function renderOverlay(view){
  const ov=$("qOverlay");
  const shouldShow = !!(state && state.phase!=='board' && state.current_question);
  if(!shouldShow){
    if(!ov.classList.contains('hidden') && !ov.classList.contains('closing')){
      ov.classList.add('closing');
      setTimeout(()=>{ ov.classList.add('hidden'); ov.classList.remove('closing'); }, 180);
    }
    return;
  }
  ov.classList.remove('hidden','closing');
  const q=state.current_question;
  $("ovTitle").innerHTML=`${escapeHtml(q.category)}<span class="qpoints">${q.points}</span>`;
  const txtEl=$("ovText");
  if(q.frage){txtEl.textContent=q.frage;txtEl.classList.remove('hidden')}else{txtEl.classList.add('hidden')}
  const img=$("ovImg");
  if(q.bild){img.src=q.bild;img.classList.remove('hidden');img.className='qimg'+(q.category==='FLAGGEN'?' flag':'')}
  else{img.classList.add('hidden')}
  const ansEl=$("ovAnswer");
  if(state.answer_revealed){ansEl.classList.remove('hidden');$("ovAnswerVal").textContent=q.antwort}
  else{ansEl.classList.add('hidden')}
  renderOverlayFooter();
}

function renderOverlayFooter(){
  const f=$("ovFooter");
  if(!state) {f.innerHTML='';return}
  if(state.result_kind==='joker'){
    const target=playerById(state.owner_player_id);
    const from=state.joker_from_id?playerById(state.joker_from_id):null;
    const fromTxt=from?`${escapeHtml(from.name)} → `:'';
    f.innerHTML=`<div class="resultbar joker">🃏 Joker! ${fromTxt}${target?escapeHtml(target.name):'…'} muss antworten</div>`;return;
  }
  if(state.result_kind==='wrong'){
    f.innerHTML=`<div class="resultbar wrong">Falsch! Andere können jetzt buzzern.</div>`;return;
  }
  if(state.result_kind==='correct'){
    const p=playerById(state.buzzed_player_id||state.owner_player_id);
    f.innerHTML=`<div class="resultbar correct">Richtig!${p?' '+escapeHtml(p.name):''} ✓</div>`;return;
  }
  if(state.result_kind==='reveal'){
    f.innerHTML=`<div class="resultbar reveal">Auflösung – schliesst automatisch…</div>`;return;
  }
  const owner = state.buzzed_player_id ? playerById(state.buzzed_player_id) : playerById(state.owner_player_id);
  if(owner){
    const initial=owner.name.charAt(0).toUpperCase();
    const verb = state.buzzed_player_id? 'BUZZERTE – ANTWORTET' : 'IST DRAN';
    f.innerHTML=`<div class="turnbar"><span class="av">${initial}</span> ${escapeHtml(owner.name)} ${verb}</div>`;
  } else {
    f.innerHTML=`<div class="turnbar">Wer ist dran?</div>`;
  }
}

function escapeHtml(s){return (s||'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]))}

async function initMaster(){
  await refreshState(); await refreshPlayers();
  if(!boardLayout[1]){ await generateAndStoreRound(); }
  subscribeAll(renderMaster);
  renderMaster();
}

function renderMaster(){
  if(!state) return;
  renderMasterQuestion();
  renderMasterPlayers();
}

function renderMasterQuestion(){
  const c=$("masterQContent");
  if(!state||state.phase==='board'||!state.current_question){
    c.innerHTML='';
    return;
  }
  const q=state.current_question;
  const owner=playerById(state.owner_player_id);
  const buzzer=state.buzzed_player_id?playerById(state.buzzed_player_id):null;
  const answering = buzzer||owner;
  const isBuzzPhase = !!state.buzzed_player_id;

  let whoClass='owner',whoTxt='';
  if(buzzer){whoClass='buzzer';whoTxt=`🔴 ${escapeHtml(buzzer.name)} hat gebuzzert & antwortet`}
  else if(state.buzzer_open){whoClass='nobody';whoTxt='Buzzer offen – warte auf Buzz…'}
  else if(owner){whoClass='owner';whoTxt=`🎯 ${escapeHtml(owner.name)} ist dran`}
  else{whoClass='nobody';whoTxt='Kein Spieler zugewiesen'}

  const plusVal = isBuzzPhase ? state.buzz_value : state.current_value;
  const minusVal = Math.floor(plusVal/2);

  c.innerHTML=`
    <div class="who-answers ${whoClass}">${whoTxt}</div>
    <div class="mq">
      <div class="mq-cat">${q.category} · ${q.points}</div>
      ${q.frage?`<div class="mq-text">${escapeHtml(q.frage)}</div>`:''}
      ${q.bild?`<img class="mq-img" src="${q.bild}">`:''}
      <div class="mq-ans"><div class="lbl">RICHTIGE ANTWORT</div><div class="val">${escapeHtml(q.antwort)}</div></div>
    </div>
    <div class="value-info">
      <div><div class="v plus">+${plusVal}</div><div class="l">BEI RICHTIG</div></div>
      <div><div class="v minus">−${minusVal}</div><div class="l">BEI FALSCH</div></div>
    </div>
    <div class="master-buttons">
      <button class="mbtn correct" ${answering?'':'disabled'} onclick="judge(true)">✓ RICHTIG</button>
      <button class="mbtn wrong" ${answering?'':'disabled'} onclick="judge(false)">✗ FALSCH</button>
      <button class="mbtn reveal" onclick="revealAnswer()">ANTWORT AUFDECKEN</button>
      <button class="mbtn neutral" onclick="closeQuestion()">Frage schliessen</button>
    </div>
  `;
}

function renderMasterPlayers(){
  const c=$("masterPlayers");
  c.innerHTML='';
  if(players.length===0){return}
  const qOpen = state && state.phase==='question' && state.current_question;
  players.forEach((p,idx)=>{
    const isTurn = state&&state.turn_player_id===p.id;
    const cards=playerCards(p);
    const jokerOk=jokerAvailable(p);
    let cardChips='';
    if(cards>=2){cardChips='<span class="mp-cardchip red" title="Rote Karte"></span>';}
    else if(cards===1){cardChips='<span class="mp-cardchip yellow" title="Gelbe Karte"></span>';}
    const jokerChip=`<span class="mp-jokerchip${jokerOk?'':' used'}" title="${jokerOk?'Joker verfügbar':'Joker weg'}">🃏</span>`;
    const prev=prevScores[p.id];
    let bumpCls='';
    if(prev!==undefined && prev!==p.score){ bumpCls = p.score>prev ? ' bump-up' : ' bump-down'; }
    prevScores[p.id]=p.score;
    const row=document.createElement('div');
    row.className='mp-row'+(isTurn?' turn':'');
    row.innerHTML=`
      <div>
        <div class="mp-name">
          <span>#${idx+1} ${escapeHtml(p.name)} ${isTurn?'🎯':''}</span>
          <span class="mp-cards">${cardChips}${jokerChip}</span>
        </div>
        <div class="mp-sc ${p.score<0?'neg':''}${bumpCls}">${p.score} Pkt</div>
      </div>
      <div class="mp-actions">
        <button class="mini" onclick="setTurn('${p.id}')">Dran</button>
        <button class="mini joker" ${(jokerOk&&qOpen)?'':'disabled'} onclick="useJoker('${p.id}')">🃏 Joker</button>
        <button class="mini card" onclick="giveCard('${p.id}')">⚠ Karte</button>
        <button class="mini" onclick="adjustScore('${p.id}',-50)">−50</button>
        <button class="mini" onclick="adjustScore('${p.id}',50)">+50</button>
        <button class="mini" onclick="kickPlayer('${p.id}')">✕</button>
      </div>`;
    c.appendChild(row);
  });
}

async function judge(correct){
  if(!state||!state.current_question) return;
  const q=state.current_question;
  const isBuzzPhase=!!state.buzzed_player_id;
  const answeringId = state.buzzed_player_id || state.owner_player_id;
  if(!answeringId){toast("Niemand zugewiesen");return}
  const val = isBuzzPhase ? state.buzz_value : state.current_value;

  if(correct){
    await changeScore(answeringId, +val);
    const played=[...(state.played_questions||[]), qKey(q.board,q.category,q.points)];
    await sb.from('quiz_state').update({
      answer_revealed:true, result_kind:'correct',
      buzzer_open:false,
      played_questions:played,
      updated_at:new Date().toISOString()
    }).eq('id',1);
    scheduleClose(2500);
  } else {
    await changeScore(answeringId, -Math.floor(val/2));
    const alreadyBuzzed=[...(state.already_buzzed||[]), answeringId];
    await sb.from('quiz_state').update({
      result_kind:'wrong',
      is_owner_phase:false,
      buzzer_open:true,
      buzzed_player_id:null,
      already_buzzed:alreadyBuzzed,
      updated_at:new Date().toISOString()
    }).eq('id',1);
    toast("Falsch – Buzzer für andere geöffnet");
  }
}

async function revealAnswer(){
  if(!state||!state.current_question) return;
  const q=state.current_question;
  const played=[...new Set([...(state.played_questions||[]), qKey(q.board,q.category,q.points)])];
  await sb.from('quiz_state').update({
    answer_revealed:true, result_kind:'reveal', buzzer_open:false,
    played_questions:played, updated_at:new Date().toISOString()
  }).eq('id',1);
  scheduleClose(REVEAL_AUTOCLOSE_MS);
}

function scheduleClose(ms){
  clearTimeout(revealTimer);
  revealTimer=setTimeout(()=>closeQuestion(),ms);
}

async function closeQuestion(){
  clearTimeout(revealTimer);
  await sb.from('quiz_state').update({
    phase:'board', current_question:null,
    owner_player_id:null, buzzed_player_id:null, buzzer_open:false,
    is_owner_phase:true, already_buzzed:[],
    answer_revealed:false, result_text:null, result_kind:null,
    joker_from_id:null,
    updated_at:new Date().toISOString()
  }).eq('id',1);
}

async function setTurn(pid){
  await sb.from('quiz_state').update({turn_player_id:pid,updated_at:new Date().toISOString()}).eq('id',1);
  if(state&&state.phase==='question'&&!state.buzzed_player_id&&state.is_owner_phase){
    await sb.from('quiz_state').update({owner_player_id:pid}).eq('id',1);
  }
  toast("Dran gesetzt");
}

async function giveCard(pid){
  const p=playerById(pid); if(!p)return;
  const current=playerCards(p);
  if(current>=2){
    if(!confirm(`${p.name} hat bereits Rot. Nochmal −${RED_CARD_PENALTY} Punkte? Sicher?`))return;
    await sb.from('quiz_players').update({score:p.score-RED_CARD_PENALTY}).eq('id',pid);
    toast(`🟥 ${p.name}: erneut −${RED_CARD_PENALTY}`);
    return;
  }
  const next=current+1;
  if(next>=2){
    if(!confirm(`Zweite gelbe Karte für ${p.name} → ROTE KARTE und −${RED_CARD_PENALTY} Punkte. Sicher?`))return;
    await sb.from('quiz_players').update({cards:next,score:p.score-RED_CARD_PENALTY}).eq('id',pid);
    toast(`🟥 Rote Karte für ${p.name} (−${RED_CARD_PENALTY})`);
  } else {
    await sb.from('quiz_players').update({cards:next}).eq('id',pid);
    toast(`🟨 Gelbe Karte für ${p.name}`);
  }
}

function useJoker(pid){
  const p=playerById(pid); if(!p)return;
  if(!jokerAvailable(p)){toast(`${p.name} hat keinen Joker mehr`);return}
  if(!(state&&state.phase==='question'&&state.current_question)){toast("Keine Frage offen");return}
  const targets=players.filter(x=>x.id!==pid);
  if(targets.length===0){toast("Keine andere Person verfügbar");return}
  $("jokerFrom").innerHTML=`Joker von <b style="color:var(--gold)">${escapeHtml(p.name)}</b> · wähle, wer antworten muss:`;
  const box=$("jokerTargets");
  box.innerHTML='';
  targets.forEach(t=>{
    const b=document.createElement('button');
    b.className='btn-primary';
    b.style.cssText='padding:14px;font-size:16px';
    b.textContent=t.name;
    b.onclick=()=>assignJoker(pid,t.id);
    box.appendChild(b);
  });
  $("jokerOverlay").classList.remove('hidden');
}

function closeJokerPicker(){ $("jokerOverlay").classList.add('hidden'); }

async function assignJoker(fromId,targetId){
  closeJokerPicker();
  const from=playerById(fromId), target=playerById(targetId);
  if(!from||!target)return;
  await sb.from('quiz_players').update({joker_used:true}).eq('id',fromId);
  await sb.from('quiz_state').update({
    owner_player_id:targetId,
    turn_player_id:fromId,
    is_owner_phase:true,
    buzzer_open:false,
    buzzed_player_id:null,
    joker_from_id:fromId,
    result_kind:'joker',
    updated_at:new Date().toISOString()
  }).eq('id',1);
  toast(`🃏 ${from.name} schickt die Frage an ${target.name}`);
}

async function switchBoard(n){
  await sb.from('quiz_state').update({active_board:n,updated_at:new Date().toISOString()}).eq('id',1);
}

async function newRound(){
  if(!confirm("Neue Runde starten?")) return;
  await generateAndStoreRound();
  toast("Neue Runde – Joker zurückgesetzt!");
}

async function resetJokers(){
  await sb.from('quiz_players').update({joker_used:false}).neq('id','00000000-0000-0000-0000-000000000000');
  toast("Joker fuer alle zurueckgesetzt");
}

async function resetScores(){
  if(!confirm("Alle Punkte auf 0 zurücksetzen?")) return;
  await sb.from('quiz_players').update({score:0,cards:0,joker_used:false}).neq('id','00000000-0000-0000-0000-000000000000');
  toast("Punkte, Karten & Joker zurückgesetzt");
}

async function changeScore(pid,delta){
  const p=playerById(pid); if(!p)return;
  await sb.from('quiz_players').update({score:p.score+delta}).eq('id',pid);
}
async function adjustScore(pid,delta){ await changeScore(pid,delta); }

async function kickPlayer(pid){
  if(!confirm("Spieler entfernen?"))return;
  await sb.from('quiz_players').delete().eq('id',pid);
}

async function addManualPlayer(){
  const name=prompt("Name des Spielers:");
  if(!name)return;
  await sb.from('quiz_players').insert({name:name.trim(),score:0,cards:0,joker_used:false});
}

async function initBuzzer(){
  await refreshState(); await refreshPlayers();
  subscribeAll(renderBuzzer);
  populateNameSelect();
  const saved=sessionStorage.getItem("quizduell_pid");
  if(saved && players.find(p=>p.id===saved)){
    myPlayerId=saved;
    showBuzzPlay();
  }
  renderBuzzer();
  document.addEventListener('keydown',e=>{
    if(e.code==='Space' && ROLE==='buzzer' && myPlayerId){e.preventDefault();pressBuzz()}
  });
}

function populateNameSelect(){
  const sel = $("playerName");
  const names = Object.keys(typeof AVATARE!=='undefined' ? AVATARE : {});
  const current = sel.value;
  sel.innerHTML = '<option value="">— wähle deinen Namen —</option>' +
    names.map(n=>`<option value="${n}" ${n===current?'selected':''}>${n}</option>`).join('');
}

async function joinGame(){
  const name=$("playerName").value.trim();
  if(!name){toast("Bitte einen Namen auswählen");return}
  let existing=players.find(p=>p.name.toLowerCase()===name.toLowerCase());
  if(existing){myPlayerId=existing.id}
  else{
    const {data,error}=await sb.from('quiz_players').insert({name,score:0,cards:0,joker_used:false}).select().single();
    if(error){toast("Fehler beim Beitreten");return}
    myPlayerId=data.id;
  }
  sessionStorage.setItem("quizduell_pid",myPlayerId);
  await refreshPlayers();
  showBuzzPlay();
  renderBuzzer();
}

function showBuzzPlay(){
  $("joinScreen").classList.add("hidden");
  $("buzzPlay").classList.remove("hidden");
}

async function pressBuzz(){
  if(!state||!state.buzzer_open||!myPlayerId)return;
  if((state.already_buzzed||[]).includes(myPlayerId)){toast("Du hattest diese Frage schon");return}
  if(state.buzzed_player_id){return}
  const {data,error}=await sb.from('quiz_state')
    .update({buzzed_player_id:myPlayerId,buzz_ts:new Date().toISOString(),buzzer_open:false,result_kind:null,updated_at:new Date().toISOString()})
    .eq('id',1).is('buzzed_player_id',null).eq('buzzer_open',true).select();
  if(data&&data.length){navigator.vibrate&&navigator.vibrate(80)}
}

function renderBuzzer(){
  if(!myPlayerId){return}
  const me=playerById(myPlayerId);
  $("myName").textContent=me?me.name:'—';
  const scoreEl=$("myScore");
  if(me){
    const prev=prevScores[me.id];
    if(prev!==undefined && prev!==me.score){
      const bumpCls = me.score>prev ? 'bump-up' : 'bump-down';
      scoreEl.classList.remove('bump-up','bump-down');
      void scoreEl.offsetWidth;
      scoreEl.classList.add(bumpCls);
    }
    prevScores[me.id]=me.score;
  }
  scoreEl.textContent=me?me.score:'0';
  const cardsEl=$("myCards");
  if(me&&cardsEl){
    const c=playerCards(me);
    let cardTxt='';
    if(c>=2)cardTxt='<span style="color:var(--red-bright)">🟥 Rot</span>';
    else if(c===1)cardTxt='<span style="color:var(--gold)">🟨 Gelb</span>';
    const jk=jokerAvailable(me)?'🃏':'<span style="opacity:.3">🃏</span>';
    cardsEl.innerHTML=`${cardTxt} ${jk}`;
  }

  const btn=$("bigBuzz");
  const status=$("buzzStatus");
  if(!state){status.textContent='Verbinde…';btn.disabled=true;return}

  const iAmOwner = state.owner_player_id===myPlayerId && state.is_owner_phase && state.phase==='question';
  const iBuzzed = state.buzzed_player_id===myPlayerId;
  const iAmLocked = (state.already_buzzed||[]).includes(myPlayerId);

  if(state.phase==='board'){
    status.textContent='Warte auf nächste Frage…';status.className='buzz-status';
    btn.disabled=true;btn.classList.remove('armed');btn.textContent='BUZZ';
  } else if(iBuzzed){
    status.textContent='Du hast gebuzzert! Antworte!';status.className='buzz-status mine';
    btn.disabled=true;btn.classList.remove('armed');btn.textContent='DU!';
  } else if(iAmOwner){
    const jokerNote = state.result_kind==='joker' ? '🃏 Joker! Du wurdest drangenommen – antworte!' : 'Du bist dran – beantworte die Frage!';
    status.textContent=jokerNote;status.className='buzz-status mine';
    btn.disabled=true;btn.classList.remove('armed');btn.textContent='DEINE FRAGE';
  } else if(state.buzzer_open && !iAmLocked){
    status.textContent='BUZZER OFFEN – Drück jetzt!';status.className='buzz-status open';
    btn.disabled=false;btn.classList.add('armed');btn.textContent='BUZZ!';
  } else if(state.buzzer_open && iAmLocked){
    status.textContent='Du hattest diese Frage schon.';status.className='buzz-status locked';
    btn.disabled=true;btn.classList.remove('armed');btn.textContent='✕';
  } else if(state.buzzed_player_id){
    const b=playerById(state.buzzed_player_id);
    status.textContent=(b?b.name:'Jemand')+' hat gebuzzert…';status.className='buzz-status locked';
    btn.disabled=true;btn.classList.remove('armed');btn.textContent='—';
  } else {
    status.textContent='Buzzer gesperrt – warte…';status.className='buzz-status locked';
    btn.disabled=true;btn.classList.remove('armed');btn.textContent='BUZZ';
  }
}
</script>
<script src="../zurueck.js"></script>
<script src="../cam.js"></script>
<script src="../buzzer-fx.js"></script>
<script src="../host-fx.js"></script>
<script src="../sound-toggle.js"></script>
<script src="../bestenliste.js"></script>
<script src="../spiel-beenden.js"></script>
<script>
  SpielBeenden.init({
    format: 'quizduell',
    sichtbar: function () {
      return ROLE === 'host' || ROLE === 'master';
    },
    sammle: async function () {
      try { await refreshPlayers(); } catch (e) {}
      return (players || []).map(function (p) {
        return { spieler: p.name, punkte: p.score || 0 };
      });
    }
  });
</script>
