<!doctype html>
<html lang="de">
<head>
<meta charset="utf-8" />
<title>Wer ist das? — Spielleiter</title>
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Anton&family=Inter:wght@500;700;900&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="../auth.js"></script>
<script src="./bilder.js"></script>
<style>
  .avatar-pic{
  width:36px;height:36px;border-radius:50%;object-fit:cover;flex-shrink:0;
}
  :root{
    --bg:#0a0e1a; --panel:#12172a; --panel-border:#232b45;
    --ink:#eef1f8; --muted:#6b7488; --accent:#00e5c7; --warn:#ffd166; --bad:#ff3860;
  }
  *{box-sizing:border-box;}
  body{margin:0;background:var(--bg);color:var(--ink);font-family:'Inter',sans-serif;padding:24px;min-height:100vh;}
  h1{font-family:'Anton',sans-serif;letter-spacing:2px;margin:0 0 20px;font-size:28px;}
  .grid{display:grid;grid-template-columns:1fr 1fr;gap:20px;max-width:1100px;margin:0 auto;}
  .card{background:var(--panel);border:1px solid var(--panel-border);border-radius:16px;padding:20px;}
  .card h2{font-size:15px;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);margin:0 0 14px;}
  button{
    font-family:'Inter',sans-serif;font-weight:700;border:none;border-radius:10px;
    padding:12px 18px;cursor:pointer;font-size:14px;transition:transform .1s, opacity .15s;
  }
  button:active{transform:scale(.96);}
  button:disabled{opacity:.35;cursor:not-allowed;}
  .btn-primary{background:var(--accent);color:#04120f;}
  .btn-warn{background:var(--warn);color:#241900;}
  .btn-bad{background:var(--bad);color:#fff;}
  .btn-ghost{background:#1b2138;color:var(--ink);border:1px solid var(--panel-border);}
  .row{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:10px;}
  input[type=text]{
    background:#0d1220;border:1px solid var(--panel-border);color:var(--ink);
    padding:10px 12px;border-radius:8px;font-family:'Inter',sans-serif;font-size:14px;flex:1;
  }
  .status-line{font-size:14px;color:var(--muted);margin-bottom:14px;}
  .status-line b{color:var(--ink);}
  .queue{display:flex;flex-direction:column;gap:6px;margin-top:10px;}
  .queue-item{
    display:flex;justify-content:space-between;align-items:center;
    background:#0d1220;border:1px solid var(--panel-border);border-radius:8px;padding:8px 12px;
  }
  .queue-item.active{border-color:var(--warn);}
  .queue-item.out{opacity:.4;text-decoration:line-through;}
  .players{display:flex;flex-direction:column;gap:8px;}
  .player-row{
    display:flex;align-items:center;gap:10px;background:#0d1220;
    border:1px solid var(--panel-border);border-radius:8px;padding:8px 10px;
  }
  .player-row .name{flex:1;font-weight:700;}
  .player-row .score{font-family:'Anton',sans-serif;font-size:20px;color:var(--accent);min-width:36px;text-align:center;}
  .mini{padding:6px 10px;font-size:12px;}
  .answer-reveal{font-family:'Anton',sans-serif;font-size:20px;color:var(--warn);margin-top:6px;}

@media (max-width:820px){
  body{padding:14px;}
  .grid{grid-template-columns:1fr;gap:14px;}
  .row{flex-wrap:wrap;}
  .team-score-row,.score-row,.jn-row,.stat-mini{flex-wrap:wrap;}
  button,select,input{min-height:40px;}
}
</style>
<link rel="stylesheet" href="../responsive.css" />
</head>
<body>
<h1>WER IST DAS? — SPIELLEITER</h1>
<div class="grid">

  <div class="card">
    <h2>Runde</h2>
    <div class="status-line" id="statusLine">Kein Bild aktiv.</div>
    <div class="answer-reveal" id="answerReveal"></div>
    <div class="row">
      <button class="btn-primary" id="btnNewRound">Neues Bild starten</button>
      <button class="btn-ghost" id="btnResetPool">Pool zurücksetzen</button>
    </div>
    <h2 style="margin-top:20px;">Buzzer-Warteschlange</h2>
    <div class="queue" id="queue"><span style="color:var(--muted);">— niemand gebuzzert —</span></div>
    <div class="row" style="margin-top:14px;">
      <button class="btn-primary" id="btnCorrect" disabled>Richtig</button>
      <button class="btn-bad" id="btnWrong" disabled>Falsch</button>
    </div>
  </div>

  <div class="card">
    <h2>Spieler</h2>
    <div class="row">
      <input type="text" id="newPlayerName" placeholder="Name eingeben…" />
      <button class="btn-primary" id="btnAddPlayer">Hinzufügen</button>
    </div>
    <div class="players" id="players"></div>
  </div>

</div>

<script>
const SUPABASE_URL = "https://dazabcxqplkvcyeiesgd.supabase.co";
const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRhemFiY3hxcGxrdmN5ZWllc2dkIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE4NTQ0NzksImV4cCI6MjA5NzQzMDQ3OX0.N3Dca8Quii4M8nFYLHjzBslby_tBUCyH1-WnPfYW01Y";

const sb = window.KA_SB || supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
const PHASE1_MS = 8000;

let state = { players:{}, imageIndex:null, revealStartedAt:null, solved:false, buzzQueue:[], buzzedOut:[], usedIndices:[] };

async function loadState(){
  const { data } = await sb.from('wid_state').select('state').eq('id',1).single();
  state = Object.assign({ players:{}, imageIndex:null, revealStartedAt:null, solved:false, buzzQueue:[], buzzedOut:[], usedIndices:[] }, data?.state||{});
  render();
}
async function saveState(){
  await sb.from('wid_state').update({ state }).eq('id',1);
}
loadState();

sb.channel('wid_state_channel_sl')
  .on('postgres_changes', { event:'*', schema:'public', table:'wid_state' }, payload=>{
    state = payload.new.state || state;
    render();
  }).subscribe();

const MAX_PUNKTE = 5;
const MIN_PUNKTE = 1;
const PUNKTE_DAUER_MS = 13000;

function currentPoints(){
  if(!state.revealStartedAt) return MAX_PUNKTE;
  const elapsed = Date.now() - state.revealStartedAt;
  const t = Math.max(0, Math.min(1, elapsed / PUNKTE_DAUER_MS));
  return Math.max(MIN_PUNKTE, Math.ceil(MAX_PUNKTE - t * (MAX_PUNKTE - MIN_PUNKTE)));
}

function activeBuzzer(){
  return state.buzzQueue.find(n=>!state.buzzedOut.includes(n));
}

function render(){
  const statusLine = document.getElementById('statusLine');
  const answerReveal = document.getElementById('answerReveal');
  if(state.imageIndex!=null && BILDER[state.imageIndex]){
    statusLine.innerHTML = `Bild <b>#${state.imageIndex+1}</b> aktiv — aktuell wert: <b>${currentPoints()} Punkte</b>${state.solved?' — GELÖST':''}`;
    answerReveal.textContent = 'Antwort: ' + BILDER[state.imageIndex].antwort;
  } else {
    statusLine.textContent = state.usedIndices && state.usedIndices.length>=BILDER.length
      ? 'Alle Bilder wurden bereits gezeigt. Klick "Pool zurücksetzen" für eine neue Runde.'
      : 'Kein Bild aktiv.';
    answerReveal.textContent = '';
  }

  const queueEl = document.getElementById('queue');
  if(state.buzzQueue.length===0){
    queueEl.innerHTML = '<span style="color:var(--muted);">— niemand gebuzzert —</span>';
  } else {
    const active = activeBuzzer();
    queueEl.innerHTML = state.buzzQueue.map(n=>{
      const out = state.buzzedOut.includes(n);
      const isActive = n===active;
      return `<div class="queue-item ${isActive?'active':''} ${out?'out':''}">${n}${isActive?' ← dran':''}</div>`;
    }).join('');
  }

  const active = activeBuzzer();
  document.getElementById('btnCorrect').disabled = !active || state.solved || state.imageIndex==null;
  document.getElementById('btnWrong').disabled = !active || state.solved || state.imageIndex==null;

  const playersEl = document.getElementById('players');
  playersEl.innerHTML = Object.entries(state.players).map(([name,score])=>`
    <div class="player-row">
      <span class="name">${name}</span>
      <button class="btn-ghost mini" data-adj="-1" data-name="${name}">−1</button>
      <span class="score">${score}</span>
      <button class="btn-ghost mini" data-adj="1" data-name="${name}">+1</button>
      <button class="btn-bad mini" data-remove="${name}">Entfernen</button>
    </div>
  `).join('');
  playersEl.querySelectorAll('[data-adj]').forEach(b=>{
    b.onclick = async ()=>{
      const n = b.dataset.name;
      state.players[n] = (state.players[n]||0) + parseInt(b.dataset.adj,10);
      await saveState();
    };
  });
  playersEl.querySelectorAll('[data-remove]').forEach(b=>{
    b.onclick = async ()=>{
      const n = b.dataset.remove;
      delete state.players[n];
      state.buzzQueue = state.buzzQueue.filter(x=>x!==n);
      state.buzzedOut = state.buzzedOut.filter(x=>x!==n);
      await saveState();
    };
  });
}

document.getElementById('btnAddPlayer').onclick = async ()=>{
  const input = document.getElementById('newPlayerName');
  const name = input.value.trim();
  if(!name || state.players[name]!=null) return;
  state.players[name] = 0;
  input.value='';
  await saveState();
};
document.getElementById('newPlayerName').addEventListener('keydown', e=>{
  if(e.key==='Enter') document.getElementById('btnAddPlayer').click();
});

document.getElementById('btnNewRound').onclick = async ()=>{
  const total = BILDER.length;
  let available = [...Array(total).keys()].filter(i=>!state.usedIndices.includes(i));
  if(available.length===0){
    alert('Alle Bilder wurden bereits gezeigt. Klick "Pool zurücksetzen" für eine neue Runde mit allen Bildern.');
    return;
  }
  const idx = available[Math.floor(Math.random()*available.length)];
  state.imageIndex = idx;
  state.usedIndices.push(idx);
  state.revealStartedAt = Date.now();
  state.solved = false;
  state.buzzQueue = [];
  state.frozenAt = null;
  state.buzzedOut = [];
  await saveState();
};

document.getElementById('btnResetPool').onclick = async ()=>{
  state.usedIndices = [];
  await saveState();
};

document.getElementById('btnCorrect').onclick = async ()=>{
  const active = activeBuzzer();
  if(!active) return;
  state.players[active] = (state.players[active]||0) + currentPoints();
  state.solved = true;
  await saveState();
};

document.getElementById('btnWrong').onclick = async ()=>{
  const active = activeBuzzer();
  if(!active) return;
  state.players[active] = (state.players[active]||0) - 1;
  state.buzzedOut.push(active);

  if(!activeBuzzer() && state.frozenAt){
    const pause = Date.now() - state.frozenAt;
    state.revealStartedAt += pause;
    state.frozenAt = null;
  }
  await saveState();
};
</script>
<script src="../zurueck.js"></script>
<script src="../hintergrund.js"></script>
<script src="../sound-toggle.js"></script>
<script src="../bestenliste.js"></script>
<script src="../spiel-beenden.js"></script>
<script>
  SpielBeenden.init({
    format: 'weristdas',
    sammle: async function () {
      const { data } = await sb.from('wid_state').select('state').eq('id', 1).single();
      const players = (data && data.state && data.state.players) || {};
      return Object.entries(players).map(function (e) {
        return { spieler: e[0], punkte: e[1] };
      });
    }
  });
</script>
</body>
</html>
