<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Black Stories</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Eater&family=Chakra+Petch:wght@500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  .avatar-pic{
  width:36px;height:36px;border-radius:50%;object-fit:cover;flex-shrink:0;
  }
  :root{
    --bg-0:#0a0714; --bg-1:#150c24;
    --panel:#160f28; --panel-border:rgba(160,130,255,.22);
    --teal:#3fe6e0; --teal-dim:rgba(63,230,224,.14);
    --purple:#9b6bff;
    --text:#f3eefc; --text-dim:#9d8fc0;
    --font-display:'Eater',cursive;
    --font-ui:'Chakra Petch',sans-serif;
    --font-body:'Inter',sans-serif;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{
    min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;
    background:
      radial-gradient(ellipse at 50% -10%, rgba(120,70,220,.25), transparent 55%),
      linear-gradient(180deg, var(--bg-0), var(--bg-1));
    color:var(--text);font-family:var(--font-body);
    padding:40px 20px;
  }
  .logo{
    font-family:var(--font-display);font-size:64px;line-height:.92;text-align:center;
    letter-spacing:1px;
    background:linear-gradient(180deg,#4fe6a0 0%, #ff3d68 100%);
    -webkit-background-clip:text;background-clip:text;color:transparent;
    filter:drop-shadow(0 0 14px rgba(255,61,104,.4));
    -webkit-text-stroke:1px rgba(255,61,104,.5);
    margin-bottom:36px;
  }
  .links{display:flex;flex-direction:column;gap:14px;width:100%;max-width:340px;}
  a.card{
    display:block;
    background:var(--panel);border:1.5px solid var(--panel-border);border-radius:14px;
    padding:18px 20px;text-decoration:none;color:var(--text);
    font-family:var(--font-ui);font-weight:700;font-size:16px;letter-spacing:.5px;
    text-align:center;
    transition:border-color .2s ease, transform .2s ease;
  }
  a.card:hover{border-color:var(--purple);transform:translateY(-2px);}
  a.card.host{color:var(--teal);}
  a.card.gm{color:var(--purple);}
</style>
<link rel="stylesheet" href="../responsive.css" />
</head>
<body>
  <div class="logo">BLACK<br>STORIES</div>
  <div class="links">
    <a class="card host" href="host.html">Host-Overlay</a>
    <a class="card gm" href="spielleiter.html">Spielleiter</a>
  </div>
<script src="../zurueck.js"></script>
<script src="../hintergrund.js"></script>
</body>
</html>
