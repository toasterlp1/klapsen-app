<!doctype html>
<html lang="de">
<head>
<meta charset="utf-8" />
<title>Higher or Lower — Spielleiter</title>
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Anton&family=Inter:wght@500;700;800;900&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="../auth.js"></script>
<script src="../turnier.js"></script>
<script src="./categories.js"></script>
<script src="../avatare.js"></script>
<style>
  :root{
    --bg:#080b16; --panel:#12172a; --panel2:#161f38; --border:#232b45;
    --ink:#eef1f8; --muted:#8b96b3; --accent:#4ad9ff; --good:#3ddc84; --bad:#ff3860; --gold:#f5c542;
    --ease:cubic-bezier(.22,.9,.32,1);
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  html,body{min-height:100vh;}
  body{background:radial-gradient(ellipse at 50% -10%, #12203a 0%, var(--bg) 60%);color:var(--ink);font-family:'Inter',sans-serif;padding:22px 16px 90px;}
  .wrap{max-width:640px;margin:0 auto;}
  h1{font-family:'Anton',sans-serif;font-size:34px;letter-spacing:1px;margin-bottom:4px;}
  h1 span{color:var(--accent);}
  .sub{color:var(--muted);font-size:14px;margin-bottom:20px;}

  .card{background:linear-gradient(165deg,var(--panel2),var(--panel));border:1px solid var(--border);border-radius:16px;padding:18px;margin-bottom:16px;}
  .card-label{font-size:12px;letter-spacing:2px;text-transform:uppercase;color:var(--muted);font-weight:800;margin-bottom:14px;}

  select,input{width:100%;background:var(--panel);border:1px solid var(--border);color:var(--ink);padding:13px;border-radius:12px;font-size:15px;font-family:inherit;outline:none;}
  select:focus,input:focus{border-color:var(--accent);}
  .row{display:flex;gap:10px;}
  .row > *{flex:1;}

  button{border:none;border-radius:12px;padding:13px;font-weight:800;font-size:15px;cursor:pointer;font-family:inherit;transition:transform .12s,filter .2s;}
  button:active{transform:scale(.97);}
  .btn-primary{background:linear-gradient(135deg,var(--accent),#2ba9d4);color:#04121a;}
  .btn-ghost{background:transparent;border:1px solid var(--border);color:var(--muted);}
  .btn-good{background:linear-gradient(135deg,var(--good),#2bbf72);color:#04120c;}
  .btn-bad{background:linear-gradient(135deg,var(--bad),#d62b4a);color:#fff;}

  .cat-aktiv{display:flex;align-items:center;justify-content:space-between;gap:12px;background:rgba(74,217,255,.08);border:1px solid rgba(74,217,255,.3);border-radius:12px;padding:12px 14px;margin-top:12px;}
  .cat-aktiv .nm{font-family:'Anton',sans-serif;font-size:18px;color:var(--accent);}

  .add-row{display:flex;gap:8px;margin-bottom:14px;}
  .add-row select{flex:1;}
  .add-row button{flex:0 0 auto;padding:13px 18px;}

  .players{display:flex;flex-direction:column;gap:10px;}
  .prow{display:flex;align-items:center;gap:12px;background:#0d1424;border:1px solid var(--border);border-radius:12px;padding:10px 12px;}
  .prow.dran{border-color:var(--good);box-shadow:0 0 20px -8px var(--good);}
  .prow.tot{opacity:.45;}
  .prow .av{width:40px;height:40px;border-radius:50%;object-fit:cover;background:#1b2138;flex-shrink:0;}
  .prow .av-fb{width:40px;height:40px;border-radius:50%;background:#1b2138;display:flex;align-items:center;justify-content:center;font-family:'Anton',sans-serif;font-size:18px;color:var(--muted);flex-shrink:0;}
  .prow .nm{font-weight:800;font-size:15px;flex:1;}
  .prow .hearts{display:flex;gap:3px;}
  .prow .hearts svg{width:18px;height:18px;}
  .prow .hearts .full{color:var(--bad);}
  .prow .hearts .empty{color:#2a3244;}
  .prow .actions{display:flex;gap:6px;}
  .prow .actions button{padding:8px 10px;font-size:13px;border-radius:9px;}
  .prow .mini{background:#1b2138;color:var(--ink);border:1px solid var(--border);}
  .prow .mini.dran-btn{background:var(--good);color:#04120c;border:none;}
  .leer{color:var(--muted);text-align:center;padding:16px 0;font-size:14px;}
</style>
<link rel="stylesheet" href="../responsive.css" />
</head>
<body>
<div class="wrap">
  <h1>Higher or <span>Lower</span></h1>
  <p class="sub">Steuerung — Kategorie starten, Leben und Zug verwalten.</p>

  <div class="card">
    <div class="card-label">Kategorie</div>
    <div class="row">
      <select id="catSelect"></select>
    </div>
    <div class="row" style="margin-top:10px;">
      <button class="btn-primary" id="startCat">Kategorie starten</button>
      <button class="btn-ghost" id="clearCat">Karten leeren</button>
    </div>
    <div class="row" style="margin-top:10px;align-items:center;gap:8px;">
      <span style="font-size:13px;color:var(--muted);">Spiele insgesamt:</span>
      <input type="number" id="spieleGesamt" min="1" max="20" value="4"
             style="width:70px;padding:8px;border-radius:8px;
                    background:#0d1220;border:1px solid #232b45;color:#eef1f8;">
      <button class="btn-ghost mini" id="spielReset">Zähler auf 0</button>
    </div>
    <div id="catAktiv"></div>
  </div>

  <div class="card">
    <div class="card-label">Spieler</div>
    <div class="add-row">
      <select id="addSelect"></select>
      <button class="btn-primary" id="addBtn">Hinzufügen</button>
    </div>
    <div class="players" id="players"><div class="leer">Noch keine Spieler.</div></div>
  </div>
</div>

<script>
const SUPABASE_URL = "https://dazabcxqplkvcyeiesgd.supabase.co";
const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRhemFiY3hxcGxrdmN5ZWllc2dkIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE4NTQ0NzksImV4cCI6MjA5NzQzMDQ3OX0.N3Dca8Quii4M8nFYLHjzBslby_tBUCyH1-WnPfYW01Y";
const sb = window.KA_SB || supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

const START_LEBEN = 3;
let state = { players: [], turnName: null, category: null, poolItems: [],
              spiel: 0, spieleGesamt: 4 };

function heartSvg(full){
  return `<svg class="${full?'full':'empty'}" viewBox="0 0 24 24" fill="currentColor"><path d="M12 21s-6.72-4.35-9.35-8.42C1.02 9.92 1.94 6.5 4.87 5.06 7 4.02 9.5 4.64 12 7c2.5-2.36 5-2.98 7.13-1.94 2.93 1.44 3.85 4.86 2.2 7.52C18.72 16.65 12 21 12 21Z"/></svg>`;
}

async function speichern(){
  state.updated = Date.now();
  await sb.from('hl_state').update({ state, updated_at: new Date().toISOString() }).eq('id', 1);
}

async function ladeState(){
  const { data } = await sb.from('hl_state').select('state').eq('id',1).single();
  if(data && data.state && Object.keys(data.state).length){
    state = Object.assign({ players:[], turnName:null, category:null, poolItems:[] }, data.state);
  }
  render();
}

sb.channel('hl_state_channel_sl')
  .on('postgres_changes', { event:'*', schema:'public', table:'hl_state' }, payload=>{
    const neu = payload.new.state || {};
    state = Object.assign({ players:[], turnName:null, category:null, poolItems:[] }, neu);
    render();
  }).subscribe();

function fuelleKategorien(){
  const sel = document.getElementById('catSelect');
  sel.innerHTML = CATEGORIES.map((c,i)=>`<option value="${i}">${c.name}</option>`).join('');
}

function fuelleNamen(){
  const sel = document.getElementById('addSelect');
  const drin = new Set(state.players.map(p=>p.name));
  const alle = (typeof AVATARE !== 'undefined') ? Object.keys(AVATARE) : [];
  const frei = alle.filter(n=>!drin.has(n));
  sel.innerHTML = frei.length
    ? frei.map(n=>`<option value="${n}">${n}</option>`).join('')
    : '<option value="">— alle drin —</option>';
}

function avatarBild(name){
  const url = (typeof avatarFor === 'function') ? avatarFor(name) : null;
  if(url) return `<img class="av" src="${url}" alt="">`;
  return `<div class="av-fb">${name?name[0].toUpperCase():'?'}</div>`;
}

function mischen(arr){
  const a = arr.slice();
  for(let i=a.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); [a[i],a[j]]=[a[j],a[i]]; }
  return a;
}

document.getElementById('startCat').onclick = async ()=>{
  const idx = parseInt(document.getElementById('catSelect').value,10);
  const cat = CATEGORIES[idx];
  if(!cat) return;
  state.category = { name: cat.name, unit: cat.unit || '' };
  state.poolItems = mischen(cat.items).map(it=>({ url: it.url, label: it.label }));
  // Jede neue Kategorie ist ein neues Spiel
  state.spiel = (state.spiel || 0) + 1;
  await speichern();
};

document.getElementById('spieleGesamt').onchange = async (e)=>{
  const n = parseInt(e.target.value, 10);
  if(n >= 1 && n <= 20){ state.spieleGesamt = n; await speichern(); }
};

document.getElementById('spielReset').onclick = async ()=>{
  state.spiel = 0;
  await speichern();
};

document.getElementById('clearCat').onclick = async ()=>{
  state.category = null;
  state.poolItems = [];
  await speichern();
};

document.getElementById('addBtn').onclick = async ()=>{
  const name = document.getElementById('addSelect').value;
  if(!name) return;
  if(state.players.find(p=>p.name===name)) return;
  state.players.push({ name, lives: START_LEBEN });
  if(!state.turnName) state.turnName = name;
  await speichern();
};

async function lebenAendern(name, delta){
  const p = state.players.find(x=>x.name===name);
  if(!p) return;
  p.lives = Math.max(0, Math.min(START_LEBEN, p.lives + delta));
  await speichern();
}

async function setzeDran(name){
  state.turnName = name;
  await speichern();
}

async function entfernen(name){
  state.players = state.players.filter(p=>p.name!==name);
  if(state.turnName === name) state.turnName = state.players[0] ? state.players[0].name : null;
  await speichern();
}

function render(){
  const sg = document.getElementById('spieleGesamt');
  if(sg && state.spieleGesamt && document.activeElement !== sg) sg.value = state.spieleGesamt;

  const catBox = document.getElementById('catAktiv');
  if(state.category){
    catBox.innerHTML = `<div class="cat-aktiv"><span class="nm">${state.category.name}</span><span style="color:var(--muted);font-size:13px;">${state.poolItems.length} Karten aktiv</span></div>`;
  } else {
    catBox.innerHTML = '';
  }

  fuelleNamen();

  const box = document.getElementById('players');
  if(!state.players.length){
    box.innerHTML = '<div class="leer">Noch keine Spieler.</div>';
    return;
  }
  box.innerHTML = state.players.map(p=>{
    const tot = p.lives <= 0;
    const dran = p.name === state.turnName && !tot;
    const hearts = Array.from({length:START_LEBEN},(_, i)=>heartSvg(i < p.lives)).join('');
    return `<div class="prow ${dran?'dran':''} ${tot?'tot':''}">
      ${avatarBild(p.name)}
      <span class="nm">${p.name}</span>
      <span class="hearts">${hearts}</span>
      <span class="actions">
        <button class="mini" data-minus="${p.name}">−</button>
        <button class="mini" data-plus="${p.name}">+</button>
        <button class="mini dran-btn" data-dran="${p.name}">Dran</button>
        <button class="mini" data-del="${p.name}">✕</button>
      </span>
    </div>`;
  }).join('');

  box.querySelectorAll('[data-minus]').forEach(b=>b.onclick=()=>lebenAendern(b.dataset.minus,-1));
  box.querySelectorAll('[data-plus]').forEach(b=>b.onclick=()=>lebenAendern(b.dataset.plus,1));
  box.querySelectorAll('[data-dran]').forEach(b=>b.onclick=()=>setzeDran(b.dataset.dran));
  box.querySelectorAll('[data-del]').forEach(b=>b.onclick=()=>entfernen(b.dataset.del));
}

fuelleKategorien();
ladeState();
</script>
<script src="../zurueck.js"></script>
<script src="../hintergrund.js"></script>
<script src="../sound-toggle.js"></script>
<script src="../bestenliste.js"></script>
<script src="../spiel-beenden.js"></script>
<script>
  SpielBeenden.init({
    format: 'higherlower',
    sammle: async function () {
      const { data } = await sb.from('hl_state').select('state').eq('id', 1).single();
      const players = (data && data.state && data.state.players) || [];
      return players.map(function (p) {
        return { spieler: p.name, punkte: Math.max(0, p.lives) };
      });
    }
  });
</script>

<script>
// Turnier: Rolle merken und auf Formatwechsel horchen.
// Schaltet der Spielleiter weiter, springt dieses Geraet mit.
if(window.TURNIER){
  TURNIER.setzeRolle('sl');
  TURNIER.starte(typeof sb !== "undefined" ? sb : null);
}
</script>
</body>
</html>
