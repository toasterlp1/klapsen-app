<!doctype html>
<html class="host" lang="de">
<head>
<meta charset="utf-8" />
<title>Hotzone — Host</title>
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Anton&family=Inter:wght@500;700;800;900&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="../auth.js"></script>
<script src="./categories.js"></script>

<style>
  /* Handy-Skalierung: Bezugsgroesse wechselt hochkant auf die Hoehe */
  :root{ --u: 1vw; }
  @media (max-width:900px) and (orientation:portrait){
    :root{ --u: 0.62vh; }
    html.host, body.host{ height:auto; min-height:100%; overflow-y:auto; overflow-x:hidden; }
  }
  @media (max-width:900px) and (orientation:portrait) and (min-aspect-ratio:3/5){
    :root{ --u: 0.72vh; }
  }
  @media (max-height:520px) and (orientation:landscape){
    :root{ --u: 1.35vh; }
  }

  :root{
    --bg:#0a0e1a; --bg2:#0d1524; --panel:#12172a; --panel2:#161f38; --border:#232b45;
    --ink:#eef1f8; --muted:#7a86a3;
    --cold:#3a7bff; --warm:#ffd166; --hot:#ff3860; --accent:#00e5c7;
    --blue:#3a7bff; --red:#ff3860;
    --ease:cubic-bezier(.22,.9,.32,1); --ease-out:cubic-bezier(.16,1,.3,1);
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  html,body{width:calc(100 * var(--u));height:100vh;overflow:hidden;font-family:'Inter',sans-serif;color:var(--ink);}
  body{background:var(--bg);}

  .orbs{position:fixed;inset:0;z-index:0;overflow:hidden;pointer-events:none;}
  .orbs span{position:absolute;border-radius:50%;filter:blur(100px);will-change:transform;opacity:.5;}
  .orbs .o1{width:calc(44 * var(--u));height:calc(44 * var(--u));top:calc(-12 * var(--u));left:calc(-8 * var(--u));background:radial-gradient(circle,rgba(58,123,255,.5),transparent 68%);animation:dA 26s var(--ease) infinite alternate;}
  .orbs .o2{width:calc(40 * var(--u));height:calc(40 * var(--u));bottom:calc(-14 * var(--u));right:calc(-8 * var(--u));background:radial-gradient(circle,rgba(255,56,96,.4),transparent 68%);animation:dB 30s var(--ease) infinite alternate;}
  .orbs .o3{width:calc(30 * var(--u));height:calc(30 * var(--u));top:40%;left:44%;background:radial-gradient(circle,rgba(0,229,199,.28),transparent 70%);animation:dC 34s var(--ease) infinite alternate;}
  @keyframes dA{0%{transform:translate(0,0) scale(1);}100%{transform:translate(calc(6 * var(--u)),calc(9 * var(--u))) scale(1.14);}}
  @keyframes dB{0%{transform:translate(0,0) scale(1);}100%{transform:translate(calc(-7 * var(--u)),calc(-6 * var(--u))) scale(1.12);}}
  @keyframes dC{0%{transform:translate(0,0) scale(1);}100%{transform:translate(0,calc(-5 * var(--u))) scale(1.18);}}
  .embers{position:fixed;inset:0;z-index:0;overflow:hidden;pointer-events:none;}
  .ember{position:absolute;bottom:-20px;width:5px;height:5px;border-radius:50%;background:var(--warm);box-shadow:0 0 10px var(--hot);animation:emberRise linear infinite;}
  @keyframes emberRise{0%{transform:translateY(0) translateX(0);opacity:0;}12%{opacity:.7;}88%{opacity:.4;}100%{transform:translateY(-108vh) translateX(var(--dx,30px));opacity:0;}}

  .stage{
    position:relative;z-index:2;width:calc(100 * var(--u));height:100vh;
    display:flex;flex-direction:column;align-items:center;padding:2.6vh calc(2 * var(--u)) 2.8vh;
  }

  .header{display:flex;flex-direction:column;align-items:center;margin-bottom:1.6vh;animation:riseIn .6s var(--ease-out) both;}
  .title{
    font-family:'Anton',sans-serif;font-size:calc(3 * var(--u));letter-spacing:5px;line-height:1;
    background:linear-gradient(180deg,#eaf2ff 0%, var(--accent) 45%, var(--hot) 100%);
    -webkit-background-clip:text;background-clip:text;color:transparent;
    filter:drop-shadow(0 0 20px rgba(0,229,199,.4));
  }
  .title-rule{width:calc(12 * var(--u));height:4px;border-radius:3px;margin-top:1vh;
    background:linear-gradient(90deg, var(--cold), var(--warm), var(--hot));
    box-shadow:0 0 16px rgba(255,56,96,.4);position:relative;overflow:hidden;}
  .title-rule::after{content:'';position:absolute;top:0;left:-40%;width:40%;height:100%;
    background:linear-gradient(90deg,transparent,rgba(255,255,255,.7),transparent);animation:sweep 2.8s var(--ease) infinite;}
  @keyframes sweep{0%{left:-40%;}100%{left:120%;}}

  .topbar{display:flex;justify-content:space-between;align-items:center;width:100%;max-width:1560px;margin-bottom:1.6vh;animation:riseIn .6s var(--ease-out) .08s both;}
  .info-pill{background:linear-gradient(160deg,var(--panel2),var(--panel));border:1px solid var(--border);border-radius:14px;padding:.9vh calc(1.4 * var(--u));min-width:calc(9 * var(--u));}
  .info-pill .lbl{font-size:calc(.62 * var(--u));letter-spacing:2px;color:var(--muted);text-transform:uppercase;font-weight:800;}
  .info-pill .val{font-family:'Anton',sans-serif;font-size:calc(1.3 * var(--u));margin-top:.3vh;}
  .info-pill.cat .val{color:var(--accent);}
  .info-pill.round{text-align:center;}

  .board{display:flex;gap:calc(1.6 * var(--u));width:100%;max-width:1660px;flex:1;min-height:0;}
  .team-panel{
    flex:0 0 calc(20 * var(--u));border-radius:20px;padding:1.6vh calc(1.2 * var(--u));
    background:linear-gradient(165deg,var(--panel2),var(--panel));border:2px solid var(--border);
    display:flex;flex-direction:column;
    transition:border-color .45s var(--ease), box-shadow .45s var(--ease), transform .45s var(--ease);
    animation:riseIn .6s var(--ease-out) both;
  }
  .team-panel.blue{animation-delay:.14s;border-color:rgba(58,123,255,.35);}
  .team-panel.red{animation-delay:.22s;border-color:rgba(255,56,96,.35);}
  .team-panel.turn-blue{border-color:var(--blue);box-shadow:0 0 40px -6px rgba(58,123,255,.45);transform:translateY(-4px);}
  .team-panel.turn-red{border-color:var(--red);box-shadow:0 0 40px -6px rgba(255,56,96,.45);transform:translateY(-4px);}
  .team-name{
    font-family:'Anton',sans-serif;font-size:calc(1.5 * var(--u));text-align:center;padding:1vh;border-radius:12px;
    color:#fff;letter-spacing:1px;margin-bottom:1vh;position:relative;overflow:hidden;
  }
  .team-panel.blue .team-name{background:linear-gradient(135deg, #5b96ff, var(--blue));}
  .team-panel.red .team-name{background:linear-gradient(135deg, #ff5470, var(--red));}
  .team-name .turn-flag{
    position:absolute;top:-.6vh;right:calc(.5 * var(--u));
    font-size:calc(.55 * var(--u));letter-spacing:1.5px;font-family:'Inter',sans-serif;font-weight:900;
    background:rgba(0,0,0,.35);padding:.3vh calc(.6 * var(--u));border-radius:20px;opacity:0;transition:opacity .35s;
  }
  .team-panel.turn-blue .blue-flag,.team-panel.turn-red .red-flag{opacity:1;}

  .joker-row{display:flex;gap:calc(.4 * var(--u));justify-content:center;margin-bottom:1vh;}
  .jk{position:relative;flex:1;max-width:calc(6 * var(--u));height:2.6vh;display:flex;align-items:center;justify-content:center;transition:filter .35s, transform .35s;}
  .jk::before{content:'';position:absolute;inset:0;background:var(--jc);clip-path:polygon(13% 0%, 87% 0%, 100% 50%, 87% 100%, 13% 100%, 0% 50%);}
  .jk::after{content:'';position:absolute;inset:2px;background:#131a2c;clip-path:polygon(13% 0%, 87% 0%, 100% 50%, 87% 100%, 13% 100%, 0% 50%);}
  .jk span{position:relative;z-index:2;font-family:'Anton',sans-serif;font-size:calc(.72 * var(--u));letter-spacing:.8px;color:#fff;}
  .jk[data-j="double"]{--jc:#c44dff;}
  .jk[data-j="reroll"]{--jc:#3a7bff;}
  .jk[data-j="grey"]{--jc:#ffd166;}
  .jk.spent{filter:grayscale(1) brightness(.42);}
  .jk.live{transform:scale(1.1);filter:drop-shadow(0 0 14px var(--jc)) brightness(1.3);animation:jkPulse 1.1s ease-in-out infinite;}
  @keyframes jkPulse{0%,100%{filter:drop-shadow(0 0 10px var(--jc)) brightness(1.2);}50%{filter:drop-shadow(0 0 24px var(--jc)) brightness(1.45);}}

  .team-score{text-align:center;font-family:'Anton',sans-serif;font-size:calc(3.4 * var(--u));color:#fff;margin-bottom:1.2vh;line-height:1;font-variant-numeric:tabular-nums;}
  .team-score.bump{animation:bump .5s var(--ease-out);}
  @keyframes bump{0%{transform:scale(1);}35%{transform:scale(1.22);color:var(--warm);}100%{transform:scale(1);}}

  .avatar-list{display:flex;flex-direction:column;gap:.9vh;overflow-y:auto;}
  .avatar-card{
    display:flex;align-items:center;gap:calc(.8 * var(--u));background:#0d1220;border:2px solid var(--border);
    border-radius:14px;padding:.7vh calc(.8 * var(--u));position:relative;
    transition:border-color .4s var(--ease), box-shadow .4s var(--ease), transform .4s var(--ease);
  }
  .avatar-ring{
    position:relative;width:calc(3.2 * var(--u));height:calc(3.2 * var(--u));border-radius:50%;flex-shrink:0;padding:calc(.18 * var(--u));
    background:#1b2138;border:calc(.16 * var(--u)) solid var(--border);transition:all .4s var(--ease);
  }
  .avatar-ring img,.avatar-ring .fallback{width:100%;height:100%;border-radius:50%;object-fit:cover;background:#1b2138;position:relative;z-index:1;}
  .avatar-ring .fallback{display:flex;align-items:center;justify-content:center;color:var(--muted);font-weight:800;font-size:calc(1 * var(--u));}
  .avatar-card.active .avatar-ring{border-color:var(--warm);box-shadow:0 0 22px -4px var(--warm);animation:ringPulse 1.6s ease-in-out infinite;}
  @keyframes ringPulse{0%,100%{box-shadow:0 0 18px -6px var(--warm);}50%{box-shadow:0 0 30px 0 var(--warm);}}
  .avatar-card.active .avatar-ring::before{
    content:'';position:absolute;inset:calc(-.16 * var(--u));border-radius:50%;z-index:0;
    background:conic-gradient(from 0deg, transparent 0 68%, var(--warm) 84%, transparent 100%);
    animation:spin 3s linear infinite;
  }
  @keyframes spin{to{transform:rotate(360deg);}}
  .avatar-card.active{border-color:var(--warm);transform:translateX(3px);}
  .avatar-name{font-weight:800;font-size:calc(.95 * var(--u));color:#fff;}
  .clue-badge{
    position:absolute;top:-.5vh;right:calc(-.4 * var(--u));width:calc(1.8 * var(--u));height:calc(1.8 * var(--u));border-radius:50%;
    background:var(--warm);color:#1a1300;display:flex;align-items:center;justify-content:center;
    border:calc(.16 * var(--u)) solid var(--bg);z-index:3;box-shadow:0 0 14px var(--warm);
  }
  .clue-badge svg{width:60%;height:60%;}

  .center-panel{flex:1;display:flex;flex-direction:column;gap:1.6vh;min-width:0;justify-content:center;}
  .hint-box{
    border-radius:20px;background:linear-gradient(165deg,var(--panel2),var(--panel));
    border:2px solid var(--border);padding:2vh calc(2 * var(--u));text-align:center;
    animation:riseIn .6s var(--ease-out) .18s both;
  }
  .hint-label{font-size:calc(.7 * var(--u));letter-spacing:3px;color:var(--muted);text-transform:uppercase;font-weight:800;margin-bottom:1vh;}
  .hint-word{font-family:'Anton',sans-serif;font-size:calc(2.8 * var(--u));color:#fff;line-height:1;transition:opacity .3s;}
  .hint-word.pop{animation:wordPop .5s var(--ease-out);}
  @keyframes wordPop{0%{transform:scale(.8);opacity:0;}60%{transform:scale(1.06);}100%{transform:scale(1);opacity:1;}}

  .scale-box{
    border-radius:20px;background:linear-gradient(165deg,var(--panel2),var(--panel));
    border:2px solid var(--border);padding:2.4vh calc(2.4 * var(--u)) 2vh;
    animation:riseIn .6s var(--ease-out) .24s both;
  }
  .scale-ends{display:flex;justify-content:space-between;font-weight:900;font-size:calc(1 * var(--u));color:var(--muted);margin-bottom:1.4vh;text-transform:uppercase;letter-spacing:1px;}
  .scale-ends .cold{color:var(--cold);}
  .scale-ends .hot{color:var(--hot);}
  .scale-track{
    position:relative;height:1.4vh;border-radius:1vh;margin:0 calc(1 * var(--u));
    background:linear-gradient(90deg, var(--cold), var(--warm), var(--hot));
    box-shadow:0 0 24px rgba(255,56,96,.3), inset 0 1px 0 rgba(255,255,255,.15);
  }
  .hotzone-glow{
    position:absolute;top:50%;width:calc(5 * var(--u));height:calc(5 * var(--u));border-radius:50%;transform:translate(-50%,-50%);
    background:radial-gradient(circle, rgba(255,209,102,.7), transparent 70%);
    opacity:0;transition:left .6s var(--ease), opacity .4s;pointer-events:none;
  }
  .hotzone-glow.show{opacity:1;animation:zonePulse 1.4s ease-in-out infinite;}
  @keyframes zonePulse{0%,100%{transform:translate(-50%,-50%) scale(1);}50%{transform:translate(-50%,-50%) scale(1.25);}}
  .marker{
    position:absolute;top:50%;left:0;width:calc(2.8 * var(--u));height:calc(2.8 * var(--u));border-radius:50%;background:var(--warm);
    border:calc(.2 * var(--u)) solid #1a1300;transform:translate(-50%,-50%) scale(0);opacity:0;
    transition:left .6s var(--ease);
    display:flex;align-items:center;justify-content:center;font-family:'Anton',sans-serif;font-size:calc(1.2 * var(--u));color:#1a1300;
    box-shadow:0 0 26px var(--warm), 0 6px 20px rgba(0,0,0,.6);z-index:2;
  }
  .marker.show{opacity:1;transform:translate(-50%,-50%) scale(1);animation:markerDrop .7s var(--ease-out);}
  @keyframes markerDrop{
    0%{transform:translate(-50%,-320%) scale(.4) rotate(-20deg);opacity:0;}
    55%{transform:translate(-50%,-50%) scale(1.3) rotate(8deg);opacity:1;}
    72%{transform:translate(-50%,-50%) scale(.92) rotate(-3deg);}
    100%{transform:translate(-50%,-50%) scale(1) rotate(0deg);opacity:1;}
  }
  .scale-nums{display:flex;justify-content:space-between;margin:1.4vh calc(1 * var(--u)) 0;}
  .scale-nums span{font-family:'Anton',sans-serif;font-size:calc(1.1 * var(--u));color:var(--muted);transition:opacity .3s;}

  .awaiting-box{
    text-align:center;padding:1.6vh;border-radius:16px;background:rgba(0,229,199,.06);border:1px solid rgba(0,229,199,.3);
    color:var(--accent);font-family:'Anton',sans-serif;font-size:calc(1.3 * var(--u));letter-spacing:1px;
  }
  .result-box{
    text-align:center;padding:1.6vh;border-radius:16px;background:rgba(255,209,102,.08);border:1px solid rgba(255,209,102,.35);
    opacity:0;transform:translateY(8px);transition:opacity .4s var(--ease), transform .4s var(--ease);
  }
  .result-box.show{opacity:1;transform:translateY(0);}
  .result-box .txt{font-family:'Anton',sans-serif;font-size:calc(1.6 * var(--u));color:var(--warm);}

  @keyframes riseIn{from{opacity:0;transform:translateY(18px);}to{opacity:1;transform:translateY(0);}}
  @media (prefers-reduced-motion: reduce){*,*::before,*::after{animation-duration:.01ms !important;animation-iteration-count:1 !important;}}
</style>
<link rel="stylesheet" href="../responsive.css" />
<link rel="stylesheet" href="../hintergrund-host.css" />

</head>
<body class="host">
<div class="orbs" aria-hidden="true"><span class="o1"></span><span class="o2"></span><span class="o3"></span></div>
<div class="embers" id="embers" aria-hidden="true"></div>

<div class="stage">
  <div class="header">
    <div class="title">HOTZONE</div>
    <div class="title-rule"></div>
  </div>

  <div class="topbar">
    <div class="info-pill cat"><div class="lbl">Kategorie</div><div class="val" id="catVal">—</div></div>
    <div class="info-pill round"><div class="lbl">Runde</div><div class="val" id="roundVal">0</div></div>
  </div>

  <div class="board">
    <div class="team-panel blue" id="panelBlue">
      <div class="team-name">BLUE TEAM<span class="turn-flag blue-flag">AM ZUG</span></div>
      <div class="joker-row" id="jokersBlue"></div>
      <div class="team-score" id="scoreBlue">0</div>
      <div class="avatar-list" id="avatarsBlue"></div>
    </div>

    <div class="center-panel">
      <div class="hint-box">
        <div class="hint-label">Hinweiswort</div>
        <div class="hint-word" id="hintWordVal">—</div>
      </div>
      <div class="scale-box">
        <div class="scale-ends"><span class="cold" id="scaleLeft">—</span><span class="hot" id="scaleRight">—</span></div>
        <div class="scale-track">
          <div class="hotzone-glow" id="hotzoneGlow"></div>
          <div class="marker" id="marker"></div>
        </div>
        <div class="scale-nums" id="scaleNums"></div>
      </div>
      <div class="awaiting-box" id="awaitingBox" style="display:none;">Warte auf Ergebnis…</div>
      <div class="result-box" id="resultBox"><div class="txt" id="resultText"></div></div>
    </div>

    <div class="team-panel red" id="panelRed">
      <div class="team-name">RED TEAM<span class="turn-flag red-flag">AM ZUG</span></div>
      <div class="joker-row" id="jokersRed"></div>
      <div class="team-score" id="scoreRed">0</div>
      <div class="avatar-list" id="avatarsRed"></div>
    </div>
  </div>
</div>

<script>
const SUPABASE_URL = "https://dazabcxqplkvcyeiesgd.supabase.co";
const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRhemFiY3hxcGxrdmN5ZWllc2dkIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE4NTQ0NzksImV4cCI6MjA5NzQzMDQ3OX0.N3Dca8Quii4M8nFYLHjzBslby_tBUCyH1-WnPfYW01Y";
const sb = window.KA_SB || supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

let state = null;
let fxJokerStand = null;
let letzteScores = { blue:null, red:null };
let letztesHint = null;
let letzteResolvePhase = false;

const CLUE_SVG = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5Z"/></svg>';

function avatarInner(name){
  const url = avatarFor(name);
  if(url) return `<img src="${url}" alt="">`;
  const initial = name.charAt(0).toUpperCase();
  return `<div class="fallback">${initial}</div>`;
}

function zaehle(el, von, bis){
  if(von === bis){ el.textContent = bis; return; }
  const dauer = 600, start = performance.now();
  function tick(now){
    const t = Math.min(1, (now - start) / dauer);
    const eased = 1 - Math.pow(1 - t, 3);
    el.textContent = Math.round(von + (bis - von) * eased);
    if(t < 1) requestAnimationFrame(tick); else el.textContent = bis;
  }
  requestAnimationFrame(tick);
}

function setScore(id, val){
  const el = document.getElementById(id);
  const key = id === 'scoreBlue' ? 'blue' : 'red';
  const alt = letzteScores[key];
  if(alt !== null && alt !== val){
    zaehle(el, alt, val);
    el.classList.remove('bump'); void el.offsetWidth; el.classList.add('bump');
  } else {
    el.textContent = val;
  }
  letzteScores[key] = val;
}

function render(){
  if(!state) return;
  const {
    players={}, round=0, activeTeam=null, clueGiver=null,
    categoryIndex=null, target=null, hintWord=null, phase='idle',
    guessValue=null, greyedNumbers=[], lastResult=null,
    blueScore=0, redScore=0
  } = state;

  setScore('scoreBlue', blueScore);
  setScore('scoreRed', redScore);

  const jokersUsed = state.jokersUsed || { blue:{}, red:{} };

  if(window.HOSTFX && fxJokerStand){
    const NAMEN = { double:'RISK', reroll:'NEUE FRAGE', grey:'CUT' };
    const FARBEN = { double:'#c44dff', reroll:'#3a7bff', grey:'#ffd166' };
    ['blue','red'].forEach(team => {
      ['double','reroll','grey'].forEach(key => {
        const jetzt = !!(jokersUsed[team] && jokersUsed[team][key]);
        const vorher = !!(fxJokerStand[team] && fxJokerStand[team][key]);
        if(jetzt && !vorher){
          const teamName = team === 'blue' ? 'BLUE TEAM' : 'RED TEAM';
          HOSTFX.joker(teamName, NAMEN[key], FARBEN[key], null);
        }
      });
    });
  }
  fxJokerStand = JSON.parse(JSON.stringify(jokersUsed));

  const JK = [['double','RISK'],['reroll','NEU'],['grey','CUT']];
  ['blue','red'].forEach(team => {
    const el = document.getElementById(team === 'blue' ? 'jokersBlue' : 'jokersRed');
    if(!el) return;
    el.innerHTML = JK.map(([key, label]) => {
      const used = !!(jokersUsed[team] && jokersUsed[team][key]);
      const live = (activeTeam === team) && (
        (key === 'double' && state.doubleActive) ||
        (key === 'grey'   && (state.greyedNumbers || []).length > 0)
      );
      const cls = ['jk'];
      if(used && !live) cls.push('spent');
      if(live) cls.push('live');
      return `<div class="${cls.join(' ')}" data-j="${key}"><span>${label}</span></div>`;
    }).join('');
  });
  document.getElementById('roundVal').textContent = round;

  document.getElementById('panelBlue').classList.toggle('turn-blue', activeTeam==='blue');
  document.getElementById('panelRed').classList.toggle('turn-red', activeTeam==='red');

  ['blue','red'].forEach(team=>{
    const el = document.getElementById('avatars'+(team==='blue'?'Blue':'Red'));
    const names = Object.entries(players).filter(([n,p])=>p.team===team).map(([n])=>n);
    el.innerHTML = names.map(name=>{
      const isActive = activeTeam===team && clueGiver===name;
      return `<div class="avatar-card ${isActive?'active':''}">
        ${isActive ? `<span class="clue-badge">${CLUE_SVG}</span>` : ''}
        <div class="avatar-ring">${avatarInner(name)}</div>
        <span class="avatar-name">${name}</span>
      </div>`;
    }).join('');
  });

  const cat = categoryIndex!=null ? CATEGORIES[categoryIndex] : null;
  document.getElementById('catVal').textContent = cat ? cat.category : '—';
  document.getElementById('scaleLeft').textContent = cat ? cat.left : '—';
  document.getElementById('scaleRight').textContent = cat ? cat.right : '—';

  const hintEl = document.getElementById('hintWordVal');
  const neuesHint = phase==='clue' || phase==='idle' ? '—' : (hintWord || '—');
  if(neuesHint !== letztesHint){
    hintEl.textContent = neuesHint;
    if(neuesHint !== '—'){ hintEl.classList.remove('pop'); void hintEl.offsetWidth; hintEl.classList.add('pop'); }
    letztesHint = neuesHint;
  }

  const scaleNums = document.getElementById('scaleNums');
  scaleNums.innerHTML = Array.from({length:10},(_, i)=>i+1).map(n=>{
    const greyed = greyedNumbers.includes(n);
    return `<span style="${greyed?'opacity:.2;':''}">${n}</span>`;
  }).join('');

  const marker = document.getElementById('marker');
  const glow = document.getElementById('hotzoneGlow');
  const awaitingBox = document.getElementById('awaitingBox');
  const resultBox = document.getElementById('resultBox');

  const istResolved = (phase==='resolved' && target!=null);

  if(istResolved){
    const pct = ((target-1)/9)*100;
    marker.style.left = pct + '%';
    glow.style.left = pct + '%';
    marker.textContent = target;
    if(!letzteResolvePhase){
      marker.classList.remove('show'); void marker.offsetWidth;
      marker.classList.add('show');
      glow.classList.add('show');
      if(window.HOSTFX && guessValue!=null && target!=null){
        const teamName = activeTeam === 'blue' ? 'BLUE TEAM' : activeTeam === 'red' ? 'RED TEAM' : '';
        const distance = Math.abs(guessValue - target);
        if(distance === 0){
          HOSTFX.correct(teamName);
        } else if(distance >= 2){
          HOSTFX.wrong(teamName);
        }

      }
    } else {
      marker.classList.add('show');
      glow.classList.add('show');
    }
    awaitingBox.style.display = 'none';
    resultBox.classList.add('show');
    document.getElementById('resultText').textContent = lastResult || '';
  } else {
    marker.classList.remove('show');
    glow.classList.remove('show');
    resultBox.classList.remove('show');
    awaitingBox.style.display = phase==='submitted' ? 'block' : 'none';
  }
  letzteResolvePhase = istResolved;
}

async function loadState(){
  const { data } = await sb.from('hz_state').select('state').eq('id',1).single();
  state = data?.state || {};
  render();
}
loadState();

sb.channel('hz_state_channel')
  .on('postgres_changes', { event:'*', schema:'public', table:'hz_state' }, payload=>{
    state = payload.new.state || {};
    render();
  }).subscribe();

setInterval(loadState, 5000);
