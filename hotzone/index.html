<!doctype html>
<html lang="de">
<head>
<meta charset="utf-8" />
<title>Hotzone</title>
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Anton&family=Inter:wght@500;700;800;900&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#0a0e1a; --bg2:#0d1524; --panel:#12172a; --panel2:#161f38; --border:#232b45;
    --ink:#eef1f8; --muted:#7a86a3;
    --cold:#3a7bff; --warm:#ffd166; --hot:#ff3860; --accent:#00e5c7;
    --ease:cubic-bezier(.22,.9,.32,1); --ease-out:cubic-bezier(.16,1,.3,1);
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  html,body{height:100%;}
  body{
    background:radial-gradient(ellipse at 50% -10%, #14243f 0%, var(--bg) 62%);
    color:var(--ink);font-family:'Inter',sans-serif;overflow:hidden;
    min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:44px;padding:30px;
  }

  .orbs{position:fixed;inset:0;z-index:0;overflow:hidden;pointer-events:none;}
  .orbs span{position:absolute;border-radius:50%;filter:blur(90px);will-change:transform;}
  .orbs .o1{width:44vw;height:44vw;top:-12vw;left:-8vw;background:radial-gradient(circle,rgba(58,123,255,.5),transparent 68%);animation:dA 24s var(--ease) infinite alternate;}
  .orbs .o2{width:40vw;height:40vw;bottom:-14vw;right:-8vw;background:radial-gradient(circle,rgba(255,56,96,.4),transparent 68%);animation:dB 28s var(--ease) infinite alternate;}
  .orbs .o3{width:32vw;height:32vw;top:38%;left:44%;background:radial-gradient(circle,rgba(0,229,199,.3),transparent 70%);animation:dC 32s var(--ease) infinite alternate;}
  @keyframes dA{0%{transform:translate(0,0) scale(1);}100%{transform:translate(6vw,10vw) scale(1.15);}}
  @keyframes dB{0%{transform:translate(0,0) scale(1);}100%{transform:translate(-8vw,-6vw) scale(1.12);}}
  @keyframes dC{0%{transform:translate(0,0) scale(1);}100%{transform:translate(0,-6vw) scale(1.2);}}

  .embers{position:fixed;inset:0;z-index:0;overflow:hidden;pointer-events:none;}
  .ember{position:absolute;bottom:-20px;width:6px;height:6px;border-radius:50%;background:var(--warm);box-shadow:0 0 10px var(--hot);animation:rise linear infinite;}
  @keyframes rise{0%{transform:translateY(0) translateX(0);opacity:0;}12%{opacity:.85;}88%{opacity:.6;}100%{transform:translateY(-108vh) translateX(var(--dx,30px));opacity:0;}}

  .wrap{position:relative;z-index:2;display:flex;flex-direction:column;align-items:center;gap:44px;}
  .logo{
    font-family:'Anton',sans-serif;font-size:clamp(52px,10vw,116px);letter-spacing:2px;line-height:.9;
    background:linear-gradient(180deg,#eaf2ff 0%, var(--accent) 45%, var(--hot) 100%);
    -webkit-background-clip:text;background-clip:text;color:transparent;
    filter:drop-shadow(0 0 26px rgba(0,229,199,.4));
    animation:riseIn .6s var(--ease-out) both;
  }
  .sub{font-size:13px;letter-spacing:6px;text-transform:uppercase;color:var(--muted);font-weight:700;margin-top:8px;animation:riseIn .6s var(--ease-out) .1s both;}

  .heatbar{width:min(340px,80vw);height:6px;border-radius:4px;margin-top:6px;
    background:linear-gradient(90deg,var(--cold),var(--warm),var(--hot));
    box-shadow:0 0 18px rgba(255,56,96,.4);position:relative;overflow:hidden;
    animation:riseIn .6s var(--ease-out) .15s both;}
  .heatbar::after{content:'';position:absolute;top:0;left:-40%;width:40%;height:100%;
    background:linear-gradient(90deg,transparent,rgba(255,255,255,.7),transparent);animation:sweep 2.6s var(--ease) infinite;}
  @keyframes sweep{0%{left:-40%;}100%{left:110%;}}

  .roles{display:flex;gap:20px;flex-wrap:wrap;justify-content:center;}
  .role{
    position:relative;width:230px;padding:30px 24px;border-radius:18px;text-decoration:none;color:var(--ink);
    background:linear-gradient(160deg,var(--panel2),var(--panel));border:1px solid var(--border);
    display:flex;flex-direction:column;align-items:center;gap:12px;overflow:hidden;
    transition:transform .4s var(--ease-out),border-color .35s var(--ease),box-shadow .35s var(--ease);
    animation:riseIn .6s var(--ease-out) both;
  }
  .role:nth-child(1){animation-delay:.20s;}
  .role:nth-child(2){animation-delay:.28s;}
  .role:nth-child(3){animation-delay:.36s;}
  .role::before{content:'';position:absolute;top:0;left:0;width:100%;height:3px;background:var(--rc);opacity:.9;}
  .role .ic{width:52px;height:52px;color:var(--rc);filter:drop-shadow(0 0 12px var(--rc));}
  .role .ic svg{width:100%;height:100%;}
  .role h3{font-family:'Anton',sans-serif;font-size:22px;letter-spacing:1px;text-transform:uppercase;}
  .role p{color:var(--muted);font-size:13px;text-align:center;line-height:1.5;}
  .role:hover{transform:translateY(-6px);border-color:var(--rc);box-shadow:0 18px 50px -20px var(--rc);}
  .role:active{transform:translateY(-3px) scale(.98);}
  .role.host{--rc:var(--accent);}
  .role.master{--rc:var(--warm);}
  .role.buzz{--rc:var(--hot);}

  @keyframes riseIn{from{opacity:0;transform:translateY(18px);}to{opacity:1;transform:translateY(0);}}
  @media (prefers-reduced-motion: reduce){*,*::before,*::after{animation-duration:.01ms !important;animation-iteration-count:1 !important;}}
  @media(max-width:720px){.roles{gap:14px;}.role{width:min(80vw,260px);}}
</style>
<link rel="stylesheet" href="../responsive.css" />
</head>
<body>
<div class="orbs" aria-hidden="true"><span class="o1"></span><span class="o2"></span><span class="o3"></span></div>
<div class="embers" id="embers" aria-hidden="true"></div>

<div class="wrap">
  <div style="display:flex;flex-direction:column;align-items:center;">
    <div class="logo">HOTZONE</div>
    <div class="heatbar"></div>
  </div>

  <div class="roles">
    <a class="role host" href="./host.html">
      <h3>Host</h3>
    </a>
    <a class="role master" href="./spielleiter.html">
      <h3>Spielleiter</h3>
    </a>
    <a class="role buzz" href="./buzzer.html">
      <h3>Buzzer</h3>
    </a>
  </div>
</div>

<script>
  var e = document.getElementById('embers');
  for(var i=0;i<18;i++){
    var s = document.createElement('div');
    s.className = 'ember';
    var sz = 3 + Math.random()*5;
    s.style.width = sz+'px'; s.style.height = sz+'px';
    s.style.left = (Math.random()*100)+'vw';
    s.style.setProperty('--dx',(Math.random()*60-30)+'px');
    s.style.animationDuration = (7+Math.random()*8)+'s';
    s.style.animationDelay = (-Math.random()*15)+'s';
    e.appendChild(s);
  }
</script>
<script src="../zurueck.js"></script>
</body>
</html>
