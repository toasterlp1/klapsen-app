<!doctype html>
<html lang="de">
<head>
<meta charset="utf-8" />
<title>Emoji-Rätsel</title>
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Anton&family=Inter:wght@500;700;800;900&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#0a0e1a; --bg2:#100a20; --panel:#161029; --panel2:#1c1436; --border:#2c2350;
    --ink:#eef1f8; --muted:#8579a8;
    --accent:#c76bff; --accent2:#ff6bd6; --gold:#ffd166;
    --ease:cubic-bezier(.22,.9,.32,1); --ease-out:cubic-bezier(.16,1,.3,1);
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  html,body{height:100%;}
  body{
    background:
      radial-gradient(ellipse 70vw 50vh at 15% -10%, rgba(199,107,255,.16), transparent 60%),
      radial-gradient(ellipse 70vw 50vh at 90% 110%, rgba(255,107,214,.14), transparent 60%),
      var(--bg);
    color:var(--ink);font-family:'Inter',sans-serif;
    display:flex;flex-direction:column;align-items:center;justify-content:center;gap:26px;
    min-height:100%;overflow-x:hidden;
  }

  .orbs{position:fixed;inset:0;z-index:0;overflow:hidden;pointer-events:none;}
  .orbs span{position:absolute;border-radius:50%;filter:blur(90px);will-change:transform;opacity:.5;}
  .orbs .o1{width:44vw;height:44vw;top:-12vw;left:-8vw;background:radial-gradient(circle,rgba(199,107,255,.5),transparent 68%);animation:dA 24s var(--ease) infinite alternate;}
  .orbs .o2{width:40vw;height:40vw;bottom:-14vw;right:-8vw;background:radial-gradient(circle,rgba(255,107,214,.4),transparent 68%);animation:dB 28s var(--ease) infinite alternate;}
  @keyframes dA{0%{transform:translate(0,0) scale(1);}100%{transform:translate(6vw,9vw) scale(1.14);}}
  @keyframes dB{0%{transform:translate(0,0) scale(1);}100%{transform:translate(-7vw,-6vw) scale(1.12);}}

  .head{position:relative;z-index:1;text-align:center;}
  h1{
    font-family:'Anton',sans-serif;letter-spacing:4px;font-size:36px;margin-bottom:10px;
    background:linear-gradient(180deg,#f3e8ff 0%, var(--accent) 45%, var(--accent2) 100%);
    -webkit-background-clip:text;background-clip:text;color:transparent;
    filter:drop-shadow(0 0 18px rgba(199,107,255,.4));
  }
  .h-rule{width:90px;height:4px;border-radius:3px;margin:0 auto;
    background:linear-gradient(90deg, var(--accent), var(--accent2), var(--gold));
    box-shadow:0 0 14px rgba(199,107,255,.45);}

  .roles{position:relative;z-index:1;display:flex;flex-direction:column;gap:14px;width:280px;}
  a.role{
    display:flex;align-items:center;gap:14px;width:100%;text-align:left;padding:16px 18px;border-radius:14px;
    background:linear-gradient(165deg,var(--panel2),var(--panel));border:1px solid var(--border);color:var(--ink);
    text-decoration:none;font-weight:800;transition:border-color .25s var(--ease), transform .2s var(--ease), box-shadow .25s var(--ease);
  }
  a.role:hover{transform:translateY(-2px);}
  a.role .icon{
    width:38px;height:38px;border-radius:10px;flex-shrink:0;
    display:flex;align-items:center;justify-content:center;font-size:19px;
  }
  a.role.host{border-color:rgba(199,107,255,.35);}
  a.role.host:hover{border-color:var(--accent);box-shadow:0 0 24px -6px rgba(199,107,255,.5);}
  a.role.host .icon{background:linear-gradient(135deg,#d68eff,var(--accent));color:#1c0630;}
  a.role.sl{border-color:rgba(255,209,102,.3);}
  a.role.sl:hover{border-color:var(--gold);box-shadow:0 0 24px -6px rgba(255,209,102,.5);}
  a.role.sl .icon{background:linear-gradient(135deg,#ffdf94,var(--gold));color:#241900;}
  a.role.buzzer{border-color:rgba(255,107,214,.3);}
  a.role.buzzer:hover{border-color:var(--accent2);box-shadow:0 0 24px -6px rgba(255,107,214,.5);}
  a.role.buzzer .icon{background:linear-gradient(135deg,#ff9fe3,var(--accent2));color:#3a0526;}
  .lbl{display:flex;flex-direction:column;}
  .lbl .t{font-size:14.5px;}
  .lbl .s{font-size:11px;font-weight:600;color:var(--muted);letter-spacing:.3px;}
</style>
<link rel="stylesheet" href="../responsive.css" />
</head>
<body>
<div class="orbs" aria-hidden="true"><span class="o1"></span><span class="o2"></span></div>
<div class="head">
  <h1>EMOJI-RÄTSEL</h1>
  <div class="h-rule"></div>
</div>
<div class="roles">
  <a class="role host" href="./host.html">
    <span class="lbl"><span class="t">Host</span></span>
  </a>
  <a class="role sl" href="./spielleiter.html">
    <span class="lbl"><span class="t">Spielleiter</span></span>
  </a>
  <a class="role buzzer" href="./buzzer.html">
    <span class="lbl"><span class="t">Buzzer</span></span>
  </a>
</div>
<script src="../zurueck.js"></script>
<script src="../hintergrund.js"></script>
</body>
</html>
